<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Design Fiction — Context Field</title>
    <link
        href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap"
        rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #08090e
        }

        /* DESIGN FICTION: SEDIMENTARY TEXT */
        .world-text {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            font-family: 'Cormorant Garamond', serif;
            font-size: 16px;
            line-height: 1.6;
            color: #b4dceb;
            scroll-behavior: smooth;
        }

        .chunk {
            margin-bottom: 24px;
            position: relative;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.8s ease-out;
        }

        .chunk.seen {
            opacity: 1;
            transform: translateY(0);
        }

        .chunk-meta {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 9px;
            text-transform: uppercase;
            color: #d4a84b;
            margin-bottom: 6px;
            letter-spacing: 0.1em;
            opacity: 0.6;
        }

        .chunk-text {
            color: #e0f2f7;
            font-style: italic;
            position: relative;
        }

        .chunk::after {
            content: '';
            display: inline-block;
            width: 8px;
            height: 1.2em;
            background: #d4a84b;
            vertical-align: middle;
            margin-left: 4px;
            animation: cursor-blink 1s step-end infinite;
        }

        @keyframes cursor-blink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0;
            }
        }

        /* XANADU RIGHT PANEL */
        .xanadu-col {
            width: 330px;
            border-left: 1px solid rgba(100, 170, 200, .15);
            background: linear-gradient(90deg, rgba(8, 9, 14, 0) 0%, rgba(8, 9, 14, 0.95) 15%);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            pointer-events: all;
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .xanadu-col.hidden {
            transform: translateX(100%);
        }

        .xanadu-header {
            padding: 16px;
            border-bottom: 1px solid rgba(100, 170, 200, 0.1);
            background: rgba(12, 14, 22, 0.4);
        }

        .xanadu-thread {
            flex: 1;
            overflow-y: auto;
            padding: 12px 10px 80px 30px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .xanadu-thread::-webkit-scrollbar {
            width: 3px;
        }

        .xanadu-thread::-webkit-scrollbar-thumb {
            background: rgba(100, 170, 200, 0.2);
        }

        .x-card {
            background: rgba(12, 14, 22, 0.9);
            border: 1px solid rgba(100, 170, 200, 0.2);
            padding: 12px;
            border-radius: 2px;
            position: relative;
            cursor: pointer;
            font-size: 10px;
            line-height: 1.5;
            color: #b4dceb;
            transition: all 0.2s;
        }

        .x-card:hover {
            border-color: #d4a84b;
            transform: translateX(-4px);
        }

        .x-card.active {
            border-color: #ffd700;
            box-shadow: 0 0 15px rgba(212, 168, 75, 0.15);
        }

        .x-card-head {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 8px;
            text-transform: uppercase;
            color: #d4a84b;
            margin-bottom: 6px;
            display: flex;
            justify-content: space-between;
        }

        .x-card-body {
            font-style: italic;
            white-space: pre-wrap;
        }

        .x-connector-dot {
            position: absolute;
            left: -6px;
            top: 16px;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #d4a84b;
        }

        body {
            font-family: 'IBM Plex Mono', monospace;
            color: #7ab0c0;
            font-size: 11px;
            user-select: none
        }

        /* ── TOP BAR ── */
        .top {
            height: 36px;
            background: rgba(8, 9, 14, .98);
            border-bottom: 1px solid rgba(100, 170, 200, .1);
            display: flex;
            align-items: center;
            flex-shrink: 0;
            z-index: 50
        }

        .t-logo {
            font-size: 9px;
            font-weight: 600;
            letter-spacing: .18em;
            color: #d4a84b;
            text-transform: uppercase;
            padding: 0 16px;
            border-right: 1px solid rgba(100, 170, 200, .1)
        }

        .t-stat {
            padding: 0 14px;
            border-right: 1px solid rgba(100, 170, 200, .07)
        }

        .t-lbl {
            font-size: 6px;
            letter-spacing: .12em;
            text-transform: uppercase;
            color: rgba(100, 170, 200, .28);
            margin-bottom: 1px
        }

        .t-val {
            font-size: 9px;
            font-weight: 600;
            color: #8ec8d8;
            letter-spacing: .03em;
            line-height: 1
        }

        .t-r {
            margin-left: auto;
            display: flex
        }

        .tb {
            background: none;
            border: none;
            border-left: 1px solid rgba(100, 170, 200, .08);
            color: rgba(100, 170, 200, .32);
            font-family: 'IBM Plex Mono', monospace;
            font-size: 8px;
            font-weight: 600;
            letter-spacing: .1em;
            text-transform: uppercase;
            padding: 0 14px;
            height: 36px;
            cursor: pointer;
            transition: color .12s
        }

        .tb:hover {
            color: #8ec8d8
        }

        .tb.on {
            color: #d4a84b;
            border-bottom: 2px solid #d4a84b
        }

        /* ── MAIN ── */
        .main {
            display: flex;
            height: calc(100vh - 36px - 40px)
        }

        .vpanel {
            position: relative;
            flex: 1;
            overflow: hidden
        }

        #mainCanvas,
        #overlayCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        #overlayCanvas {
            pointer-events: none;
            z-index: 5;
        }

        #mainCanvas {
            z-index: 1;
            cursor: crosshair;
        }

        /* DIVIDER */
        .div {
            width: 3px;
            background: rgba(100, 170, 200, .06);
            cursor: col-resize;
            flex-shrink: 0;
            transition: background .15s
        }

        .div:hover {
            background: rgba(100, 170, 200, .2)
        }

        /* WORLD TEXT PANEL */
        .wtp {
            width: 340px;
            min-width: 220px;
            display: flex;
            flex-direction: column;
            background: #06080e;
            border-left: 1px solid rgba(100, 170, 200, .08)
        }

        /* ── LEFT NAV ── */
        .left-nav {
            width: 36px;
            border-right: 1px solid rgba(100, 180, 200, .1);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 6px 0;
            gap: 4px;
            background: rgba(6, 10, 16, .85);
            flex-shrink: 0;
            z-index: 60;
        }

        .lnav-btn {
            width: 28px;
            height: 28px;
            background: none;
            border: 1px solid rgba(100, 180, 200, .1);
            color: rgba(100, 180, 200, .4);
            font-size: 11px;
            cursor: pointer;
            transition: all .15s;
            display: flex;
            align-items: center;
            justify-content: center
        }

        .lnav-btn:hover,
        .lnav-btn.active {
            border-color: rgba(100, 180, 200, .5);
            color: #8ec8d8;
            background: rgba(100, 180, 200, .06)
        }

        .lnav-sep {
            width: 16px;
            height: 1px;
            background: rgba(100, 180, 200, .1);
            margin: 2px 0
        }

        /* ── WORLD MANIFEST ── */
        .wm-panel {
            position: absolute;
            left: 36px;
            top: 0;
            bottom: 0;
            width: 300px;
            background: rgba(8, 9, 14, 0.98);
            border-right: 1px solid rgba(100, 170, 200, 0.2);
            z-index: 100;
            display: none;
            flex-direction: column;
            box-shadow: 20px 0 50px rgba(0, 0, 0, 0.5);
        }

        .wm-head {
            padding: 12px;
            border-bottom: 1px solid rgba(100, 170, 200, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 9px;
            letter-spacing: 0.1em;
            color: #d4a84b;
        }

        .wm-close {
            background: none;
            border: none;
            color: #7ab0c0;
            cursor: pointer;
            font-size: 14px;
        }

        .wm-controls {
            padding: 8px 12px;
            display: flex;
            gap: 6px;
            border-bottom: 1px solid rgba(100, 170, 200, 0.08);
        }

        #wmSearch {
            flex: 1;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(100, 170, 200, 0.15);
            color: #8ec8d8;
            font-family: inherit;
            font-size: 9px;
            padding: 4px 8px;
            outline: none;
        }

        .wm-list {
            flex: 1;
            overflow-y: auto;
            padding: 4px 0;
        }

        .wm-item {
            padding: 10px 12px;
            border-bottom: 1px solid rgba(100, 170, 200, 0.04);
            cursor: pointer;
            transition: background 0.2s;
        }

        .wm-item:hover {
            background: rgba(100, 170, 200, 0.06);
        }

        .wm-uid {
            font-size: 7px;
            color: #d4a84b;
        }

        .wm-name {
            font-size: 10px;
            font-weight: 600;
            margin-top: 2px;
        }

        .wm-meta {
            font-size: 8px;
            color: rgba(100, 170, 200, 0.35);
            margin-top: 4px;
            line-height: 1.3;
        }

        .wt-head {
            height: 36px;
            border-bottom: 1px solid rgba(100, 170, 200, .08);
            display: flex;
            align-items: center;
            padding: 0 12px;
            gap: 8px;
            background: rgba(6, 8, 14, .9);
            flex-shrink: 0
        }

        .wt-title {
            font-size: 8px;
            font-weight: 600;
            letter-spacing: .14em;
            text-transform: uppercase;
            color: rgba(100, 170, 200, .35);
            flex: 1
        }

        .wz {
            background: none;
            border: 1px solid rgba(100, 170, 200, .12);
            color: rgba(100, 170, 200, .35);
            font-family: 'IBM Plex Mono', monospace;
            font-size: 9px;
            padding: 1px 7px;
            cursor: pointer;
            transition: all .1s
        }

        .wz:hover {
            border-color: rgba(100, 170, 200, .4);
            color: #8ec8d8
        }

        .wt-body {
            flex: 1;
            overflow-y: auto;
            position: relative
        }

        .wt-body::-webkit-scrollbar {
            width: 2px
        }

        .wt-body::-webkit-scrollbar-thumb {
            background: rgba(100, 170, 200, .1)
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #5d6a81;
            transition: all 0.3s;
        }

        .status-dot.ok {
            background: #00ff88;
            box-shadow: 0 0 8px #00ff88;
        }

        .status-dot.busy {
            background: #ffb000;
            box-shadow: 0 0 8px #ffb000;
            animation: pulse 1s infinite;
        }

        .status-dot.err {
            background: #ff4d5d;
            box-shadow: 0 0 8px #ff4d5d;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.3;
            }
        }

        /* ── BOTTOM ── */
        .bottom {
            height: 40px;
            background: rgba(6, 8, 14, .98);
            border-top: 1px solid rgba(100, 170, 200, .1);
            display: flex;
            align-items: stretch
        }

        .b-in {
            flex: 1;
            background: none;
            border: none;
            color: rgba(200, 222, 232, .78);
            font-family: 'Cormorant Garamond', serif;
            font-size: 13px;
            font-style: italic;
            padding: 0 14px;
            outline: none;
            user-select: text
        }

        .b-in::placeholder {
            color: rgba(100, 170, 200, .2)
        }

        .b-op {
            background: none;
            border: none;
            border-left: 1px solid rgba(100, 170, 200, .1);
            color: rgba(100, 170, 200, .4);
            font-family: 'IBM Plex Mono', monospace;
            font-size: 8px;
            font-weight: 600;
            letter-spacing: .1em;
            text-transform: uppercase;
            padding: 0 12px;
            cursor: pointer;
            white-space: nowrap;
            transition: color .1s
        }

        .b-op:hover {
            color: #8ec8d8
        }

        .b-run {
            background: rgba(212, 168, 75, .07);
            border: none;
            border-left: 1px solid rgba(212, 168, 75, .2);
            color: rgba(212, 168, 75, .7);
            font-family: 'IBM Plex Mono', monospace;
            font-size: 8px;
            font-weight: 600;
            letter-spacing: .1em;
            text-transform: uppercase;
            padding: 0 14px;
            cursor: pointer;
            transition: all .12s
        }

        .b-run:hover {
            background: rgba(212, 168, 75, .14);
            color: #d4a84b
        }

        /* ── OP PICKER ── */
        #opPicker {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 200;
            background: rgba(6, 8, 14, .98);
            border: 1px solid rgba(100, 170, 200, .16);
            display: none;
            flex-wrap: wrap;
            max-width: 400px
        }

        .op-p {
            background: none;
            border: none;
            border-right: 1px solid rgba(100, 170, 200, .07);
            border-bottom: 1px solid rgba(100, 170, 200, .07);
            color: rgba(100, 170, 200, .35);
            font-family: 'IBM Plex Mono', monospace;
            font-size: 8px;
            font-weight: 600;
            letter-spacing: .09em;
            text-transform: uppercase;
            padding: 7px 11px;
            cursor: pointer;
            transition: all .1s
        }

        .op-p:hover {
            background: rgba(100, 170, 200, .05);
            color: #8ec8d8
        }

        .op-p.sel {
            color: #d4a84b
        }

        .op-p.t {
            opacity: .55
        }

        /* ── CTX ── */
        #ctx {
            position: fixed;
            z-index: 300;
            background: rgba(6, 8, 14, .98);
            border: 1px solid rgba(100, 170, 200, .16);
            display: none;
            min-width: 148px
        }

        .cx {
            display: flex;
            align-items: center;
            gap: 7px;
            padding: 6px 11px;
            cursor: pointer;
            font-size: 8px;
            font-weight: 600;
            letter-spacing: .09em;
            text-transform: uppercase;
            color: rgba(100, 170, 200, .42);
            border-bottom: 1px solid rgba(100, 170, 200, .05);
            transition: all .1s
        }

        .cx:last-child {
            border-bottom: none
        }

        .cx:hover {
            background: rgba(100, 170, 200, .05);
            color: #8ec8d8
        }

        .cx-dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            flex-shrink: 0
        }

        .cx-hd {
            padding: 4px 11px;
            font-size: 7px;
            letter-spacing: .12em;
            text-transform: uppercase;
            color: rgba(100, 170, 200, .22)
        }

        /* ── LEGEND ── */
        #legend {
            position: fixed;
            bottom: 44px;
            left: 8px;
            z-index: 40;
            font-size: 7px;
            color: rgba(100, 170, 200, .25);
            line-height: 2;
            letter-spacing: .04em;
            pointer-events: none
        }

        .leg-row {
            display: flex;
            align-items: center;
            gap: 5px
        }

        .leg-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            flex-shrink: 0
        }
    </style>
</head>

<body>
    <div style="display:flex;flex-direction:column;height:100vh">

        <div class="top">
            <span class="t-logo">⬡ Context Field</span>
            <div class="t-stat">
                <div class="t-lbl">Nodes</div>
                <div class="t-val" id="sN">0</div>
            </div>
            <div class="t-stat">
                <div class="t-lbl">Operator</div>
                <div class="t-val" id="sO">SITE</div>
            </div>
            <div class="t-stat">
                <div class="t-lbl">Status</div>
                <div class="t-val" id="sSt">READY</div>
            </div>
            <div id="api-hud"
                style="display:flex;align-items:center;margin-left:auto;padding-right:12px;gap:8px;border-left:1px solid rgba(100,170,200,.1);padding-left:12px">
                <div id="dot-api" class="status-dot"></div>
                <input type="password" id="api-key-input" placeholder="OpenAI Key..."
                    style="background:rgba(0,0,0,0.3);border:1px solid rgba(100,170,200,0.15);color:#ffd700;font-family:inherit;font-size:9px;padding:3px 8px;width:120px;outline:none;"
                    onchange="saveApiKey()">
            </div>
            <div class="t-r">
                <button class="tb on" id="tbEx" onclick="setMode('explore')">Explore</button>
                <button class="tb" id="tbFi" onclick="setMode('fire')">Fire ◎</button>
                <button class="tb" onclick="clearAll()">Clear</button>
            </div>
        </div>

        <div class="main">
            <div class="left-nav">
                <button class="lnav-btn active" title="Voronoi View">⬡</button>
                <div class="lnav-sep"></div>
                <button class="lnav-btn" title="SITE" onclick="pickOp('site')">S</button>
                <button class="lnav-btn" title="DIG" onclick="pickOp('archaeologist')">D</button>
                <button class="lnav-btn" title="INFER" onclick="pickOp('analyst')">I</button>
                <button class="lnav-btn" title="BUILD" onclick="pickOp('crate')">B</button>
                <div class="lnav-sep"></div>
                <button class="lnav-btn" title="MANIFEST" onclick="togWM()">🐝</button>
            </div>

            <div id="wmPanel" class="wm-panel">
                <div class="wm-head">
                    <span>WORLD MANIFEST // BEES</span>
                    <button class="wm-close" onclick="togWM()">&times;</button>
                </div>
                <div class="wm-controls">
                    <input type="text" id="wmSearch" placeholder="Search worlds..." oninput="updateWM()">
                </div>
                <div id="wmList" class="wm-list"></div>
            </div>

            <div class="vpanel" id="vpanel">
                <canvas id="mainCanvas"></canvas>
                <canvas id="overlayCanvas"></canvas>
            </div>

            <div class="div" id="divider"></div>

            <!-- Stained Plus: Xanadu Right Panel -->
            <div class="xanadu-col" id="xanadu-col">
                <div class="xanadu-header">
                    <div class="chunk-meta">Active Territory</div>
                    <div class="t-logo" id="active-territory-id">—</div>
                </div>
                <div class="xanadu-thread" id="xanadu-thread">
                    <div class="world-text" id="world-text">
                        <div class="wt-empty" style="opacity: 0.3; font-style: italic; padding: 20px;">
                            Select a node to excavate its lineage...
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="bottom">
            <input class="b-in" id="bIn" placeholder="seed concept — ⌘↵ spawn · right-click for operators…"
                onkeydown="if(event.key==='Enter' && (event.metaKey || event.ctrlKey)) spawnInput()">
            <button class="b-op" id="bOp" onclick="togPicker()">SITE ▾</button>
            <button class="b-run" onclick="spawnInput()">Spawn</button>
        </div>

    </div>

    <div id="opPicker">
        <button class="op-p sel" data-op="site" onclick="pickOp('site',this)">SITE</button>
        <button class="op-p" data-op="archaeologist" onclick="pickOp('archaeologist',this)">DIG</button>
        <button class="op-p" data-op="analyst" onclick="pickOp('analyst',this)">INFER</button>
        <button class="op-p" data-op="crate" onclick="pickOp('crate',this)">BUILD</button>
        <button class="op-p" data-op="hybrid" onclick="pickOp('hybrid',this)">HYBRID</button>
        <button class="op-p" data-op="custom" onclick="pickOp('custom',this)">OPEN</button>
        <button class="op-p t" data-op="aphorist" onclick="pickOp('aphorist',this)">APHORIST</button>
        <button class="op-p t" data-op="pragmatist" onclick="pickOp('pragmatist',this)">PRAGMATIST</button>
        <button class="op-p t" data-op="inverter" onclick="pickOp('inverter',this)">INVERTER</button>
    </div>
    <div id="ctx"></div>

    <details id="legend" style="position:fixed;bottom:44px;left:8px;z-index:40;cursor:pointer;pointer-events:all">
        <summary style="font-size:7px;color:rgba(100,170,200,.4);list-style:none">OPERATORS ▾</summary>
        <div style="font-size:7px;color:rgba(100,170,200,.25);line-height:2;letter-spacing:.04em;padding-top:4px">
            <div class="leg-row">
                <div class="leg-dot" style="background:#1a90d4"></div>SITE — where it grows
            </div>
            <div class="leg-row">
                <div class="leg-dot" style="background:#8040c0"></div>DIG — real &amp; imagined docs
            </div>
            <div class="leg-row">
                <div class="leg-dot" style="background:#20a060"></div>INFER — what it's becoming
            </div>
            <div class="leg-row">
                <div class="leg-dot" style="background:#d07030"></div>APHORIST — crystallize
            </div>
            <div class="leg-row" style="margin-top:4px;color:rgba(100,170,200,.18)">drag · shift+drag to fire</div>
            <div class="leg-row" style="color:rgba(100,170,200,.18)">right-click canvas to spawn</div>
        </div>
    </details>

    <script>
        'use strict';
        const CONFIG = { model: "gpt-4o", storageKey: "stained_glass_openai_key" };
        let API_KEY = "";
        let nodes = [], chunks = [], nodeCount = 0, cid = 0;
        let mode = 'explore', curOp = 'site';
        let VW, VH, canvas, ctx, vmap, SAMP = 3;
        let dragging = null, aiming = null, hovNode = null, dox = 0, doy = 0;
        let ripples = [], tick = 0;
        let selectedNode = null;

        const REGIME_COLORS = {
            'warm seed': '#ffb700',
            'dead rubble': '#5d6a81',
            'the unsaid': '#00e5ff',
            'rupture': '#ff4d5d',
            'grey market': '#7db8c8',
            'axiom': '#d4a84b'
        };

        const REGIME_MOTIFS = {
            'warm seed': ['vitality', 'growth', 'potential', 'unfolding'],
            'dead rubble': ['decay', 'ruin', 'obsolescence', 'remnant'],
            'the unsaid': ['silence', 'lacuna', 'whisper', 'boundary'],
            'rupture': ['break', 'friction', 'glitch', 'disruption'],
            'grey market': ['informal', 'improvised', 'tactical', 'unauthorized'],
            'axiom': ['core', 'foundation', 'origin']
        };

        const OP_DEF = {
            site: { label: 'SITE', hue: 205, sys: 'You are a strategist. Generate real-world contexts where this concept causes rupture.' },
            archaeologist: { label: 'DIG', hue: 275, sys: 'Archaeologist. Mix real and imagined documents.' },
            analyst: { label: 'INFER', hue: 148, sys: 'Analyst. What is it becoming? What question is it asking?' },
            aphorist: { label: 'PHILO', hue: 38, sys: 'Aphorist. Numbered remarks. BAN transitions.' },
            inverter: { label: 'AXIS', hue: 355, sys: 'Inverter. Reconstruct for reader value. Inject tension.' },
            crate: { label: 'BUILD', hue: 160, sys: 'Builder. Create tangible frameworks.' },
            hybrid: { label: 'HYBRID', hue: 220, sys: 'Hybrid. Merge disparate threads.' },
            custom: { label: 'OPEN', hue: 300, sys: 'Open. No constraints.' },
            pragmatist: { label: 'FACT', hue: 190, sys: 'Pragmatist. Raw data focus.' }
        };

        function saveApiKey() { API_KEY = document.getElementById('api-key-input').value.trim(); localStorage.setItem(CONFIG.storageKey, API_KEY); setApiStatus('ok'); }
        function loadApiKey() { API_KEY = localStorage.getItem(CONFIG.storageKey) || ""; if (document.getElementById('api-key-input')) document.getElementById('api-key-input').value = API_KEY; if (API_KEY) setApiStatus('ok'); }
        function setApiStatus(s) { const d = document.getElementById('dot-api'); if (d) d.className = 'status-dot ' + s; }

        async function askOpenAI(systemPrompt, userPrompt, node) {
            if (!API_KEY) {
                setApiStatus('err');
                return 'API KEY MISSING';
            }
            setApiStatus('busy');

            const regime = node?.regime || 'axiom';
            const motif = REGIME_MOTIFS[regime] ? REGIME_MOTIFS[regime][Math.floor(Math.random() * REGIME_MOTIFS[regime].length)] : 'core';
            const stainedSystem = `${systemPrompt}\n\nSTAINING DIRECTIVE: You are operating within the '${regime.toUpperCase()}' regime. Infuse your output with the motif of '${motif}'. Use tactile, sensory language.`;

            try {
                const response = await fetch('https://api.openai.com/v1/chat/completions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${API_KEY}` },
                    body: JSON.stringify({
                        model: CONFIG.model,
                        messages: [{ role: 'system', content: stainedSystem }, { role: 'user', content: userPrompt }],
                        temperature: 0.7
                    })
                });
                const data = await response.json();
                setApiStatus('ok');
                return data.choices[0].message.content;
            } catch (err) {
                setApiStatus('err');
                return `CONNECTION_ERROR: ${err.message}`;
            }
        }

        function addNode(text, op, x, y, regime = 'axiom') {
            nodeCount++;
            const node = {
                id: nodeCount, text, op, x, y,
                vx: (Math.random() - 0.5) * 2, vy: (Math.random() - 0.5) * 2,
                glowAnim: 0, runAnim: 0,
                regime: regime,
                depth: 0,
                harmonicSignature: {
                    regime: regime,
                    motif: REGIME_MOTIFS[regime] ? REGIME_MOTIFS[regime][Math.floor(Math.random() * REGIME_MOTIFS[regime].length)] : 'core'
                }
            };
            nodes.push(node);
            spawnRipples(node.x, node.y);
            compute();
            if (document.getElementById('sN')) document.getElementById('sN').textContent = nodes.length;
            return node;
        }

        function spawnRipples(x, y) {
            for (let i = 0; i < 3; i++) {
                ripples.push({ x, y, r: 0, a: 1.0, dr: 2 + i * 2 });
            }
        }

        function init() {
            canvas = document.getElementById('mainCanvas');
            if (!canvas) return console.error("mainCanvas not found");
            ctx = canvas.getContext('2d');
            resize(); window.addEventListener('resize', resize);
            loadApiKey(); setupEvents();
            setInterval(() => { tick++; updatePhysics(); draw(); }, 33);

            // Seed initial field
            addNode("World Structure", "site", window.innerWidth / 2, window.innerHeight / 2, "axiom");
            addNode("Rogue Maintenance", "archaeologist", window.innerWidth / 2 - 100, window.innerHeight / 2 - 80, "grey market");
            addNode("Gospel Echo", "analyst", window.innerWidth / 2 + 120, window.innerHeight / 2 + 60, "warm seed");
        }

        function resize() {
            VW = canvas.width = window.innerWidth;
            VH = canvas.height = window.innerHeight;
            compute();
        }

        function setupEvents() {
            canvas.onmousedown = e => {
                const n = nodeAt(e.clientX, e.clientY);
                if (n) {
                    if (e.shiftKey) aiming = { src: n, x1: n.x, y1: n.y, x2: e.clientX, y2: e.clientY };
                    else {
                        dragging = n; dox = e.clientX - n.x; doy = e.clientY - n.y;
                        selectedNode = n;
                        updateXanaduThread();
                    }
                } else {
                    selectedNode = null;
                    updateXanaduThread();
                }
            };
            canvas.onmousemove = e => {
                if (dragging) { dragging.x = e.clientX - dox; dragging.y = e.clientY - doy; compute(); }
                if (aiming) { aiming.x2 = e.clientX; aiming.y2 = e.clientY; }
                hovNode = nodeAt(e.clientX, e.clientY);
            };
            canvas.onmouseup = e => {
                if (aiming) {
                    const tgt = nodeAt(e.clientX, e.clientY);
                    if (tgt && tgt !== aiming.src) runOp(aiming.src, tgt);
                    aiming = null;
                }
                dragging = null;
            };
            canvas.oncontextmenu = e => {
                e.preventDefault();
                const regimes = Object.keys(REGIME_COLORS);
                const r = regimes[Math.floor(Math.random() * regimes.length)];
                addNode("New Context", curOp, e.clientX, e.clientY, r);
            };
        }

        function nodeAt(x, y) { return nodes.find(n => (x - n.x) ** 2 + (y - n.y) ** 2 < 2500); }

        function updatePhysics() {
            let dirty = false;
            nodes.forEach(n => {
                if(Math.abs(n.vx) > 0.01 || Math.abs(n.vy) > 0.01) {
                    n.x += n.vx; n.y += n.vy;
                    n.vx *= 0.95; n.vy *= 0.95;
                    if (n.x < 0 || n.x > VW) n.vx *= -1;
                    if (n.y < 0 || n.y > VH) n.vy *= -1;
                    dirty = true;
                }
            });
            if(dirty) compute();

            ripples = ripples.filter(r => {
                r.r += r.dr; r.a *= 0.95;
                return r.a > 0.1;
            });
        }

        function compute() {
            if (!nodes.length) { vmap = null; return; }
            const vW = Math.ceil(VW / SAMP), vH = Math.ceil(VH / SAMP);
            vmap = new Int16Array(vW * vH);
            for (let y = 0; y < vH; y++) {
                for (let x = 0; x < vW; x++) {
                    let md = Infinity, mi = -1;
                    nodes.forEach((n, i) => { 
                        const d = (x * SAMP - n.x) ** 2 + (y * SAMP - n.y) ** 2; 
                        if (d < md) { md = d; mi = i; } 
                    });
                    vmap[y * vW + x] = mi;
                }
            }
        }

        function draw() {
            ctx.clearRect(0, 0, VW, VH);
            if (vmap) {
                const vW = Math.ceil(VW / SAMP), vH = Math.ceil(VH / SAMP);
                
                // Draw Cell Backgrounds (with distance fade)
                for (let y = 0; y < vH; y++) {
                    for (let x = 0; x < vW; x++) {
                        const ni = vmap[y * vW + x];
                        if (ni < 0 || !nodes[ni]) continue;
                        const n = nodes[ni];
                        const h = OP_DEF[n.op]?.hue || 205;
                        const dx = x * SAMP - n.x, dy = y * SAMP - n.y;
                        const d2 = dx*dx + dy*dy;
                        const fade = Math.max(0, 1 - d2 / (250*250));
                        const alpha = 0.05 + fade * 0.15;
                        
                        ctx.fillStyle = `hsla(${h}, 60%, 40%, ${alpha})`;
                        ctx.fillRect(x * SAMP, y * SAMP, SAMP, SAMP);
                    }
                }

                // Draw Cell Borders
                for (let y = 0; y < vH - 1; y++) {
                    for (let x = 0; x < vW - 1; x++) {
                        const c = vmap[y * vW + x], r = vmap[y * vW + x + 1], d = vmap[(y + 1) * vW + x];
                        if (c >= 0 && r >= 0 && c !== r) {
                            ctx.strokeStyle = `rgba(100, 170, 200, 0.2)`;
                            ctx.lineWidth = 0.5;
                            ctx.beginPath(); ctx.moveTo((x + 1) * SAMP, y * SAMP); ctx.lineTo((x + 1) * SAMP, (y + 1) * SAMP); ctx.stroke();
                        }
                        if (c >= 0 && d >= 0 && c !== d) {
                            ctx.strokeStyle = `rgba(100, 170, 200, 0.2)`;
                            ctx.lineWidth = 0.5;
                            ctx.beginPath(); ctx.moveTo(x * SAMP, (y + 1) * SAMP); ctx.lineTo((x + 1) * SAMP, (y + 1) * SAMP); ctx.stroke();
                        }
                    }
                }
            }

            ripples.forEach(r => {
                ctx.beginPath(); ctx.arc(r.x, r.y, r.r, 0, Math.PI * 2);
                ctx.strokeStyle = `rgba(212,168,75,${r.a})`; ctx.stroke();
            });

            nodes.forEach(n => {
                const isSel = selectedNode === n;
                const isHov = hovNode === n;
                ctx.beginPath(); ctx.arc(n.x, n.y, (isSel ? 8 : 5), 0, Math.PI * 2);
                ctx.fillStyle = REGIME_COLORS[n.regime] || '#d4a84b';
                ctx.fill();

                // Label Scramble
                ctx.font = '8px "IBM Plex Mono"';
                ctx.fillStyle = '#fff';
                let label = n.op.toUpperCase();
                if (tick % 5 === 0 && (isSel || isHov)) {
                    label = label.split('').map(c => Math.random() < 0.3 ? String.fromCharCode(33 + Math.floor(Math.random() * 60)) : c).join('');
                }
                ctx.fillText(label, n.x + 10, n.y);
            });

            if (aiming) {
                ctx.strokeStyle = '#d4a84b'; ctx.setLineDash([2, 2]);
                ctx.beginPath(); ctx.moveTo(aiming.x1, aiming.y1); ctx.lineTo(aiming.x2, aiming.y2); ctx.stroke();
                ctx.setLineDash([]);
            }

            drawXanaduConnectors();
        }

        function drawXanaduConnectors() {
            const oCanvas = document.getElementById('overlayCanvas');
            if (!oCanvas) return;
            const oCtx = oCanvas.getContext('2d');
            oCtx.clearRect(0, 0, VW, VH);
            if (!selectedNode) return;

            const xThread = document.getElementById('xanadu-thread');
            const cards = xThread.querySelectorAll('.x-card');
            cards.forEach(card => {
                const rect = card.getBoundingClientRect();
                const n = selectedNode;
                const startX = n.x, startY = n.y;
                const endX = rect.left, endY = rect.top + rect.height / 2;

                oCtx.beginPath();
                oCtx.moveTo(startX, startY);
                oCtx.bezierCurveTo(startX + (endX - startX) * 0.5, startY, endX - (endX - startX) * 0.5, endY, endX, endY);
                oCtx.strokeStyle = REGIME_COLORS[n.regime] || '#d4a84b';
                oCtx.lineWidth = 1.5;
                oCtx.globalAlpha = 0.4;
                oCtx.stroke();
                oCtx.globalAlpha = 1.0;
            });
        }

        async function runOp(from, to) {
            const op = to.op; const def = OP_DEF[op] || OP_DEF.site;
            const resText = await askOpenAI(def.sys, `From: ${from.text}\nTo: ${to.text}`, to);
            addChunk(to, resText);
        }

        function addChunk(node, text) {
            const wt = document.getElementById('world-text');
            if (!wt) return;
            const empty = wt.querySelector('.wt-empty'); if (empty) empty.remove();
            updateXanaduThread();

            const div = document.createElement('div');
            div.className = 'chunk';
            div.innerHTML = `
                <div class="chunk-meta">${node.op.toUpperCase()} // REGIME: ${node.regime.toUpperCase()}</div>
                <div class="chunk-text">${text}</div>
            `;
            wt.prepend(div);
            setTimeout(() => div.classList.add('seen'), 50);
        }

        function updateXanaduThread() {
            const thread = document.getElementById('xanadu-thread');
            const terId = document.getElementById('active-territory-id');
            if (!thread) return;

            if (!selectedNode) {
                thread.innerHTML = '<div class="wt-empty" style="opacity: 0.3; font-style: italic; padding: 20px;">Select a node to excavate its lineage...</div>';
                if (terId) terId.textContent = '—';
                return;
            }

            if (terId) {
                terId.textContent = `NODE_${selectedNode.id} // ${selectedNode.regime.toUpperCase()}`;
                terId.style.color = REGIME_COLORS[selectedNode.regime];
            }

            thread.innerHTML = `
                <div class="x-card active">
                    <div class="x-connector-dot" style="background:${REGIME_COLORS[selectedNode.regime]}"></div>
                    <div class="x-card-head">
                        <span>${selectedNode.op.toUpperCase()}</span>
                        <span>DEPTH: ${selectedNode.depth}</span>
                    </div>
                    <div class="x-card-body">${selectedNode.text.substring(0, 200)}...</div>
                </div>
            `;
        }

        function spawnInput() {
            const i = document.getElementById('bIn');
            if (!i || !i.value) return;
            addNode(i.value, curOp, VW / 2, VH / 2);
            i.value = '';
        }

        function setMode(m) { mode = m; document.getElementById('tbEx').classList.toggle('on', m === 'explore'); document.getElementById('tbFi').classList.toggle('on', m === 'fire'); }
        function pickOp(o) { curOp = o; document.getElementById('bOp').textContent = (OP_DEF[o]?.label || o.toUpperCase()) + ' ▾'; }
        function clearAll() { nodes = []; chunks = []; nodeCount = 0; cid = 0; compute(); draw(); updateXanaduThread(); }

        init();
    </script>
</body>

</html>
