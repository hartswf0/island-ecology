            const py = q(sFrom.y, midway.y, sTo.y, t);

            oCtx.save();
            oCtx.fillStyle = '#ffd700'; oCtx.shadowBlur = 10; oCtx.shadowColor = '#ffd700';
            oCtx.beginPath(); oCtx.arc(px, py, 4, 0, Math.PI*2); oCtx.fill();
            oCtx.restore();
        }

        function animateArrow(from, to, callback) {
            arrowAnim = { t: 0, from, to, onHit: callback };
        }

        // RESIZER
        let isResizing = false;
        const xCol = document.getElementById('xanaduCol');
        const xResizer = document.getElementById('xResizer');
        xResizer.addEventListener('mousedown', e => { isResizing = true; e.preventDefault(); });
        window.addEventListener('mousemove', e => {
            if (!isResizing) return;
            const newW = window.innerWidth - e.clientX;
            if (newW > 100 && newW < 800) xCol.style.width = newW + 'px';
            redraw();
        });
        window.addEventListener('mouseup', () => { isResizing = false; });
                
        canvas.addEventListener('wheel', e => {
            const za = e.deltaY * -0.001;
            const newZ = Math.min(Math.max(0.15, cam.z * (1 + za)), 4.5);
            const wp = toWorld(e.clientX, e.clientY);
            cam.z = newZ;
            const ts = toScreen(wp.x, wp.y);
            cam.x += (e.clientX - ts.x) / cam.z;
            cam.y += (e.clientY - ts.y) / cam.z;
            updateXanaduColumn();
        }, { passive: true });

        canvas.addEventListener('mousedown', e => {
            if (e.button === 2 || e.button === 1 || (e.shiftKey && mode === 'explore')) {
                isPanning = true; dragOX = e.clientX; dragOY = e.clientY; return;
            }
            const wp = toWorld(e.clientX, e.clientY);
            const n = nodeAt(wp.x, wp.y);
            if (!n) { selectNode(null); isPanning = true; dragOX = e.clientX; dragOY = e.clientY; return; }
            if (mode === 'fire') {
                aiming = { node: n, sx: n.x, sy: n.y, ex: e.clientX, ey: e.clientY };
                n.glowAnim = 0.5;
            } else {
                dragging = n; dragOX = wp.x - n.x; dragOY = wp.y - n.y; selectNode(n);
            }
            redraw();
        });

        canvas.addEventListener('mousemove', e => {
            if (isPanning) {
                cam.x += (e.clientX - dragOX) / cam.z; cam.y += (e.clientY - dragOY) / cam.z;
                dragOX = e.clientX; dragOY = e.clientY; updateXanaduColumn(); redraw(); return;
            }
            const wp = toWorld(e.clientX, e.clientY);
            const n = nodeAt(wp.x, wp.y);
            if (hoveredNode !== n) { hoveredNode = n; redraw(); }
            if (dragging) { dragging.x = wp.x - dragOX; dragging.y = wp.y - dragOY; redraw(); }
            if (aiming) { aiming.ex = e.clientX; aiming.ey = e.clientY; redraw(); }
        });

        canvas.addEventListener('mouseup', e => {
            isPanning = false; dragging = null;
            if (aiming) {
                const snap = { ...aiming }; aiming = null;
                const tw = toWorld(snap.ex, snap.ey);
                const target = nodeAt(tw.x, tw.y);
                if (target && target !== snap.node) {
                    // edges.push({ from: snap.node, to: target, resonance: 0.28, tension: 0.1 }); // This is now handled by animateArrow callback
                    hitNodes(snap.node, target);
                } else if (!target) {
                    showSpawnCtx(snap.ex, snap.ey, snap.node);
                }
                redraw();
            }
        });
        canvas.addEventListener('contextmenu', e => e.preventDefault());

        let ctxMenu = null;
        function showSpawnCtx(sx, sy, sourceNode) {
            if (ctxMenu) ctxMenu.remove();
            ctxMenu = document.createElement('div');
            ctxMenu.style.cssText = `position:fixed;z-index:20;background:rgba(6,10,16,.97);border:1px solid rgba(100,180,200,.22);min-width:168px;left:${sx}px;top:${sy}px;pointer-events:all`;
            ctxMenu.innerHTML = '<div style="padding:5px 10px;font-size:7px;letter-spacing:.1em;text-transform:uppercase;color:#ffd700">Route through operator →</div>';
            ['site', 'archaeologist', 'analyst', 'crate', 'hybrid', 'custom', 'aphorist', 'inverter', 'axiom', 'mind'].forEach(op => {
                const h = OP_HUE[op] ?? 200;
                const d = document.createElement('div');
                d.style.cssText = `display:flex;align-items:center;gap:8px;padding:7px 12px;cursor:pointer;font-size:8px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:rgba(100,180,200,.5);border-bottom:1px solid rgba(100,180,200,.06);transition:color .1s`;
                d.innerHTML = `<span style="width:6px;height:6px;border-radius:50%;background:hsl(${h},70%,50%);flex-shrink:0;display:inline-block"></span>${OP_LABELS[op]}`;
                d.onmouseenter = () => d.style.color = '#9dd8e8';
                d.onmouseleave = () => d.style.color = 'rgba(100,180,200,.5)';
                d.onclick = () => {
                    ctxMenu.remove(); ctxMenu = null;
                    const tw = toWorld(sx, sy);
                    const opNode = addNodeRaw(OP_LABELS[op] + '…', op, tw.x, tw.y);
                    edges.push({ from: sourceNode, to: opNode, resonance: 0.28, tension: 0.08 });
                    hapticBounce(opNode, 5);
                    hitNodes(sourceNode, opNode);
                };
                ctxMenu.appendChild(d);
            });
            document.body.appendChild(ctxMenu);
            setTimeout(() => document.addEventListener('click', function dismiss() {
                if (ctxMenu) { ctxMenu.remove(); ctxMenu = null; }
                document.removeEventListener('click', dismiss);
            }), 100);
        }

        // ═══════════════════════════════════════════
        // NODE MANAGEMENT & HUD
        // ═══════════════════════════════════════════
        function hapticBounce(node, strength = 8) {
            if (!node) return;
            const ang = Math.random() * Math.PI * 2;
            node.vx += Math.cos(ang) * strength; node.vy += Math.sin(ang) * strength; node.glowAnim = 1;
        }

        // Physics spring
        setInterval(() => {
            let nr = false;
            nodes.forEach(n => {
                if (Math.abs(n.vx) > 0.08 || Math.abs(n.vy) > 0.08) {
                    n.x += n.vx; n.y += n.vy; n.vx *= 0.82; n.vy *= 0.82; nr = true;
                }
                if (n.glowAnim > 0) { n.glowAnim = Math.max(0, n.glowAnim - 0.024); nr = true; }
                if (n.runAnim > 0) { n.runAnim = Math.max(0, n.runAnim - 0.007); nr = true; }
            });
            if (nr) redraw();
        }, 16);

        function addNodeRaw(text, op, x, y) {
            const n = makeNode(text, op, x, y);
            nodes.push(n);
            document.getElementById('statNodes').textContent = nodes.filter(n => n.lifecycle_state !== 'COLLAPSED').length;
            return n;
        }

        function addNode(text, op, x, y) {
            const n = addNodeRaw(text, op, x, y);
            updateXanaduColumn();
            return n;
        }

        function selectNode(n) {
            selectedNode = n;
            if (n) hapticBounce(n, 3);
            updateXanaduColumn();
        }

        function clearAll() {
            nodes = []; edges = []; packets = []; selectedNode = null;
            tick = 0; ecologistDirective = null;
            document.getElementById('statNodes').textContent = '0';
            document.getElementById('statTick').textContent = '0';
            updateXanaduColumn();
        }

        let currentOp = 'site';
        function pickOp(op, btn) {
            currentOp = op;
            document.querySelectorAll('.op-p').forEach(b => b.classList.remove('sel'));
            if (btn && btn.classList.contains('op-p')) btn.classList.add('sel');
            document.querySelectorAll('.lnav-btn').forEach(b => {
                const title = b.getAttribute('title');
                if (title && title.toUpperCase() === (OP_LABELS[op] || op).toUpperCase()) b.classList.add('active');
                else if (title && title !== 'Voronoi view') b.classList.remove('active');
            });
            document.getElementById('bOp').textContent = (OP_LABELS[op] || op) + ' ▾';
            document.getElementById('statOp').textContent = OP_LABELS[op] || op;
            document.getElementById('opPicker').style.display = 'none';
        }

        function quickOp(op) {
            const btn = Array.from(document.querySelectorAll('.op-p')).find(b => b.dataset.op === op);
            pickOp(op, btn);
        }

        function toggleOpPicker() {
            const p = document.getElementById('opPicker');
            p.style.display = p.style.display === 'flex' ? 'none' : 'flex';
        }
        function bKey(e) { if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') { e.preventDefault(); spawnFromInput(); } }
        function spawnFromInput() {
            const ta = document.getElementById('bInput');
            const val = ta.value.trim(); if (!val) return;
            const wp = toWorld(W / 2 + (Math.random() * 100 - 50), H / 2 + (Math.random() * 100 - 50));
            const n = addNode(val, currentOp, wp.x, wp.y);
            hapticBounce(n, 6); ta.value = '';
            // Auto-connect to selected
            if (selectedNode && selectedNode !== n && selectedNode.lifecycle_state !== 'COLLAPSED') {
                edges.push({ from: selectedNode, to: n, resonance: 0.28, tension: 0.08 });
                hitNodes(selectedNode, n);
            }
        }

        // ═══════════════════════════════════════════
        // INIT
        // ═══════════════════════════════════════════
        loadApiKey();
        resize();

        const n4 = addNodeRaw("Generative interface as design fiction site", 'site', 130, 150);
        n4.dynamic_scalars = { bloom: 0.28, signal: 0.2 }; n4.harmonicSignature.regime = 'bloom'; n4.harmonicSignature.motifs = ['bloom', 'signal'];

        edges.push({ from: n3, to: n4, resonance: 0.38, tension: 0.08 });
        edges.push({ from: n1, to: n2, resonance: 0.22, tension: 0.18 });
        edges.push({ from: n2, to: n3, resonance: 0.25, tension: 0.12 });

        document.getElementById('statNodes').textContent = nodes.length;
        updateXanaduColumn();
        requestAnimationFrame(engineLoop);
    </script>
<script src="../mobile.js"></script>
</body>
