        // ══════════════════════════════
        // VORONOI (OPTIMIZED PATH-BASED)
        // ══════════════════════════════
        let voronoi = null;
        function computeV() {
            const activeNodes = activeIso === 'all' ? nodes : nodes.filter(n => n.op === activeIso);
            if (!activeNodes.length) { voronoi = null; nbMap.clear(); return; }
            
            // D3 Delaunay is orders of magnitude faster than pixel-looping
            const points = activeNodes.map(n => [n.x * camZ + camX, n.y * camZ + camY]);
            const delaunay = d3.Delaunay.from(points);
            voronoi = delaunay.voronoi([0, 0, VW, VH]);
            
            buildNbMap(delaunay);
        }

        function buildNbMap(delaunay) {
            nbMap.clear(); nodes.forEach(n => nbMap.set(n.id, new Map()));
            const activeNodes = activeIso === 'all' ? nodes : nodes.filter(n => n.op === activeIso);
            
            // Use delaunay neighbors directly for O(1) adjacency lookup
            for (let i = 0; i < activeNodes.length; i++) {
                const n1 = activeNodes[i];
                for (const neighborIndex of delaunay.neighbors(i)) {
                    const n2 = activeNodes[neighborIndex];
                    if (n2) {
                        // Restore dynamic affinity based on Delaunay distance
                        // Lower distance = Higher affinity (simulating border length)
                        const dx = n1.x - n2.x, dy = n1.y - n2.y;
                        const dist = Math.sqrt(dx * dx + dy * dy) || 1;
                        const affinity = 1000 / dist; 
                        nbMap.get(n1.id).set(n2.id, affinity); 
                    }
                }
            }
        }

        function getNbs(node) {
            const m = nbMap.get(node.id); if (!m) return [];
            return [...m.entries()].map(([id, len]) => ({ node: nodes.find(n => n.id === id), len })).filter(x => x.node);
        }

        function buildCtx(opNode) {
            const nbs = getNbs(opNode); if (!nbs.length) return '';
            let mL = Math.max(...nbs.map(x => x.len), 1);
            // If all neighbors are roughly equal, force the scale up to create relative difference
            const allLens = nbs.map(x => x.len);
            const deviation = Math.max(...allLens) - Math.min(...allLens);
            if (deviation < 5) mL *= 1.4; 

            const rel = nbs
                .map(({ node, len }) => ({ node, pct: Math.round(len / mL * 100) }))
                .filter(x => x.pct >= 12).sort((a, b) => b.pct - a.pct).slice(0, 3);
            if (!rel.length) return '';
            rel.forEach(({ pct }) => sndNeighbor(pct / 100));
            return '\n\nSPATIAL CONTEXT — neighboring nodes (higher % = stronger influence on output):\n' +
                rel.map(({ node, pct }) => `- ${opLbl(node.op)} N${node.id} (${pct}% border affinity): "${node.text.slice(0, 110)}"`).join('\n') +
                '\nLet these contexts inflect the direction of your narrative analysis.';
        }

        // ══════════════════════════════
        // PHYSICS
        // ══════════════════════════════
        function physTick() {
            let dirty = false;
            nodes.forEach(n => {
                if (Math.abs(n.vx) > .05 || Math.abs(n.vy) > .05) {
                    n.x += n.vx; n.y += n.vy; n.vx *= .8; n.vy *= .8;
                    n.x = Math.max(44, Math.min(VW - 44, n.x)); n.y = Math.max(44, Math.min(VH - 44, n.y));
                    dirty = true;
                }
                if (n.glow > 0) { n.glow = Math.max(0, n.glow - .014); dirty = true; }
                if (n.run > 0) { n.run += .04; dirty = true; }
            });
            ripples.forEach(r => { if (r.active) dirty = true; });
            if (dirty) { computeV(); redrawV(); }
            else phRunning = false;
        }
        function startPhys() { if (!phRunning) { phRunning = true; requestAnimationFrame(function L() { physTick(); if (phRunning) requestAnimationFrame(L); }); } }
        function hapPush(n, fx, fy, str = 8) { const dx = n.x - fx, dy = n.y - fy, d = Math.sqrt(dx * dx + dy * dy) || 1; n.vx += (dx / d) * str; n.vy += (dy / d) * str; n.glow = 1; startPhys(); }
        function hapSpawnNode(n, str = 4) { n.vx = (Math.random() - .5) * str; n.vy = (Math.random() - .5) * str; n.glow = .6; startPhys(); }

        function fireRipple(ni, s = 1) {
            if (ni < 0) return;
            const visited = new Set([ni]); const q = [{ ni, t: 0, s }];
            while (q.length) {
                const { ni: i, t, s: rs } = q.shift(); const n = nodes[i]; if (!n) continue;
                ripples.push({ ni: i, t0: performance.now() + t * 88, dur: 650 + t * 48, s: rs, active: true });
                n.glow = Math.max(n.glow, .35 * rs);
                sndRipple(opH(n.op)); hapRipple();
                if (rs > .1) {
                    const nbs = getNbs(n); let mL = Math.max(...nbs.map(x => x.len), 1);
                    nbs.forEach(({ node: nb, len }) => {
                        const j = nodes.indexOf(nb);
                        if (j >= 0 && !visited.has(j)) { visited.add(j); q.push({ ni: j, t: t + 1, s: rs * (.25 + len / mL * .35) }); }
                    });
                }
            }
            startPhys();
        }

        // ══════════════════════════════
        // DRAW
        // ══════════════════════════════
        function redrawV() {
            ctx.clearRect(0, 0, VW, VH);
            ctx.fillStyle = isLight ? '#f7f3ec' : '#07090f'; ctx.fillRect(0, 0, VW, VH);
            
            if (voronoi && nodes.length) { drawCells(); drawBorders(); }
            
            ctx.save();
            ctx.translate(camX, camY);
            ctx.scale(camZ, camZ);
            
            drawGrid();
            if (selNode) drawAff();
            drawEdges(); drawRips();
            if (aiming) drawAim();
            if (arrowAnims.length) drawArrF();
            drawTransclusionBeam();
            drawLabels();
            
            ctx.restore();
        }

        function drawGrid() {
            ctx.save();
            ctx.strokeStyle = isLight ? 'rgba(80,60,30,.07)' : 'rgba(25,45,70,.09)'; ctx.lineWidth = 1 / camZ;
            const g = 26;
            // Draw grid far beyond raw VW/VH to support panning
            const ex = Math.max(VW / camZ, 6000), ey = Math.max(VH / camZ, 6000);
            for (let x = -3000; x < ex; x += g) { ctx.beginPath(); ctx.moveTo(x, -3000); ctx.lineTo(x, ey); ctx.stroke(); }
            for (let y = -3000; y < ey; y += g) { ctx.beginPath(); ctx.moveTo(-3000, y); ctx.lineTo(ex, y); ctx.stroke(); }
            ctx.restore();
        }

        function getRip(ni) {
            const now = performance.now(); let r = 0;
            for (const rp of ripples) {
                if (rp.ni !== ni || !rp.active) continue;
                const t = (now - rp.t0) / rp.dur;
                if (t >= 0 && t < 1) r += rp.s * (1 - t);
                else if (t >= 1) rp.active = false;
            }
            return Math.min(r, 1);
        }

        function drawCells() {
            const activeNodes = activeIso === 'all' ? nodes : nodes.filter(n => n.op === activeIso);
            const aimH = aiming ? opH(curOp) : 0;
            
            activeNodes.forEach((n, i) => {
                const path = voronoi.renderCell(i);
                if (!path) return;
                
                let baseH = n.hue !== undefined ? n.hue : opH(n.op);
                const rip = getRip(nodes.indexOf(n));
                const isSel = selNode === n, isHov = hovNode === n;
                const isAimTarget = aiming && isHov && aiming.srcNode !== n;
                const lum = isLight ? 70 : 35;
                const draftFader = n.draft ? 0.3 : 1;
                let baseAlpha = (.25 + (isSel ? .1 : 0) + (isHov ? .08 : 0) + rip * .2) * draftFader;

                ctx.beginPath();
                voronoi.renderCell(i, ctx);
                
                if (isAimTarget) {
                    const aimPulse = 0.4 + Math.sin(Date.now() / 100) * 0.15;
                    ctx.fillStyle = hsl(aimH, 80, isLight ? 75 : 45, baseAlpha + aimPulse);
                } else if (hoverCardNodeId == n.id) {
                    ctx.fillStyle = hsl(baseH, 80, lum + 15, baseAlpha + 0.3);
                } else if (hoverCardFid == n.id) {
                    ctx.fillStyle = hsl(baseH, 60, lum + 5, baseAlpha + 0.15);
                } else {
                    ctx.fillStyle = hsl(baseH, 65, lum + (isSel ? 8 : 0) + rip * 13, baseAlpha);
                }
                ctx.fill();
            });
        }

        function drawBorders() {
            ctx.beginPath();
            voronoi.renderBounds(ctx);
            ctx.strokeStyle = isLight ? 'rgba(0,0,0,0.1)' : 'rgba(255,255,255,0.05)';
            ctx.lineWidth = 0.5;
            ctx.stroke();

            ctx.beginPath();
            voronoi.render(ctx);
            ctx.strokeStyle = isLight ? 'rgba(0,0,0,0.15)' : 'rgba(255,255,255,0.1)';
            ctx.lineWidth = 1;
            ctx.stroke();
        }

        function drawTransclusionBeam() {
            if (!linksOn) return;
            const connections = [];
            const vpRect = canvas.getBoundingClientRect();
            const wtBd = document.getElementById('wtBd').getBoundingClientRect();

            const getCardY = (card) => {
                const cr = card.getBoundingClientRect();
                if (cr.bottom < wtBd.top || cr.top > wtBd.bottom) return null;
                return Math.max(0, Math.min(VH, cr.top - vpRect.top + cr.height / 2));
            };

            if (hoverCardNodeId) {
                const hn = nodes.find(n => n.id == hoverCardNodeId);
                const sn = nodes.find(n => n.id == hoverCardFid);
                const card = document.querySelector(`.ocard[data-nid="${hoverCardNodeId}"]`);
                if (card) {
                    const targetY = getCardY(card);
                    if (targetY !== null) {
                        if (hn) connections.push({ n: hn, targetY, isSource: false, active: true });
                        if (sn) connections.push({ n: sn, targetY, isSource: true, active: true });
                    }
                }
            }

            const activeNode = hovNode || (!hoverCardNodeId && selNode ? selNode : null);
            if (activeNode && !hoverCardNodeId) {
                const cards = document.querySelectorAll(`.ocard[data-nid="${activeNode.id}"], .ocard[data-fid="${activeNode.id}"]`);
                cards.forEach(c => {
                    const targetY = getCardY(c);
                    if (targetY !== null) {
                        const isSource = c.dataset.fid == activeNode.id;
                        connections.push({ n: activeNode, targetY, isSource, active: hovNode === activeNode });
                    }
                });
            }

            ctx.save();
            connections.forEach(({ n, targetY, isSource, active }) => {
                const h = opH(n.op);
                const endX = VW;

                ctx.beginPath();
                ctx.moveTo(n.x, n.y);
                const cpDist = Math.max(100, (endX - n.x) * 0.6);
                ctx.bezierCurveTo(n.x + cpDist, n.y, endX - cpDist, targetY, endX, targetY);

                if (isSource) {
                    ctx.strokeStyle = hsl(h, 60, 50, active ? 0.6 : 0.2);
                    ctx.lineWidth = active ? 2 : 1;
                    ctx.setLineDash([4, 4]);
                } else {
                    const grad = ctx.createLinearGradient(n.x, 0, endX, 0);
                    grad.addColorStop(0, hsl(h, 80, 60, 0.05));
                    grad.addColorStop(1, hsl(h, 80, 60, active ? 0.8 : 0.3));
                    ctx.strokeStyle = grad;
                    ctx.lineWidth = active ? 4 : 2;
                    ctx.setLineDash([]);
                    if (active) {
                        ctx.shadowBlur = 10;
                        ctx.shadowColor = hsl(h, 80, 60, 0.8);
                    }
                }
                ctx.stroke();
                ctx.shadowBlur = 0;

                ctx.beginPath();
                ctx.arc(endX - 3, targetY, isSource ? 2 : 4, 0, Math.PI * 2);
                ctx.fillStyle = hsl(h, 80, 60, active ? 1 : 0.4);
                ctx.fill();
            });
            ctx.restore();
        }

        function drawAff() {
            const nbs = getNbs(selNode); if (!nbs.length) return;
            let mL = Math.max(...nbs.map(x => x.len), 1);
            nbs.forEach(({ node, len }) => {
                const pct = len / mL; if (pct < .08) return;
                const h1 = selNode.hue !== undefined ? selNode.hue : opH(selNode.op);
                const h2 = node.hue !== undefined ? node.hue : opH(node.op);
                ctx.save();
                const grad = ctx.createLinearGradient(selNode.x, selNode.y, node.x, node.y);
                grad.addColorStop(0, hsl(h1, 80, 60, pct * 0.8 + 0.1));
                grad.addColorStop(1, hsl(h2, 80, 60, pct * 0.8 + 0.1));
                ctx.strokeStyle = grad;
                ctx.lineWidth = 1.0;
                if (node.draft || selNode.draft) ctx.setLineDash([2, 4]);
                ctx.beginPath(); ctx.moveTo(selNode.x, selNode.y); ctx.lineTo(node.x, node.y); ctx.stroke();
                
                // Crisp molecular percentage readouts
                const mx = (selNode.x + node.x) / 2, my = (selNode.y + node.y) / 2;
                ctx.font = `600 7px 'IBM Plex Mono',monospace`; ctx.textAlign = 'center';
                ctx.fillStyle = isLight ? `rgba(20,20,30,${pct * .7 + .3})` : `rgba(220,240,255,${pct * .7 + .3})`;
                ctx.fillText(Math.round(pct * 100) + '%', mx, my - 4);
                
                ctx.restore();
            });
        }

        function drawRips() {
            const now = performance.now();
            ripples.forEach(rp => {
                const t = (now - rp.t0) / rp.dur;
                if (t < 0) { rp.active = true; return; } if (t > 1) { rp.active = false; return; } rp.active = true;
                const n = nodes[rp.ni]; if (!n) return;
                ctx.save(); ctx.strokeStyle = opC(n.op, 78, (1 - t) * rp.s * .36); ctx.lineWidth = 1;
                ctx.beginPath(); ctx.arc(n.x, n.y, 24 + t * 40, 0, Math.PI * 2); ctx.stroke(); ctx.restore();
            });
        }

        function drawLabels() {
            // Proximity flashlight: only render labels for Worlds, Selected Node, and Hovered Node + Neighbors
            let showL = new Set();
            if (hovNode) { showL.add(hovNode); getNbs(hovNode).forEach(x => showL.add(x.node)); }
            if (selNode) { showL.add(selNode); getNbs(selNode).forEach(x => showL.add(x.node)); }
            
            nodes.forEach((n, ni) => {
                const isIsolated = activeIso === 'all' || n.op === activeIso;
                const isoFader = isIsolated ? 1 : 0.15;
                const h = n.hue !== undefined ? n.hue : opH(n.op); const isSel = selNode === n, isHov = hovNode === n; const rip = getRip(ni);
                ctx.save();
                
                const draftFader = (n.draft ? 0.6 : 1) * isoFader;
                ctx.fillStyle = isLight ? hsl(h, 65, 32, (.75 + rip * .2) * draftFader) : hsl(h, 75, 60, (.7 + rip * .28) * draftFader);
                ctx.strokeStyle = isLight ? hsl(h, 75, 20, isoFader) : hsl(h, 85, 80, isoFader);
                ctx.lineWidth = 1.0;

                const r = (isSel ? 8 : isHov ? 5 : 3.5);
                ctx.beginPath(); 
                
                // Color-coded Molecule System (No Symbols)
                if (n.op === 'site') { // World: Large Glowing Nucleus
                    ctx.arc(n.x, n.y, r * 1.8, 0, Math.PI * 2);
                    ctx.fillStyle = hsl(h, 80, 50, 0.4); ctx.fill();
                    ctx.strokeStyle = hsl(h, 90, 70, 0.9); ctx.lineWidth = 1.5; ctx.stroke();
                    ctx.beginPath(); ctx.arc(n.x, n.y, r * 0.6, 0, Math.PI * 2); ctx.fillStyle = hsl(h, 100, 80, 1); ctx.fill();
                } else if (n.op === 'inverter') { // Location: Intermediate structural node
                    ctx.arc(n.x, n.y, r * 1.3, 0, Math.PI * 2); ctx.fillStyle = hsl(h, 70, 60, 0.8); ctx.fill();
                    ctx.strokeStyle = hsl(h, 50, 40, 0.9); ctx.stroke();
                } else if (n.op === 'analyst') { // State: Hollow catalytic ring
                    ctx.arc(n.x, n.y, r * 1.0, 0, Math.PI * 2); ctx.strokeStyle = hsl(h, 80, 60, 1); ctx.lineWidth = 2.0; ctx.stroke();
                } else { // Entity / Aphorist: Solid elemental particle
                    ctx.arc(n.x, n.y, r * 0.9, 0, Math.PI * 2); ctx.fillStyle = hsl(h, 90, 70, 1); ctx.fill();
                }

                if (isSel) {
                    ctx.beginPath(); ctx.arc(n.x, n.y, 14, 0, Math.PI * 2);
                    ctx.strokeStyle = hsl(h, 70, 60, .25); ctx.lineWidth = 1.2;
                    if (n.draft) ctx.setLineDash([2, 3]);
                    ctx.stroke();
                }
                if (n.run > 0) {
                    const a = n.run; ctx.beginPath(); ctx.arc(n.x, n.y, 18, a, a + Math.PI * .7);
                    ctx.strokeStyle = hsl(h, 85, 65, .65); ctx.lineWidth = 2; ctx.stroke();
                }

                if (n.op === 'site' || showL.has(n)) {
                    ctx.textAlign = 'center';
                    // Text scales physically as user zooms (molecular label sizing)
                    ctx.font = `${n.draft ? 'italic' : '600'} ${(isSel ? 9 : 6)}px 'IBM Plex Mono',monospace`;
                    ctx.fillStyle = isLight ? hsl(h, 60, 20, (.7 + (isSel ? .3 : 0)) * draftFader) : hsl(h, 30, 90, (.85 + (isSel ? .15 : 0)) * draftFader);
                    const isPOML = (n.op === 'site' || n.op === 'inverter' || n.op === 'aphorist' || n.op === 'analyst');
                    let shortName = isPOML ? n.text : opLbl(n.op);
                    if (shortName.length > 30) shortName = shortName.slice(0, 30) + '…';
                    ctx.fillText(n.draft ? `[DRAFT]` : shortName, n.x, n.y - (r * 2.5) - 4);
                }
                ctx.restore();
            });
        }

        function drawEdges() {
            ctx.save(); ctx.setLineDash([2, 8]);
            edges.forEach(e => {
                const a = e.from, b = e.to; if (!a || !b) return;
                const isIsolated = activeIso === 'all' || a.op === activeIso || b.op === activeIso;
                const isoFader = isIsolated ? 1 : 0.1;
                const g = ctx.createLinearGradient(a.x, a.y, b.x, b.y);
                const draftFader = (a.draft || b.draft) ? 0.3 : 1;
                g.addColorStop(0, opC(a.op, 60, .1 * draftFader * isoFader)); g.addColorStop(1, opC(b.op, 60, .05 * draftFader * isoFader));
                ctx.strokeStyle = g; ctx.lineWidth = .7 / camZ;
                ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y); ctx.stroke();
            });
            ctx.setLineDash([]); ctx.restore();
        }

        // ══════════════════════════════
        // AIM + ARROW
        // ══════════════════════════════
        function arcCtrl(x1, y1, x2, y2) { const dx = x2 - x1, dy = y2 - y1, d = Math.sqrt(dx * dx + dy * dy) || 1, h = Math.min(d * .27, 125); return { x: (x1 + x2) / 2 + (-dy / d) * h, y: (y1 + y2) / 2 + (dx / d) * h }; }
        function bezP(x1, y1, cx, cy, x2, y2, t) { return { x: (1 - t) ** 2 * x1 + 2 * (1 - t) * t * cx + t ** 2 * x2, y: (1 - t) ** 2 * y1 + 2 * (1 - t) * t * cy + t ** 2 * y2 }; }
        function bezT(x1, y1, cx, cy, x2, y2, t) { return { x: 2 * (1 - t) * (cx - x1) + 2 * t * (x2 - cx), y: 2 * (1 - t) * (cy - y1) + 2 * t * (y2 - cy) }; }

        function drawAim() {
            const { sx, sy, ex, ey } = aiming;
            const dist = Math.sqrt((ex - sx) ** 2 + (ey - sy) ** 2); if (dist < 5) return;
            const cp = arcCtrl(sx, sy, ex, ey); const h = opH(curOp);
            ctx.save();
            ctx.setLineDash([3, 7]); ctx.strokeStyle = hsl(h, 65, 55, .22); ctx.lineWidth = 1;
            ctx.beginPath(); ctx.moveTo(sx, sy); ctx.quadraticCurveTo(cp.x, cp.y, ex, ey); ctx.stroke(); ctx.setLineDash([]);
            const pwr = Math.min(dist / 360, 1);
            ctx.strokeStyle = hsl(h, 70, 55, .12 + pwr * .2); ctx.lineWidth = .8;
            ctx.beginPath(); ctx.arc(sx, sy, 5 + pwr * 6, 0, Math.PI * 2); ctx.stroke();
            if (hovNode && hovNode !== aiming.srcNode) {
                const th = opH(hovNode.op);
                ctx.strokeStyle = hsl(th, 75, 62, .72); ctx.lineWidth = 1.2;
                ctx.beginPath(); ctx.arc(ex, ey, 12, 0, Math.PI * 2); ctx.stroke();
                for (let i = 0; i < 4; i++) { const a = i / 4 * Math.PI * 2; ctx.beginPath(); ctx.moveTo(ex + Math.cos(a) * 15, ey + Math.sin(a) * 15); ctx.lineTo(ex + Math.cos(a) * 20, ey + Math.sin(a) * 20); ctx.stroke(); }
                setMsg(`Release → <em>${opLbl(curOp)}</em> redesigns <strong>${opLbl(hovNode.op)} N${hovNode.id}</strong>`, 'aim');
            } else {
                ctx.fillStyle = hsl(h, 65, 55, .25); ctx.beginPath(); ctx.arc(ex, ey, 2.5, 0, Math.PI * 2); ctx.fill();
            }
            ctx.restore();
        }

        function drawArrF() {
            arrowAnims.forEach(arrowAnim => {
                const { x1, y1, x2, y2, t, h } = arrowAnim;
                const cp = arcCtrl(x1, y1, x2, y2); const s = Math.min(t, 1);
                ctx.save();
                ctx.beginPath(); ctx.moveTo(x1, y1);
                const steps = Math.max(2, Math.floor(s * 46));
                for (let i = 1; i <= steps; i++) { const p = i / steps * s; const b = bezP(x1, y1, cp.x, cp.y, x2, y2, p); ctx.lineTo(b.x, b.y); }
                const g = ctx.createLinearGradient(x1, y1, x2, y2);
                g.addColorStop(0, hsl(h, 70, 55, 0)); g.addColorStop(Math.max(.01, s - .28), hsl(h, 70, 55, .04)); g.addColorStop(s, hsl(h, 70, 55, .52));
                ctx.strokeStyle = g; ctx.lineWidth = 1.4; ctx.setLineDash([]); ctx.stroke();
                const b = bezP(x1, y1, cp.x, cp.y, x2, y2, s); const tan = bezT(x1, y1, cp.x, cp.y, x2, y2, s); const ang = Math.atan2(tan.y, tan.x);
                ctx.strokeStyle = hsl(h, 70, 60, .85); ctx.lineWidth = 1.8;
                ctx.beginPath(); ctx.moveTo(b.x - Math.cos(ang) * 11, b.y - Math.sin(ang) * 11); ctx.lineTo(b.x, b.y); ctx.stroke();
                ctx.fillStyle = hsl(h, 75, 65, .95); ctx.beginPath();
                ctx.moveTo(b.x + Math.cos(ang) * 7, b.y + Math.sin(ang) * 7);
                ctx.lineTo(b.x - Math.cos(ang) * 2 + Math.cos(ang + 1.6) * 3.8, b.y - Math.sin(ang) * 2 + Math.sin(ang + 1.6) * 3.8);
                ctx.lineTo(b.x - Math.cos(ang) * 2 + Math.cos(ang - 1.6) * 3.8, b.y - Math.sin(ang) * 2 + Math.sin(ang - 1.6) * 3.8);
                ctx.closePath(); ctx.fill();
                ctx.strokeStyle = hsl(h, 65, 52, .5); ctx.lineWidth = .8;
                const fx = b.x - Math.cos(ang) * 11, fy = b.y - Math.sin(ang) * 11;
                [[.38, 3.2], [.58, -3.2]].forEach(([f, side]) => { ctx.beginPath(); ctx.moveTo(fx, fy); ctx.lineTo(fx + (b.x - fx) * f + Math.cos(ang + Math.PI / 2) * side, fy + (b.y - fy) * f + Math.sin(ang + Math.PI / 2) * side); ctx.stroke(); });
                if (s > .32) { [.93, .86, .79].forEach((sp, i) => { const bp = bezP(x1, y1, cp.x, cp.y, x2, y2, sp); ctx.fillStyle = hsl(h, 70, 55, .26 - i * .08); ctx.beginPath(); ctx.arc(bp.x + (Math.random() - .5) * 2, bp.y + (Math.random() - .5) * 2, 1, 0, Math.PI * 2); ctx.fill(); }); }
                ctx.restore();
            });
        }

        function shootArr(x1, y1, x2, y2, h, cb) {
            const dist = Math.sqrt((x2 - x1) ** 2 + (y2 - y1) ** 2);
            const spd = Math.min(.05, 90 / dist) + .018;
            const anim = { x1, y1, x2, y2, t: 0, h };
            arrowAnims.push(anim);
            sndFire(); hapFire();
            const go = () => {
                anim.t += spd; redrawV();
                if (anim.t < 1) { requestAnimationFrame(go); }
                else {
                    arrowAnims = arrowAnims.filter(a => a !== anim);
                    let ht = 0;
                    const imp = () => {
                        ht += .07;
                        ctx.save(); ctx.strokeStyle = hsl(h, 75, 60, (1 - ht) * .65); ctx.lineWidth = 1.5;
                        ctx.beginPath(); ctx.arc(x2, y2, 42 * ht, 0, Math.PI * 2); ctx.stroke();
                        ctx.strokeStyle = hsl(h, 75, 60, (1 - ht) * .28); ctx.lineWidth = .9;
                        ctx.beginPath(); ctx.arc(x2, y2, 24 * ht, 0, Math.PI * 2); ctx.stroke();
                        for (let i = 0; i < 8; i++) { const a = i / 8 * Math.PI * 2, sr = 8 + 28 * ht; ctx.strokeStyle = hsl(h, 75, 60, (1 - ht) * .32); ctx.lineWidth = .7; ctx.beginPath(); ctx.moveTo(x2 + Math.cos(a) * 9, y2 + Math.sin(a) * 9); ctx.lineTo(x2 + Math.cos(a) * sr, y2 + Math.sin(a) * sr); ctx.stroke(); }
                        ctx.restore();
                        if (ht < 1) requestAnimationFrame(imp); else { redrawV(); cb && cb(); }
                    }; imp();
                }
            }; requestAnimationFrame(go);
        }

        // ══════════════════════════════
        // POINTER EVENTS
        // ══════════════════════════════
        function evP(e) { if (e.touches) return { x: e.touches[0].clientX, y: e.touches[0].clientY }; return { x: e.clientX, y: e.clientY }; }
        function toWorld(p) { return { x: (p.x - camX) / camZ, y: (p.y - camY) / camZ }; }
        function nodeAt(wx, wy) { let best = null, bd = Infinity; nodes.forEach(n => { const d = (wx - n.x) ** 2 + (wy - n.y) ** 2; if (d < bd) { bd = d; best = n; } }); return best && bd < Math.pow(72 / camZ, 2) ? best : null; }

        let tMoved = false, tLong = false, longT = null, tStart = null;

        canvas.addEventListener('wheel', e => {
            e.preventDefault();
            const p = evP(e);
            const delta = -e.deltaY * 0.002;
            if (delta === 0) return;
            
            const wp = toWorld(p);
            camZ = Math.max(0.1, Math.min(6, camZ * Math.exp(delta)));
            
            camX = p.x - wp.x * camZ;
            camY = p.y - wp.y * camZ;
            
            computeV();
            redrawV();
        }, { passive: false });

        canvas.addEventListener('mousedown', e => { if (e.button === 2) return; ptrDn(evP(e), e.shiftKey || mode === 'fire'); });
        canvas.addEventListener('mousemove', e => ptrMv(evP(e)));
        canvas.addEventListener('mouseup', e => ptrUp(evP(e)));
        canvas.addEventListener('contextmenu', e => { e.preventDefault(); const p = evP(e); const wp = toWorld(p); const n = nodeAt(wp.x, wp.y); n ? showNodeCtx(p.x, p.y, n) : showSpawnCtx(p.x, p.y, null); });

        canvas.addEventListener('touchstart', e => {
            e.preventDefault();
            const p = { x: e.touches[0].clientX, y: e.touches[0].clientY };
            tStart = p; tMoved = false; tLong = false;
            const wp = toWorld(p); const n = nodeAt(wp.x, wp.y);
            longT = setTimeout(() => { if (!tMoved) { tLong = true; hapFire(); n ? showNodeCtx(p.x, p.y, n) : showSpawnCtx(p.x, p.y, null); } }, 520);
        }, { passive: false });

        canvas.addEventListener('touchmove', e => {
            e.preventDefault(); if (tLong) return;
            const p = { x: e.touches[0].clientX, y: e.touches[0].clientY };
            if (!tMoved) {
                const dx = p.x - tStart.x, dy = p.y - tStart.y;
                if (Math.sqrt(dx * dx + dy * dy) > 7) { tMoved = true; clearTimeout(longT); ptrDn(tStart, mode === 'fire'); }
            }
            if (tMoved) ptrMv(p);
        }, { passive: false });

        canvas.addEventListener('touchend', e => {
            e.preventDefault(); clearTimeout(longT);
            const p = e.changedTouches ? { x: e.changedTouches[0].clientX, y: e.changedTouches[0].clientY } : tStart;
            if (tLong) return;
            if (!tMoved) {
                const wp = toWorld(p); const n = nodeAt(wp.x, wp.y);
                if (n) selectNode(n);
                else { selNode = null; document.getElementById('selSt').style.display = 'none'; highlightCards(null); redrawV(); }
            } else ptrUp(p);
        }, { passive: false });

        function ptrDn(p, fire) {
            const wp = toWorld(p);
            const n = nodeAt(wp.x, wp.y); 
            if (!n) {
                isPanning = true;
                panStart = { x: p.x - camX, y: p.y - camY };
                return;
            }
            if (fire) {
                aiming = { srcNode: n, sx: n.x, sy: n.y, ex: wp.x, ey: wp.y };
                setMsg(`<em>${opLbl(curOp)}</em> nocked from <strong>${opLbl(n.op)} N${n.id}</strong> — drag to target`, 'aim');
                lastDragCell = nodes.indexOf(n);
                const aimLoop = () => { if (aiming) { redrawV(); aimPulseAnim = requestAnimationFrame(aimLoop); } };
                aimLoop();
            } else {
                dragging = n; dox = wp.x - n.x; doy = wp.y - n.y;
                lastDragCell = nodes.indexOf(n);
                selectNode(n);
                startDragSound();
            }
        }

        function ptrMv(p) {
            if (isPanning) {
                camX = p.x - panStart.x;
                camY = p.y - panStart.y;
                computeV();
                redrawV();
                return;
            }
            
            const wp = toWorld(p);
            
            if (dragging) {
                dragging.x = wp.x - dox; dragging.y = wp.y - doy;
                computeV(); redrawV();
                const now = Date.now();
                if (voronoi && now - lastDrgSnd > 260) {
                    const curCell = voronoi.delaunay.find(wp.x, wp.y);
                    if (curCell >= 0 && curCell !== lastDragCell) { lastDragCell = curCell; lastDrgSnd = now; borderSound(); hapBorder(); }
                }
                return;
            }

            if (aiming && p.x < 220) {
                const qvBtn = document.elementFromPoint(p.x, p.y)?.closest('.qv');
                if (qvBtn) {
                    const newOp = qvBtn.dataset.op;
                    if (newOp !== curOp) {
                        curOp = newOp; buildQuiver(); chime(curOp);
                    }
                }
            }

            const n = nodeAt(wp.x, wp.y);
            if (hovNode !== n) {
                if (aiming && n === aiming.srcNode && hovNode) {
                    // ignore hovering over own source
                } else {
                    hovNode = n;
                    if (n) { const op = OPS[n.op]; setMsg(`<strong>${opLbl(n.op)}</strong> N${n.id} — ${op?.verb || ''}`); }
                    else if (!aiming) setReady();

                    highlightCards(selNode ? selNode.id : (hovNode ? hovNode.id : null));
                    redrawV();
                }
            }
            if (aiming) {
                aiming.ex = wp.x; aiming.ey = wp.y;
                redrawV();
            }
        }

        function ptrUp(p) {
            if (isPanning) {
                isPanning = false;
                return;
            }
            if (dragging) {
                dragging = null; stopDragSound(); placeSound();
                computeV(); redrawV(); return;
            }
            if (aiming) {
                if (aimPulseAnim) { cancelAnimationFrame(aimPulseAnim); aimPulseAnim = null; }
                const snap = { ...aiming }; aiming = null; hovNode = null;
                const wp = toWorld(p);
                const tgt = nodeAt(wp.x, wp.y);
                if (tgt && tgt !== snap.srcNode) {
                    fireTo(snap.srcNode, tgt, curOp);
                } else if (Math.sqrt((snap.ex - snap.sx) ** 2 + (snap.ey - snap.sy) ** 2) > 20) {
                    const opN = addNode(opLbl(curOp), curOp, snap.ex, snap.ey);
                    hapSpawnNode(opN, 3);
                    edges.push({ from: snap.srcNode, to: opN });
                    setTimeout(() => fireTo(snap.srcNode, opN, curOp), 50);
                } else setReady();
                redrawV();
            }
        }

        canvas.addEventListener('click', e => {
            if (isPanning) return;
            const p = evP(e); if (aiming) return;
            const wp = toWorld(p);
            const n = nodeAt(wp.x, wp.y);
            if (n) selectNode(n);
            else { selNode = null; document.getElementById('selSt').style.display = 'none'; highlightCards(null); redrawV(); }
        });

        // ══════════════════════════════
        // FIRE
        // ══════════════════════════════
        function fireTo(srcNode, opNode, opKey) {
            const op = OPS[opKey];
            if (!op?.sys) { setMsg(`<em>${opLbl(opKey)}</em> is a seed — fire into an operator`); return; }
            setMsg(`<em>${op.lbl}</em> ${op.verb} ← <strong>${opLbl(srcNode.op)} N${srcNode.id}</strong>`, 'aim');

            OPS[opKey].usageCount++;
            buildQuiver();

            shootArr(srcNode.x, srcNode.y, opNode.x, opNode.y, opH(opKey), () => {
                hapHit(); hapPush(opNode, srcNode.x, srcNode.y, 8);
                edges.push({ from: srcNode, to: opNode });
                fireRipple(nodes.indexOf(opNode));
                runOp(srcNode, opNode, opKey);
            });
        }

        // ══════════════════════════════
        // NODES
        // ══════════════════════════════
        function mkNode(text, op, x, y, draft = false) { return { id: ++nid, text, op, x, y, vx: 0, vy: 0, glow: 0, run: 0, depth: 0, draft }; }
        function addNode(text, op, x, y, draft = false) { const n = mkNode(text, op, x, y, draft); nodes.push(n); document.getElementById('sN').textContent = nodes.length; computeV(); redrawV(); return n; }
        function removeNode(n) { edges = edges.filter(e => e.from !== n && e.to !== n); nodes = nodes.filter(x => x !== n); ops = ops.filter(o => o.srcNode !== n && o.opNode !== n && o.resNode !== n); if (selNode === n) selNode = null; document.getElementById('sN').textContent = nodes.length; computeV(); redrawV(); renderWT(); }
        function selectNode(n) { 
            selNode = n; n.glow = .45; computeV(); redrawV(); sndSel(); hapSel(); 
            document.getElementById('selSt').style.display = ''; 
            document.getElementById('sSel').textContent = opLbl(n.op) + ' N' + n.id; 
            highlightCards(n.id); scrollToCard(n.id); 
            if (typeof renderTimeline === 'function') renderTimeline();
            
            // Inject POML lineage context card into Air Traffic UI
            if (n.ctxHtml) {
                const existing = ops.find(o => o.resNode === n && o.isContextDump);
                if (!existing) {
                    const rec = { id: ++oid, srcNode: n, opNode: n, resNode: n, opKey: n.op, nb: 0, text: n.ctx || '', ts: Date.now(), html: n.ctxHtml, isContextDump: true };
                    ops.push(rec); addCard(rec); updateCard(rec.id, n.ctx || '', true);
                }
            }
        }
        function clearAll() { nodes = []; edges = []; ops = []; selNode = null; hovNode = null; vmap = null; ripples = []; document.getElementById('sN').textContent = '0'; redrawV(); renderWT(); setReady(); }

        // ══════════════════════════════
        // RUN OPERATOR
        // ══════════════════════════════
        async function runOp(srcNode, opNode, opKey) {
            const op = OPS[opKey]; if (!op?.sys) return;
            const concept = srcNode.text;
            const spCtx = buildCtx(opNode);
            const sys = op.sys + spCtx;
            const userMsg = `The current narrative state is: ${concept}\n\nFork the garden now. Provide 2 to 4 surprising next steps.`;

            opNode.run = .01; startPhys();
            setMsg(`<em>${op.lbl}</em> generating paths…`, 'run');
            document.getElementById('tDot').className = 'tdot run';

            try {
                let text = '';
                if (!API_KEY) {
                    text = `FORK 1: The Crystal Gallery\nYou step into a corridor of mirrors where every reflection is a version of you that stayed in the previous room. The air smells of ozone and old parchment.\n\nFORK 2: The Sinking Orchard\nThe floor turns to loam. Trees bearing heavy, glowing fruit grow rapidly around you. To eat is to remember everything you've ever forgotten.`;
                    await new Promise(resolve => setTimeout(resolve, 1000));
                } else {
                    const r = await fetch('https://api.openai.com/v1/chat/completions', {
                        method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${API_KEY}` },
                        body: JSON.stringify({
                            model: CONFIG.model,
                            messages: [{ role: 'system', content: sys }, { role: 'user', content: userMsg }],
                            temperature: 0.8
                        })
                    });
                    const data = await r.json();
                    text = data.choices?.[0]?.message?.content || 'Error: ' + (data.error?.message || JSON.stringify(data));
                }

                // PARSE MULTIPLE FORKS
                const forkBlocks = text.split(/FORK \d+:/g).filter(b => b.trim());
                
                forkBlocks.forEach((block, idx) => {
                    const lines = block.trim().split('\n');
                    const title = lines[0].replace(/\[|\]/g, '').trim();
                    const narrative = lines.slice(1).join('\n').trim();

                    const dx = Math.cos((idx / forkBlocks.length) * Math.PI * 2);
                    const dy = Math.sin((idx / forkBlocks.length) * Math.PI * 2);
                    const dist = 150 + Math.random() * 50;
                    
                    const rx = Math.max(100, Math.min(VW - 100, opNode.x + dx * dist));
                    const ry = Math.max(100, Math.min(VH - 100, opNode.y + dy * dist));

                    const resNode = addNode(title, opKey, rx, ry, tryMode);
                    resNode.text = narrative;
                    resNode.fullTitle = title;
                    
                    edges.push({ from: opNode, to: resNode });
                    
                    const rec = { id: ++oid, srcNode, opNode, resNode, opKey, nb: 0, text: narrative, ts: Date.now(), title: title };
                    ops.push(rec); addCard(rec);
                    updateCard(rec.id, narrative, true);
                    
                    fireRipple(nodes.indexOf(resNode), .4);
                });

                opNode.run = 0;
                computeV(); redrawV();
                setMsg(`Garden expanded with ${forkBlocks.length} new paths.`);
                document.getElementById('tDot').className = 'tdot';
                
            } catch (err) {
                setMsg('Error: ' + err.message);
                document.getElementById('tDot').className = 'tdot';
            }
        }

        // ══════════════════════════════
        // TEXT PARSER
        // ══════════════════════════════
        function parseSections(raw) {
            const secs = [];
            const blocks = raw.split(/\n{2,}/);
            blocks.forEach(block => {
                block = block.trim(); if (!block) return;
                let esc = block.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                let html = esc
                    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                    .replace(/(?<!\*)\*(?!\*)(.+?)(?<!\*)\*(?!\*)/g, '<em>$1</em>')
                    .replace(/`([^`]+)`/g, '<code class="sc">$1</code>');
                if (/^(-{3,}|\*{3,})$/.test(block)) return;
                if (/^#{1,4}\s/.test(block)) { secs.push({ type: 'h', text: block.replace(/^#+\s/, ''), html: `<div class="sh">${html.replace(/^#+\s/, '')}</div>` }); return; }
                if (/^>\s?/.test(block)) { const inner = html.replace(/^&gt;\s?/gm, '').replace(/\n/g, '<br>'); secs.push({ type: 'q', text: block.replace(/^>\s?/gm, ''), html: `<div class="sq">${inner}</div>` }); return; }
                if (/^(\d+)\.\s/.test(block)) {
                    const lines = block.split(/\n/).filter(l => l.trim());
                    lines.forEach(line => {
                        const m = line.match(/^(\d+)\.\s+(.*)/);
                        if (m) {
                            const t2 = m[2].replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/(?<!\*)\*(?!\*)(.+?)(?<!\*)\*(?!\*)/g, '<em>$1</em>');
                            secs.push({ type: 'num', num: m[1], text: m[2], html: `<div class="snum"><span class="sn">${m[1]}.</span><span>${t2}</span></div>` });
                        }
                    }); return;
                }
                if (/^[-*+]\s/.test(block)) {
                    const lines = block.split(/\n/).filter(l => /^[-*+]\s/.test(l.trim()));
                    lines.forEach(line => {
                        const t2 = line.replace(/^[-*+]\s+/, '').replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
                        secs.push({ type: 'li', text: line.replace(/^[-*+]\s+/, ''), html: `<div class="snum"><span class="sn">·</span><span>${t2}</span></div>` });
                    }); return;
                }
                secs.push({ type: 'p', text: block, html: `<p class="sp">${html.replace(/\n/g, '<br>')}</p>` });
            });
            return secs;
        }

        function parsePOMLData() {
            if (typeof WORLDS_DATA === 'undefined') { setReady(); return; }
            
            const W = VW, H = VH;
            const lookup = {}; // mapping <Name> -> node
            
            // Distribute worlds in a grid with some noise
            const cols = Math.ceil(Math.sqrt(WORLDS_DATA.length));
            const padX = Math.max((W - 100) / cols, 200);
            const padY = Math.max((H - 100) / cols, 200);
            
            let wIdx = 0;
            WORLDS_DATA.slice(0, 100).forEach((w, i) => {
                const cx = (i % cols + 1) * padX + (Math.random() - 0.5) * 80;
                const cy = (Math.floor(i / cols) + 1) * padY + (Math.random() - 0.5) * 80;
                const baseH = (wIdx++ * 137.5) % 360; // Distinct world core hue

                // Root World Nucleus
                const wNode = mkNode(w.name, 'site', cx, cy);
                wNode.hue = baseH;
                wNode.ctx = w.meta ? `WORLD\nGenre: ${w.meta.genre}\nFocus: ${w.meta.description}\n\n[Raw]\n${w.raw}` : `WORLD\n${w.raw || ''}`;
                wNode.ctxHtml = `<div class="chem-grid" style="--hx: hsl(${baseH}, 80%, 60%)"><div class="chem-row"><span class="chem-lbl">Nucleus</span><span class="chem-val">${w.name}</span></div>${w.meta ? `<div class="chem-row"><span class="chem-lbl">Fold Class</span><span class="chem-val">${w.meta.genre}</span></div><div class="chem-row"><span class="chem-lbl">Vector Focus</span><span class="chem-val">${w.meta.description}</span></div>` : ''}<div class="chem-row"><span class="chem-lbl">Spectrum</span><span class="chem-val">${Math.round(baseH)}° T</span></div></div><div class="chem-raw"><code>${(w.raw || '').replace(/</g, '&lt;').replace(/>/g, '&gt;')}</code></div>`;
                nodes.push(wNode);
                lookup['<'+w.name+'>'] = wNode;
                
                if (!w.raw) return;
                
                // Parse Locations: 'location <LocName> { parent: <Parent> }'
                const locRe = /location\s+<([^>]+)>/g;
                let match;
                while ((match = locRe.exec(w.raw)) !== null) {
                    const lname = match[1];
                    const lx = cx + (Math.random()-.5)*120;
                    const ly = cy + (Math.random()-.5)*120;
                    const ln = mkNode(lname, 'inverter', lx, ly); // Location
                    ln.hue = (baseH + 20) % 360; // Secondary structural hue
                    ln.ctx = `LOCATION\nName: ${lname}\nSub-Region of World [${w.name}]`;
                    ln.ctxHtml = `<div class="chem-grid" style="--hx: hsl(${ln.hue}, 80%, 60%)"><div class="chem-row"><span class="chem-lbl">Structural Node</span><span class="chem-val">${lname}</span></div><div class="chem-row"><span class="chem-lbl">Nucleus Bind</span><span class="chem-val">${w.name}</span></div><div class="chem-row"><span class="chem-lbl">Spectrum Shift</span><span class="chem-val">+20° T</span></div></div>`;
                    nodes.push(ln);
                    lookup['<'+lname+'>'] = ln;
                    edges.push({from: wNode, to: ln});
                }
                
                // Parse Entities: 'entity <EntName> : type { location: <LocName> }'
                const entRe = /entity\s+<([^>]+)>\s*:\s*(\w+)\s*\{([^}]*)\}/g;
                while ((match = entRe.exec(w.raw)) !== null) {
                    const ename = match[1];
                    const etype = match[2];
                    const block = match[3];
                    const locMatch = block.match(/location:\s*<([^>]+)>/);
                    const eloc = locMatch ? locMatch[1] : null;

                    const ex = cx + (Math.random()-.5)*200;
                    const ey = cy + (Math.random()-.5)*200;
                    const en = mkNode(ename, 'aphorist', ex, ey); // Entity
                    en.hue = (baseH + 315) % 360; // Amino-acid tertiary hue
                    en.ctx = `ENTITY\nName: ${ename}\nClass: ${etype}\nLocation: ${eloc || 'Unknown'}\nWorld: ${w.name}`;
                    en.ctxHtml = `<div class="chem-grid" style="--hx: hsl(${en.hue}, 80%, 60%)"><div class="chem-row"><span class="chem-lbl">Variant Form</span><span class="chem-val">${ename}</span></div><div class="chem-row"><span class="chem-lbl">Sequence Type</span><span class="chem-val">${etype}</span></div><div class="chem-row"><span class="chem-lbl">Bond</span><span class="chem-val">${eloc || 'Unstable'}</span></div><div class="chem-row"><span class="chem-lbl">Phase Shift</span><span class="chem-val">-45° T</span></div></div>`;
                    nodes.push(en);
                    lookup['<'+ename+'>'] = en;

                    if (eloc && lookup['<'+eloc+'>']) edges.push({from: lookup['<'+eloc+'>'], to: en});
                    else edges.push({from: wNode, to: en});
                }
                
                // Parse Relations: 'rel [type](<A> -> <B>)'
                const relRe = /rel\s+\[([^\]]+)\]\((<[^>]+>\s*->\s*<[^>]+>(?:\s*->\s*<[^>]+>)?)\)/g;
                while ((match = relRe.exec(w.raw)) !== null) {
                    const chainStr = match[2];
                    const chain = chainStr.split(/\s*->\s*/);
                    for (let j=0; j<chain.length-1; j++) {
                        const a = lookup[chain[j]];
                        const b = lookup[chain[j+1]];
                        if (a && b) edges.push({from: a, to: b});
                    }
                }
                
                // Parse States: 'state <Ent.prop> = val'
                const stateRe = /state\s+<([^>]+)>\s*=\s*(.+)/g;
                while ((match = stateRe.exec(w.raw)) !== null) {
                    const sparts = match[1].split('.');
                    const parentName = sparts[0];
                    const pval = match[2];
                    const sname = sparts[1] + ": " + pval;

                    const sx = cx + (Math.random()-.5)*300;
                    const sy = cy + (Math.random()-.5)*300;
                    const sn = mkNode(sname, 'analyst', sx, sy); // State
                    sn.hue = (baseH + 180) % 360; // Catalytic opposite hue
                    sn.ctx = `STATE\nTarget: ${parentName}\nValue: ${pval}\nWorld: ${w.name}`;
                    sn.ctxHtml = `<div class="chem-grid" style="--hx: hsl(${sn.hue}, 80%, 60%)"><div class="chem-row"><span class="chem-lbl">Bond Strength</span><span class="chem-val">${pval.replace(/\"/g,'')}</span></div><div class="chem-row"><span class="chem-lbl">Catalyst</span><span class="chem-val">${parentName}</span></div><div class="chem-row"><span class="chem-lbl">Polarity</span><span class="chem-val">Inverse (180°)</span></div></div>`;
                    nodes.push(sn);
                    lookup['<'+match[1]+'>'] = sn;

                    const pn = lookup['<'+parentName+'>'] || wNode;
                    edges.push({from: pn, to: sn});
                }
            });
            
            document.getElementById('sN').textContent = nodes.length;
            
            // Adjust camera to view full domain roughly
            camZ = 0.5;
            camX = VW / 4;
            camY = VH / 4;
            
            computeV(); 
            redrawV();
            setReady();
        }

        // ══════════════════════════════
        // TIMELINE BAR
        // ══════════════════════════════
        function renderTimeline() {
            let tlBar = document.getElementById('timeline-bar');
            if (!tlBar) {
                tlBar = document.createElement('div');
                tlBar.id = 'timeline-bar';
                tlBar.className = 'timeline-bar';
                const wtBd = document.getElementById('wtBd');
                wtBd.parentNode.insertBefore(tlBar, wtBd);
            }
            
            // Build tree from edges
            const roots = nodes.filter(n => !edges.some(e => e.to === n));
            if (!roots.length) { tlBar.innerHTML = '<span class="tl-depth">NO PATHS</span>'; return; }
            
            tlBar.innerHTML = '';
            const branchVisited = new Set();
            
            function addBranch(node, depth) {
                const btn = document.createElement('button');
                btn.className = 'tl-node' + (selNode === node ? ' active' : '') + (depth === 0 ? ' root' : '');
                const label = (node.fullTitle || node.text || opLbl(node.op)).replace(/<[^>]*>?/gm, '').slice(0, 14);
                btn.textContent = label;
                btn.title = node.text.replace(/<[^>]*>?/gm, '').slice(0, 80);
                btn.onclick = () => { 
                    selectNode(node); 
                    renderTimeline(); 
                    scrollToCard(node.id);
                    // Center this node on the canvas
                    camX = VW * 0.35 - node.x * camZ;
                    camY = VH * 0.5 - node.y * camZ;
                    computeV(); redrawV();
                };
                
                if (depth > 0) {
                    const arrow = document.createElement('span');
                    arrow.className = 'tl-arrow';
                    arrow.textContent = '→';
                    tlBar.appendChild(arrow);
                }
                
                tlBar.appendChild(btn);
                
                // Find children
                const children = edges.filter(e => e.from === node).map(e => e.to);
                if (children.length > 1) {
                    const fork = document.createElement('span');
                    fork.className = 'tl-fork';
                    fork.textContent = '⑂' + children.length;
                    tlBar.appendChild(fork);
                }
                
                // Follow the selected path or first child (max depth 20)
                if (children.length > 0 && depth < 20) {
                    const selChild = children.find(c => c === selNode || hasDescendant(c, selNode));
                    const next = selChild || children[0];
                    if (!branchVisited.has(next.id)) {
                        branchVisited.add(next.id);
                        addBranch(next, depth + 1);
                    }
                }
            }
            
            function hasDescendant(node, target, visited) {
                if (!target) return false;
                if (!visited) visited = new Set();
                if (visited.has(node.id)) return false;
                visited.add(node.id);
                const kids = edges.filter(e => e.from === node).map(e => e.to);
                for (const k of kids) {
                    if (k === target || hasDescendant(k, target, visited)) return true;
                }
                return false;
            }
            
            // Add depth label
            const depthLabel = document.createElement('span');
            depthLabel.className = 'tl-depth';
            const maxDepth = nodes.reduce((m, n) => Math.max(m, n.depth || 0), 0);
            depthLabel.textContent = 'D' + maxDepth;
            tlBar.appendChild(depthLabel);
            
            const sep = document.createElement('span');
            sep.style.cssText = 'width:1px;height:12px;background:var(--rule);flex-shrink:0';
            tlBar.appendChild(sep);
            
            roots.forEach((r, i) => addBranch(r, 0));
            
            // Auto-scroll to active
            const active = tlBar.querySelector('.active');
            if (active) active.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
        }

    
        // ══════════════════════════════
        // TWINE FILE IMPORT
        // ══════════════════════════════
        function importTwineFile(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                const text = e.target.result;
                const fname = file.name.toLowerCase();
                let passages = [];

                if (fname.endsWith('.twee') || fname.endsWith('.tw')) {
                    // Parse Twee format: :: PassageName [tags]\nContent
                    const blocks = text.split(/^::\s*/m).filter(b => b.trim());
                    blocks.forEach(block => {
                        const lines = block.split('\n');
                        const headerMatch = lines[0].match(/^([^\[\{]+)(?:\[([^\]]*)])?/);
                        if (headerMatch) {
                            const title = headerMatch[1].trim();
                            const tags = headerMatch[2] || '';
                            const body = lines.slice(1).join('\n').trim();
                            // Extract [[links]]
                            const links = [];
                            body.replace(/\[\[([^\]]+)\]\]/g, (m, link) => {
                                const parts = link.split('|');
                                links.push(parts[parts.length - 1].trim());
                            });
                            if (title && title !== 'StoryTitle' && title !== 'StoryData') {
                                passages.push({ title, body, tags, links });
                            }
                        }
                    });
                } else if (fname.endsWith('.html')) {
                    // Parse Twine 2 HTML: <tw-passagedata> elements
                    const parser = new DOMParser();
                    const doc = parser.parseFromString(text, 'text/html');
                    const pEls = doc.querySelectorAll('tw-passagedata');
                    pEls.forEach(el => {
                        const title = el.getAttribute('name') || 'Untitled';
                        const tags = el.getAttribute('tags') || '';
                        const body = el.textContent.trim();
                        const links = [];
                        body.replace(/\[\[([^\]]+)\]\]/g, (m, link) => {
                            const parts = link.split('|');
                            links.push(parts[parts.length - 1].trim());
                        });
                        passages.push({ title, body, tags, links });
                    });
                } else if (fname.endsWith('.json')) {
                    // JSON array of {title, body} objects
                    try {
                        const data = JSON.parse(text);
                        const arr = Array.isArray(data) ? data : (data.passages || []);
                        arr.forEach(p => passages.push({
                            title: p.title || p.name || 'Untitled',
                            body: p.body || p.text || p.content || '',
                            tags: p.tags || '',
                            links: p.links || []
                        }));
                    } catch(e) { setMsg('JSON parse error: ' + e.message); return; }
                }

                if (!passages.length) { setMsg('No passages found in file.'); return; }

                // Clear and build nodes from passages
                clearAll();
                const nodeMap = {};
                const cols = Math.ceil(Math.sqrt(passages.length));
                
                passages.forEach((p, idx) => {
                    const col = idx % cols;
                    const row = Math.floor(idx / cols);
                    const x = 200 + col * 220 + (Math.random() - 0.5) * 40;
                    const y = 200 + row * 180 + (Math.random() - 0.5) * 40;
                    
                    const n = addNode(p.title, 'root', x, y);
                    n.text = p.body;
                    n.fullTitle = p.title;
                    n.ctx = p.body;
                    nodeMap[p.title] = n;
                    
                    // Add as an op card
                    const rec = { id: ++oid, srcNode: n, opNode: n, resNode: n, opKey: 'root', nb: 0, text: p.body, ts: Date.now(), title: p.title };
                    ops.push(rec);
                });

                // Build edges from [[links]]
                passages.forEach(p => {
                    const src = nodeMap[p.title];
                    if (!src) return;
                    p.links.forEach(linkTitle => {
                        const tgt = nodeMap[linkTitle];
                        if (tgt && tgt !== src) {
                            edges.push({ from: src, to: tgt });
                        }
                    });
                });

                computeV(); redrawV(); renderWT();
                setMsg(`Imported ${passages.length} passages from ${file.name}`);
                
                // Center on first node
                if (passages.length > 0) {
                    const first = nodeMap[passages[0].title];
                    if (first) {
                        camX = VW * 0.35 - first.x * camZ;
                        camY = VH * 0.5 - first.y * camZ;
                        selectNode(first);
                        computeV(); redrawV();
                    }
                }
            };
            reader.readAsText(file);
            event.target.value = ''; // Reset so same file can be re-imported
        }

    
        function sendToScene(btn) {
            const card = btn.closest('.ocard');
            const oid = parseInt(card.dataset.oid, 10);
            const rec = ops.find(o => o.id === oid);
            if (!rec) return;
            
            // Find the node and center + select it
            const n = rec.resNode;
            if (n) {
                // Center on this node
                camX = VW * 0.35 - n.x * camZ;
                camY = VH * 0.5 - n.y * camZ;
                selectNode(n);
                n.glow = 1.0;
                fireRipple(nodes.indexOf(n), .8);
                computeV(); redrawV();
                
                // Visual feedback
                btn.textContent = '✓ Focused';
                btn.classList.add('ok');
                setTimeout(() => { btn.textContent = '⊕ Scene'; btn.classList.remove('ok'); }, 1400);
                
                setMsg(`Focused on <em>${(n.fullTitle || opLbl(n.op))}</em> N${n.id}`);
            }
        }

        function forkFromCard(btn) {
            const card = btn.closest('.ocard');
            const oid = parseInt(card.dataset.oid, 10);
            const rec = ops.find(o => o.id === oid);
            if (!rec || !rec.resNode) return;
            
            // Create a fork op node and fire it
            const src = rec.resNode;
            const fx = src.x + 100 + Math.random() * 60;
            const fy = src.y + Math.random() * 60 - 30;
            const opNode = addNode('FORK', 'fork', fx, fy, tryMode);
            edges.push({ from: src, to: opNode });
            fireRipple(nodes.indexOf(opNode), .4);
            
            // Run the fork operation
            setTimeout(() => fireTo(src, opNode, 'fork'), 100);
            
            btn.textContent = '✓';
            btn.classList.add('ok');
            setTimeout(() => { btn.textContent = '⊕ Scene'; btn.classList.remove('ok'); }, 1400);
        }

    </script>
