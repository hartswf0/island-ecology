        let voronoi = null;
        function computeV() {
            const activeNodes = activeIso === 'all' ? nodes : nodes.filter(n => n.op === activeIso);
            if (!activeNodes.length) { voronoi = null; nbMap.clear(); return; }
            
            // D3 Delaunay is orders of magnitude faster than pixel-looping
            const points = activeNodes.map(n => [n.x * camZ + camX, n.y * camZ + camY]);
            const delaunay = d3.Delaunay.from(points);
            voronoi = delaunay.voronoi([0, 0, VW, VH]);
            
            buildNbMap(delaunay);
        }

        function buildNbMap(delaunay) {
            nbMap.clear(); nodes.forEach(n => nbMap.set(n.id, new Map()));
            const activeNodes = activeIso === 'all' ? nodes : nodes.filter(n => n.op === activeIso);
            
            // Use delaunay neighbors directly for O(1) adjacency lookup
            for (let i = 0; i < activeNodes.length; i++) {
                const n1 = activeNodes[i];
                for (const neighborIndex of delaunay.neighbors(i)) {
                    const n2 = activeNodes[neighborIndex];
                    if (n2) {
                        // Restore dynamic affinity based on Delaunay distance
                        // Lower distance = Higher affinity (simulating border length)
                        const dx = n1.x - n2.x, dy = n1.y - n2.y;
                        const dist = Math.sqrt(dx * dx + dy * dy) || 1;
                        const affinity = 1000 / dist; 
                        nbMap.get(n1.id).set(n2.id, affinity); 
                    }
                }
            }
        }

        function getNbs(node) {
            const m = nbMap.get(node.id); if (!m) return [];
            return [...m.entries()].map(([id, len]) => ({ node: nodes.find(n => n.id === id), len })).filter(x => x.node);
        }

        function buildCtx(opNode) {
            const nbs = getNbs(opNode); if (!nbs.length) return '';
            let mL = Math.max(...nbs.map(x => x.len), 1);
            // If all neighbors are roughly equal, force the scale up to create relative difference
            const allLens = nbs.map(x => x.len);
            const deviation = Math.max(...allLens) - Math.min(...allLens);
            if (deviation < 5) mL *= 1.4; 

            const rel = nbs
                .map(({ node, len }) => ({ node, pct: Math.round(len / mL * 100) }))
                .filter(x => x.pct >= 12).sort((a, b) => b.pct - a.pct).slice(0, 3);
            if (!rel.length) return '';
            rel.forEach(({ pct }) => sndNeighbor(pct / 100));
            return '\n\nSPATIAL CONTEXT — neighboring nodes (higher % = stronger influence on output):\n' +
                rel.map(({ node, pct }) => `- ${opLbl(node.op)} N${node.id} (${pct}% border affinity): "${node.text.slice(0, 110)}"`).join('\n') +
                '\nLet these contexts inflect the direction of your narrative analysis.';
        }

        // ══════════════════════════════
        // PHYSICS
        // ══════════════════════════════
        function physTick() {
            let dirty = false;
            nodes.forEach(n => {
                if (Math.abs(n.vx) > .05 || Math.abs(n.vy) > .05) {
                    n.x += n.vx; n.y += n.vy; n.vx *= .8; n.vy *= .8;
                    n.x = Math.max(44, Math.min(VW - 44, n.x)); n.y = Math.max(44, Math.min(VH - 44, n.y));
                    dirty = true;
                }
                if (n.glow > 0) { n.glow = Math.max(0, n.glow - .014); dirty = true; }
                if (n.run > 0) { n.run += .04; dirty = true; }
            });
            ripples.forEach(r => { if (r.active) dirty = true; });
            if (dirty) { computeV(); redrawV(); }
            else phRunning = false;
        }
        function startPhys() { if (!phRunning) { phRunning = true; requestAnimationFrame(function L() { physTick(); if (phRunning) requestAnimationFrame(L); }); } }
        function hapPush(n, fx, fy, str = 8) { const dx = n.x - fx, dy = n.y - fy, d = Math.sqrt(dx * dx + dy * dy) || 1; n.vx += (dx / d) * str; n.vy += (dy / d) * str; n.glow = 1; startPhys(); }
        function hapSpawnNode(n, str = 4) { n.vx = (Math.random() - .5) * str; n.vy = (Math.random() - .5) * str; n.glow = .6; startPhys(); }

        function fireRipple(ni, s = 1) {
            if (ni < 0) return;
            const visited = new Set([ni]); const q = [{ ni, t: 0, s }];
            while (q.length) {
                const { ni: i, t, s: rs } = q.shift(); const n = nodes[i]; if (!n) continue;
                ripples.push({ ni: i, t0: performance.now() + t * 88, dur: 650 + t * 48, s: rs, active: true });
                n.glow = Math.max(n.glow, .35 * rs);
                sndRipple(opH(n.op)); hapRipple();
                if (rs > .1) {
                    const nbs = getNbs(n); let mL = Math.max(...nbs.map(x => x.len), 1);
                    nbs.forEach(({ node: nb, len }) => {
                        const j = nodes.indexOf(nb);
                        if (j >= 0 && !visited.has(j)) { visited.add(j); q.push({ ni: j, t: t + 1, s: rs * (.25 + len / mL * .35) }); }
                    });
                }
            }
            startPhys();
        }

        // ══════════════════════════════
        // DRAW
        // ══════════════════════════════
        function redrawV() {
            ctx.clearRect(0, 0, VW, VH);
            ctx.fillStyle = isLight ? '#f7f3ec' : '#07090f'; ctx.fillRect(0, 0, VW, VH);
            
            if (voronoi && nodes.length) { drawCells(); drawBorders(); }
            
            ctx.save();
            ctx.translate(camX, camY);
            ctx.scale(camZ, camZ);
            
            drawGrid();
            if (selNode) drawAff();
            drawEdges(); drawRips();
            if (aiming) drawAim();
            if (arrowAnims.length) drawArrF();
            drawLabels();
            
            ctx.restore();
            
            // Draw transclusion beam in screen space (outside camera transform)
            drawTransclusionBeam();
        }

        function drawGrid() {
            ctx.save();
            ctx.strokeStyle = isLight ? 'rgba(80,60,30,.07)' : 'rgba(25,45,70,.09)'; ctx.lineWidth = 1 / camZ;
            const g = 26;
            // Draw grid far beyond raw VW/VH to support panning
            const ex = Math.max(VW / camZ, 6000), ey = Math.max(VH / camZ, 6000);
            for (let x = -3000; x < ex; x += g) { ctx.beginPath(); ctx.moveTo(x, -3000); ctx.lineTo(x, ey); ctx.stroke(); }
            for (let y = -3000; y < ey; y += g) { ctx.beginPath(); ctx.moveTo(-3000, y); ctx.lineTo(ex, y); ctx.stroke(); }
            ctx.restore();
        }

        function getRip(ni) {
            const now = performance.now(); let r = 0;
            for (const rp of ripples) {
                if (rp.ni !== ni || !rp.active) continue;
                const t = (now - rp.t0) / rp.dur;
                if (t >= 0 && t < 1) r += rp.s * (1 - t);
                else if (t >= 1) rp.active = false;
            }
            return Math.min(r, 1);
        }

        function drawCells() {
            const activeNodes = activeIso === 'all' ? nodes : nodes.filter(n => n.op === activeIso);
            const aimH = aiming ? opH(curOp) : 0;
            
            activeNodes.forEach((n, i) => {
                const path = voronoi.renderCell(i);
                if (!path) return;
                
                let baseH = n.hue !== undefined ? n.hue : opH(n.op);
                const rip = getRip(nodes.indexOf(n));
                const isSel = selNode === n, isHov = hovNode === n;
                const isAimTarget = aiming && isHov && aiming.srcNode !== n;
                const lum = isLight ? 70 : 35;
                const draftFader = n.draft ? 0.3 : 1;
                let baseAlpha = (.25 + (isSel ? .1 : 0) + (isHov ? .08 : 0) + rip * .2) * draftFader;

                ctx.beginPath();
                voronoi.renderCell(i, ctx);
                
                if (isAimTarget) {
                    const aimPulse = 0.4 + Math.sin(Date.now() / 100) * 0.15;
                    ctx.fillStyle = hsl(aimH, 80, isLight ? 75 : 45, baseAlpha + aimPulse);
                } else if (hoverCardNodeId == n.id) {
                    ctx.fillStyle = hsl(baseH, 80, lum + 15, baseAlpha + 0.3);
                } else if (hoverCardFid == n.id) {
                    ctx.fillStyle = hsl(baseH, 60, lum + 5, baseAlpha + 0.15);
                } else {
                    ctx.fillStyle = hsl(baseH, 65, lum + (isSel ? 8 : 0) + rip * 13, baseAlpha);
                }
                ctx.fill();
            });
        }

        function drawBorders() {
            ctx.beginPath();
            voronoi.renderBounds(ctx);
            ctx.strokeStyle = isLight ? 'rgba(0,0,0,0.1)' : 'rgba(255,255,255,0.05)';
            ctx.lineWidth = 0.5;
            ctx.stroke();

            ctx.beginPath();
            voronoi.render(ctx);
            ctx.strokeStyle = isLight ? 'rgba(0,0,0,0.15)' : 'rgba(255,255,255,0.1)';
            ctx.lineWidth = 1;
            ctx.stroke();
        }

        function drawTransclusionBeam() {
            if (!linksOn) return;
            const connections = [];
            const vpRect = canvas.getBoundingClientRect();
            const wtBd = document.getElementById('wtBd').getBoundingClientRect();

            const getCardY = (card) => {
                const cr = card.getBoundingClientRect();
                if (cr.bottom < wtBd.top || cr.top > wtBd.bottom) return null;
                return Math.max(0, Math.min(VH, cr.top - vpRect.top + cr.height / 2));
            };

            if (hoverCardNodeId) {
                const hn = nodes.find(n => n.id == hoverCardNodeId);
                const sn = nodes.find(n => n.id == hoverCardFid);
                const card = document.querySelector(`.ocard[data-nid="${hoverCardNodeId}"]`);
                if (card) {
                    const targetY = getCardY(card);
                    if (targetY !== null) {
                        if (hn) connections.push({ n: hn, targetY, isSource: false, active: true });
                        if (sn) connections.push({ n: sn, targetY, isSource: true, active: true });
                    }
                }
            }

            const activeNode = hovNode || (!hoverCardNodeId && selNode ? selNode : null);
            if (activeNode && !hoverCardNodeId) {
                const cards = document.querySelectorAll(`.ocard[data-nid="${activeNode.id}"], .ocard[data-fid="${activeNode.id}"]`);
                cards.forEach(c => {
                    const targetY = getCardY(c);
                    if (targetY !== null) {
                        const isSource = c.dataset.fid == activeNode.id;
                        connections.push({ n: activeNode, targetY, isSource, active: hovNode === activeNode });
                    }
                });
            }

            ctx.save();
            connections.forEach(({ n, targetY, isSource, active }) => {
                const h = opH(n.op);
                // Convert node world coords to screen coords
                const sx = n.x * camZ + camX;
                const sy = n.y * camZ + camY;
                const endX = VW;
                
                // Skip if node is off-screen
                if (sx < -50 || sx > VW + 50 || sy < -50 || sy > VH + 50) return;

                ctx.beginPath();
                ctx.moveTo(sx, sy);
                const cpDist = Math.max(80, (endX - sx) * 0.5);
                ctx.bezierCurveTo(sx + cpDist, sy, endX - cpDist, targetY, endX, targetY);

                if (isSource) {
                    ctx.strokeStyle = hsl(h, 60, 50, active ? 0.6 : 0.2);
                    ctx.lineWidth = active ? 2 : 1;
                    ctx.setLineDash([4, 4]);
                } else {
                    const grad = ctx.createLinearGradient(sx, 0, endX, 0);
                    grad.addColorStop(0, hsl(h, 80, 60, 0.05));
                    grad.addColorStop(1, hsl(h, 80, 60, active ? 0.8 : 0.3));
                    ctx.strokeStyle = grad;
                    ctx.lineWidth = active ? 3 : 1.5;
                    ctx.setLineDash([]);
                    if (active) {
                        ctx.shadowBlur = 8;
                        ctx.shadowColor = hsl(h, 80, 60, 0.6);
                    }
                }
                ctx.stroke();
                ctx.shadowBlur = 0;
                ctx.setLineDash([]);

                // Draw endpoint dot at the card
                ctx.beginPath();
                ctx.arc(endX - 3, targetY, isSource ? 2 : 4, 0, Math.PI * 2);
                ctx.fillStyle = hsl(h, 80, 60, active ? 1 : 0.4);
                ctx.fill();
                
                // Draw origin dot on the node
                ctx.beginPath();
                ctx.arc(sx, sy, active ? 5 : 3, 0, Math.PI * 2);
                ctx.fillStyle = hsl(h, 80, 60, active ? 0.8 : 0.3);
                ctx.fill();
            });
            ctx.restore();
        }

        function drawAff() {
            const nbs = getNbs(selNode); if (!nbs.length) return;
            let mL = Math.max(...nbs.map(x => x.len), 1);
            nbs.forEach(({ node, len }) => {
                const pct = len / mL; if (pct < .08) return;
                const h1 = selNode.hue !== undefined ? selNode.hue : opH(selNode.op);
                const h2 = node.hue !== undefined ? node.hue : opH(node.op);
                ctx.save();
                const grad = ctx.createLinearGradient(selNode.x, selNode.y, node.x, node.y);
                grad.addColorStop(0, hsl(h1, 80, 60, pct * 0.8 + 0.1));
                grad.addColorStop(1, hsl(h2, 80, 60, pct * 0.8 + 0.1));
                ctx.strokeStyle = grad;
                ctx.lineWidth = 1.0;
                if (node.draft || selNode.draft) ctx.setLineDash([2, 4]);
                ctx.beginPath(); ctx.moveTo(selNode.x, selNode.y); ctx.lineTo(node.x, node.y); ctx.stroke();
                
                // Crisp molecular percentage readouts
                const mx = (selNode.x + node.x) / 2, my = (selNode.y + node.y) / 2;
                ctx.font = `600 7px 'IBM Plex Mono',monospace`; ctx.textAlign = 'center';
                ctx.fillStyle = isLight ? `rgba(20,20,30,${pct * .7 + .3})` : `rgba(220,240,255,${pct * .7 + .3})`;
                ctx.fillText(Math.round(pct * 100) + '%', mx, my - 4);
                
                ctx.restore();
            });
        }

        function drawRips() {
            const now = performance.now();
            ripples.forEach(rp => {
                const t = (now - rp.t0) / rp.dur;
                if (t < 0) { rp.active = true; return; } if (t > 1) { rp.active = false; return; } rp.active = true;
                const n = nodes[rp.ni]; if (!n) return;
                ctx.save(); ctx.strokeStyle = opC(n.op, 78, (1 - t) * rp.s * .36); ctx.lineWidth = 1;
                ctx.beginPath(); ctx.arc(n.x, n.y, 24 + t * 40, 0, Math.PI * 2); ctx.stroke(); ctx.restore();
            });
        }

        function drawLabels() {
            // Proximity flashlight: only render labels for Worlds, Selected Node, and Hovered Node + Neighbors
            let showL = new Set();
            if (hovNode) { showL.add(hovNode); getNbs(hovNode).forEach(x => showL.add(x.node)); }
            if (selNode) { showL.add(selNode); getNbs(selNode).forEach(x => showL.add(x.node)); }
            
            nodes.forEach((n, ni) => {
                const isIsolated = activeIso === 'all' || n.op === activeIso;
                const isoFader = isIsolated ? 1 : 0.15;
                const h = n.hue !== undefined ? n.hue : opH(n.op); const isSel = selNode === n, isHov = hovNode === n; const rip = getRip(ni);
                ctx.save();
                
                const draftFader = (n.draft ? 0.6 : 1) * isoFader;
                ctx.fillStyle = isLight ? hsl(h, 65, 32, (.75 + rip * .2) * draftFader) : hsl(h, 75, 60, (.7 + rip * .28) * draftFader);
                ctx.strokeStyle = isLight ? hsl(h, 75, 20, isoFader) : hsl(h, 85, 80, isoFader);
                ctx.lineWidth = 1.0;

                const r = (isSel ? 8 : isHov ? 5 : 3.5);
                ctx.beginPath(); 
                
                // Color-coded Molecule System (No Symbols)
                if (n.op === 'site') { // World: Large Glowing Nucleus
                    ctx.arc(n.x, n.y, r * 1.8, 0, Math.PI * 2);
                    ctx.fillStyle = hsl(h, 80, 50, 0.4); ctx.fill();
                    ctx.strokeStyle = hsl(h, 90, 70, 0.9); ctx.lineWidth = 1.5; ctx.stroke();
                    ctx.beginPath(); ctx.arc(n.x, n.y, r * 0.6, 0, Math.PI * 2); ctx.fillStyle = hsl(h, 100, 80, 1); ctx.fill();
                } else if (n.op === 'inverter') { // Location: Intermediate structural node
                    ctx.arc(n.x, n.y, r * 1.3, 0, Math.PI * 2); ctx.fillStyle = hsl(h, 70, 60, 0.8); ctx.fill();
                    ctx.strokeStyle = hsl(h, 50, 40, 0.9); ctx.stroke();
                } else if (n.op === 'analyst') { // State: Hollow catalytic ring
                    ctx.arc(n.x, n.y, r * 1.0, 0, Math.PI * 2); ctx.strokeStyle = hsl(h, 80, 60, 1); ctx.lineWidth = 2.0; ctx.stroke();
                } else if (n.op === 'root') { // Root: Golden nucleus
                    ctx.arc(n.x, n.y, r * 2.0, 0, Math.PI * 2);
                    ctx.fillStyle = hsl(45, 70, 55, 0.5); ctx.fill();
                    ctx.strokeStyle = hsl(45, 80, 65, 0.9); ctx.lineWidth = 1.5; ctx.stroke();
                    ctx.beginPath(); ctx.arc(n.x, n.y, r * 0.7, 0, Math.PI * 2); ctx.fillStyle = hsl(45, 90, 75, 1); ctx.fill();
                } else if (n.op === 'fork') { // Fork: Branching indicator
                    ctx.arc(n.x, n.y, r * 1.5, 0, Math.PI * 2);
                    ctx.fillStyle = hsl(320, 60, 50, 0.5); ctx.fill();
                    ctx.strokeStyle = hsl(320, 70, 65, 0.8); ctx.lineWidth = 1.2; ctx.stroke();
                } else { // Entity / Aphorist: Solid elemental particle
                    ctx.arc(n.x, n.y, r * 1.1, 0, Math.PI * 2); ctx.fillStyle = hsl(h, 90, 70, 1); ctx.fill();
                }

                if (isSel) {
                    ctx.beginPath(); ctx.arc(n.x, n.y, 14, 0, Math.PI * 2);
                    ctx.strokeStyle = hsl(h, 70, 60, .25); ctx.lineWidth = 1.2;
                    if (n.draft) ctx.setLineDash([2, 3]);
                    ctx.stroke();
                }
                if (n.run > 0) {
                    const a = n.run; ctx.beginPath(); ctx.arc(n.x, n.y, 18, a, a + Math.PI * .7);
                    ctx.strokeStyle = hsl(h, 85, 65, .65); ctx.lineWidth = 2; ctx.stroke();
                }

                // Always show labels for all nodes — focused nodes bigger
                const isFocused = n.op === 'site' || showL.has(n) || isSel || isHov;
                const fontSize = isSel ? 11 : (isFocused ? 8 : 6);
                const labelAlpha = isFocused ? 1.0 : 0.6;
                ctx.textAlign = 'center';
                ctx.font = `${n.draft ? 'italic' : '600'} ${fontSize}px 'IBM Plex Mono',monospace`;
                ctx.fillStyle = isLight 
                    ? hsl(h, 60, 20, (.5 + (isSel ? .5 : 0)) * draftFader * labelAlpha)
                    : hsl(h, 30, 90, (.6 + (isSel ? .4 : 0)) * draftFader * labelAlpha);
                
                // Use fullTitle or text content for the label
                let shortName = n.fullTitle || n.text || opLbl(n.op);
                shortName = shortName.replace(/<[^>]*>?/gm, '').replace(/\n/g, ' ');
                if (shortName.length > 28) shortName = shortName.slice(0, 28) + '…';
                ctx.fillText(n.draft ? `[DRAFT]` : shortName, n.x, n.y - (r * 2.5) - 4);
                
                // For selected node, also show a subtitle hint
                if (isSel && n.text && n.text !== n.fullTitle) {
                    ctx.font = `italic 5px 'Cormorant Garamond',serif`;
                    ctx.fillStyle = isLight ? hsl(h, 40, 30, 0.5) : hsl(h, 20, 80, 0.4);
                    let sub = n.text.replace(/<[^>]*>?/gm, '').replace(/\n/g, ' ').slice(0, 50);
                    if (n.text.length > 50) sub += '…';
                    ctx.fillText(sub, n.x, n.y - (r * 2.5) - 4 + fontSize + 3);
                }
                ctx.restore();
            });
        }

        function drawEdges() {
            ctx.save(); ctx.setLineDash([2, 8]);
            edges.forEach(e => {
                const a = e.from, b = e.to; if (!a || !b) return;
                const isIsolated = activeIso === 'all' || a.op === activeIso || b.op === activeIso;
                const isoFader = isIsolated ? 1 : 0.1;
                const g = ctx.createLinearGradient(a.x, a.y, b.x, b.y);
                const draftFader = (a.draft || b.draft) ? 0.3 : 1;
                g.addColorStop(0, opC(a.op, 60, .1 * draftFader * isoFader)); g.addColorStop(1, opC(b.op, 60, .05 * draftFader * isoFader));
                ctx.strokeStyle = g; ctx.lineWidth = .7 / camZ;
                ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y); ctx.stroke();
            });
            ctx.setLineDash([]); ctx.restore();
        }

        // ══════════════════════════════
        // AIM + ARROW
        // ══════════════════════════════
        function arcCtrl(x1, y1, x2, y2) { const dx = x2 - x1, dy = y2 - y1, d = Math.sqrt(dx * dx + dy * dy) || 1, h = Math.min(d * .27, 125); return { x: (x1 + x2) / 2 + (-dy / d) * h, y: (y1 + y2) / 2 + (dx / d) * h }; }
        function bezP(x1, y1, cx, cy, x2, y2, t) { return { x: (1 - t) ** 2 * x1 + 2 * (1 - t) * t * cx + t ** 2 * x2, y: (1 - t) ** 2 * y1 + 2 * (1 - t) * t * cy + t ** 2 * y2 }; }
        function bezT(x1, y1, cx, cy, x2, y2, t) { return { x: 2 * (1 - t) * (cx - x1) + 2 * t * (x2 - cx), y: 2 * (1 - t) * (cy - y1) + 2 * t * (y2 - cy) }; }

        function drawAim() {
            const { sx, sy, ex, ey } = aiming;
            const dist = Math.sqrt((ex - sx) ** 2 + (ey - sy) ** 2); if (dist < 5) return;
            const cp = arcCtrl(sx, sy, ex, ey); const h = opH(curOp);
            ctx.save();
            ctx.setLineDash([3, 7]); ctx.strokeStyle = hsl(h, 65, 55, .22); ctx.lineWidth = 1;
            ctx.beginPath(); ctx.moveTo(sx, sy); ctx.quadraticCurveTo(cp.x, cp.y, ex, ey); ctx.stroke(); ctx.setLineDash([]);
            const pwr = Math.min(dist / 360, 1);
            ctx.strokeStyle = hsl(h, 70, 55, .12 + pwr * .2); ctx.lineWidth = .8;
            ctx.beginPath(); ctx.arc(sx, sy, 5 + pwr * 6, 0, Math.PI * 2); ctx.stroke();
            if (hovNode && hovNode !== aiming.srcNode) {
                const th = opH(hovNode.op);
                ctx.strokeStyle = hsl(th, 75, 62, .72); ctx.lineWidth = 1.2;
                ctx.beginPath(); ctx.arc(ex, ey, 12, 0, Math.PI * 2); ctx.stroke();
                for (let i = 0; i < 4; i++) { const a = i / 4 * Math.PI * 2; ctx.beginPath(); ctx.moveTo(ex + Math.cos(a) * 15, ey + Math.sin(a) * 15); ctx.lineTo(ex + Math.cos(a) * 20, ey + Math.sin(a) * 20); ctx.stroke(); }
                setMsg(`Release → <em>${opLbl(curOp)}</em> redesigns <strong>${opLbl(hovNode.op)} N${hovNode.id}</strong>`, 'aim');
            } else {
                ctx.fillStyle = hsl(h, 65, 55, .25); ctx.beginPath(); ctx.arc(ex, ey, 2.5, 0, Math.PI * 2); ctx.fill();
            }
            ctx.restore();
        }

        function drawArrF() {
            arrowAnims.forEach(arrowAnim => {
                const { x1, y1, x2, y2, t, h } = arrowAnim;
                const cp = arcCtrl(x1, y1, x2, y2); const s = Math.min(t, 1);
                ctx.save();
                ctx.beginPath(); ctx.moveTo(x1, y1);
                const steps = Math.max(2, Math.floor(s * 46));
                for (let i = 1; i <= steps; i++) { const p = i / steps * s; const b = bezP(x1, y1, cp.x, cp.y, x2, y2, p); ctx.lineTo(b.x, b.y); }
                const g = ctx.createLinearGradient(x1, y1, x2, y2);
                g.addColorStop(0, hsl(h, 70, 55, 0)); g.addColorStop(Math.max(.01, s - .28), hsl(h, 70, 55, .04)); g.addColorStop(s, hsl(h, 70, 55, .52));
                ctx.strokeStyle = g; ctx.lineWidth = 1.4; ctx.setLineDash([]); ctx.stroke();
                const b = bezP(x1, y1, cp.x, cp.y, x2, y2, s); const tan = bezT(x1, y1, cp.x, cp.y, x2, y2, s); const ang = Math.atan2(tan.y, tan.x);
                ctx.strokeStyle = hsl(h, 70, 60, .85); ctx.lineWidth = 1.8;
                ctx.beginPath(); ctx.moveTo(b.x - Math.cos(ang) * 11, b.y - Math.sin(ang) * 11); ctx.lineTo(b.x, b.y); ctx.stroke();
                ctx.fillStyle = hsl(h, 75, 65, .95); ctx.beginPath();
                ctx.moveTo(b.x + Math.cos(ang) * 7, b.y + Math.sin(ang) * 7);
                ctx.lineTo(b.x - Math.cos(ang) * 2 + Math.cos(ang + 1.6) * 3.8, b.y - Math.sin(ang) * 2 + Math.sin(ang + 1.6) * 3.8);
                ctx.lineTo(b.x - Math.cos(ang) * 2 + Math.cos(ang - 1.6) * 3.8, b.y - Math.sin(ang) * 2 + Math.sin(ang - 1.6) * 3.8);
                ctx.closePath(); ctx.fill();
                ctx.strokeStyle = hsl(h, 65, 52, .5); ctx.lineWidth = .8;
                const fx = b.x - Math.cos(ang) * 11, fy = b.y - Math.sin(ang) * 11;
                [[.38, 3.2], [.58, -3.2]].forEach(([f, side]) => { ctx.beginPath(); ctx.moveTo(fx, fy); ctx.lineTo(fx + (b.x - fx) * f + Math.cos(ang + Math.PI / 2) * side, fy + (b.y - fy) * f + Math.sin(ang + Math.PI / 2) * side); ctx.stroke(); });
                if (s > .32) { [.93, .86, .79].forEach((sp, i) => { const bp = bezP(x1, y1, cp.x, cp.y, x2, y2, sp); ctx.fillStyle = hsl(h, 70, 55, .26 - i * .08); ctx.beginPath(); ctx.arc(bp.x + (Math.random() - .5) * 2, bp.y + (Math.random() - .5) * 2, 1, 0, Math.PI * 2); ctx.fill(); }); }
                ctx.restore();
            });
        }

        function shootArr(x1, y1, x2, y2, h, cb) {
            const dist = Math.sqrt((x2 - x1) ** 2 + (y2 - y1) ** 2);
            const spd = Math.min(.05, 90 / dist) + .018;
            const anim = { x1, y1, x2, y2, t: 0, h };
            arrowAnims.push(anim);
            sndFire(); hapFire();
            const go = () => {
                anim.t += spd; redrawV();
                if (anim.t < 1) { requestAnimationFrame(go); }
                else {
                    arrowAnims = arrowAnims.filter(a => a !== anim);
                    let ht = 0;
                    const imp = () => {
                        ht += .07;
                        ctx.save(); ctx.strokeStyle = hsl(h, 75, 60, (1 - ht) * .65); ctx.lineWidth = 1.5;
                        ctx.beginPath(); ctx.arc(x2, y2, 42 * ht, 0, Math.PI * 2); ctx.stroke();
                        ctx.strokeStyle = hsl(h, 75, 60, (1 - ht) * .28); ctx.lineWidth = .9;
                        ctx.beginPath(); ctx.arc(x2, y2, 24 * ht, 0, Math.PI * 2); ctx.stroke();
                        for (let i = 0; i < 8; i++) { const a = i / 8 * Math.PI * 2, sr = 8 + 28 * ht; ctx.strokeStyle = hsl(h, 75, 60, (1 - ht) * .32); ctx.lineWidth = .7; ctx.beginPath(); ctx.moveTo(x2 + Math.cos(a) * 9, y2 + Math.sin(a) * 9); ctx.lineTo(x2 + Math.cos(a) * sr, y2 + Math.sin(a) * sr); ctx.stroke(); }
                        ctx.restore();
                        if (ht < 1) requestAnimationFrame(imp); else { redrawV(); cb && cb(); }
                    }; imp();
                }
            }; requestAnimationFrame(go);
        }

        // ══════════════════════════════
        // POINTER EVENTS
        // ══════════════════════════════
        function evP(e) { if (e.touches) return { x: e.touches[0].clientX, y: e.touches[0].clientY }; return { x: e.clientX, y: e.clientY }; }
        function toWorld(p) { return { x: (p.x - camX) / camZ, y: (p.y - camY) / camZ }; }
        function nodeAt(wx, wy) { let best = null, bd = Infinity; nodes.forEach(n => { const d = (wx - n.x) ** 2 + (wy - n.y) ** 2; if (d < bd) { bd = d; best = n; } }); return best && bd < Math.pow(72 / camZ, 2) ? best : null; }

        let tMoved = false, tLong = false, longT = null, tStart = null;

        canvas.addEventListener('wheel', e => {
            e.preventDefault();
            const p = evP(e);
            const delta = -e.deltaY * 0.002;
            if (delta === 0) return;
            
            const wp = toWorld(p);
            camZ = Math.max(0.1, Math.min(6, camZ * Math.exp(delta)));
            
            camX = p.x - wp.x * camZ;
            camY = p.y - wp.y * camZ;
            
            computeV();
            redrawV();
        }, { passive: false });

        canvas.addEventListener('mousedown', e => { if (e.button === 2) return; ptrDn(evP(e), e.shiftKey || mode === 'fire'); });
        canvas.addEventListener('mousemove', e => ptrMv(evP(e)));
        canvas.addEventListener('mouseup', e => ptrUp(evP(e)));
        canvas.addEventListener('contextmenu', e => { e.preventDefault(); const p = evP(e); const wp = toWorld(p); const n = nodeAt(wp.x, wp.y); n ? showNodeCtx(p.x, p.y, n) : showSpawnCtx(p.x, p.y, null); });

        canvas.addEventListener('touchstart', e => {
            e.preventDefault();
            const p = { x: e.touches[0].clientX, y: e.touches[0].clientY };
            tStart = p; tMoved = false; tLong = false;
            const wp = toWorld(p); const n = nodeAt(wp.x, wp.y);
            longT = setTimeout(() => { if (!tMoved) { tLong = true; hapFire(); n ? showNodeCtx(p.x, p.y, n) : showSpawnCtx(p.x, p.y, null); } }, 520);
        }, { passive: false });

        canvas.addEventListener('touchmove', e => {
            e.preventDefault(); if (tLong) return;
            const p = { x: e.touches[0].clientX, y: e.touches[0].clientY };
            if (!tMoved) {
                const dx = p.x - tStart.x, dy = p.y - tStart.y;
                if (Math.sqrt(dx * dx + dy * dy) > 7) { tMoved = true; clearTimeout(longT); ptrDn(tStart, mode === 'fire'); }
            }
            if (tMoved) ptrMv(p);
        }, { passive: false });

        canvas.addEventListener('touchend', e => {
            e.preventDefault(); clearTimeout(longT);
            const p = e.changedTouches ? { x: e.changedTouches[0].clientX, y: e.changedTouches[0].clientY } : tStart;
            if (tLong) return;
            if (!tMoved) {
                const wp = toWorld(p); const n = nodeAt(wp.x, wp.y);
                if (n) selectNode(n);
                else { selNode = null; document.getElementById('selSt').style.display = 'none'; highlightCards(null); redrawV(); }
            } else ptrUp(p);
        }, { passive: false });

        function ptrDn(p, fire) {
            const wp = toWorld(p);
            const n = nodeAt(wp.x, wp.y); 
            if (!n) {
                isPanning = true;
                panStart = { x: p.x - camX, y: p.y - camY };
                return;
            }
            if (fire) {
                aiming = { srcNode: n, sx: n.x, sy: n.y, ex: wp.x, ey: wp.y };
                setMsg(`<em>${opLbl(curOp)}</em> nocked from <strong>${opLbl(n.op)} N${n.id}</strong> — drag to target`, 'aim');
                lastDragCell = nodes.indexOf(n);
                const aimLoop = () => { if (aiming) { redrawV(); aimPulseAnim = requestAnimationFrame(aimLoop); } };
                aimLoop();
            } else {
                dragging = n; dox = wp.x - n.x; doy = wp.y - n.y;
                lastDragCell = nodes.indexOf(n);
                selectNode(n);
                startDragSound();
            }
        }

        function ptrMv(p) {
            if (isPanning) {
                camX = p.x - panStart.x;
                camY = p.y - panStart.y;
                computeV();
                redrawV();
                return;
            }
            
            const wp = toWorld(p);
            
            if (dragging) {
                dragging.x = wp.x - dox; dragging.y = wp.y - doy;
                computeV(); redrawV();
                const now = Date.now();
                if (voronoi && now - lastDrgSnd > 260) {
                    const curCell = voronoi.delaunay.find(wp.x, wp.y);
                    if (curCell >= 0 && curCell !== lastDragCell) { lastDragCell = curCell; lastDrgSnd = now; borderSound(); hapBorder(); }
                }
                return;
            }

            if (aiming && p.x < 220) {
                const qvBtn = document.elementFromPoint(p.x, p.y)?.closest('.qv');
                if (qvBtn) {
                    const newOp = qvBtn.dataset.op;
                    if (newOp !== curOp) {
                        curOp = newOp; buildQuiver(); chime(curOp);
                    }
                }
            }

            const n = nodeAt(wp.x, wp.y);
            if (hovNode !== n) {
                if (aiming && n === aiming.srcNode && hovNode) {
                    // ignore hovering over own source
                } else {
                    hovNode = n;
                    if (n) { const op = OPS[n.op]; setMsg(`<strong>${opLbl(n.op)}</strong> N${n.id} — ${op?.verb || ''}`); }
                    else if (!aiming) setReady();

                    highlightCards(selNode ? selNode.id : (hovNode ? hovNode.id : null));
                    redrawV();
                }
            }
            if (aiming) {
                aiming.ex = wp.x; aiming.ey = wp.y;
                redrawV();
            }
        }

        function ptrUp(p) {
            if (isPanning) {
                isPanning = false;
                return;
            }
            if (dragging) {
                dragging = null; stopDragSound(); placeSound();
                computeV(); redrawV(); return;
            }
            if (aiming) {
                if (aimPulseAnim) { cancelAnimationFrame(aimPulseAnim); aimPulseAnim = null; }
                const snap = { ...aiming }; aiming = null; hovNode = null;
                const wp = toWorld(p);
                const tgt = nodeAt(wp.x, wp.y);
                if (tgt && tgt !== snap.srcNode) {
                    fireTo(snap.srcNode, tgt, curOp);
                } else if (Math.sqrt((snap.ex - snap.sx) ** 2 + (snap.ey - snap.sy) ** 2) > 20) {
                    const opN = addNode(opLbl(curOp), curOp, snap.ex, snap.ey);
                    hapSpawnNode(opN, 3);
                    edges.push({ from: snap.srcNode, to: opN });
                    setTimeout(() => fireTo(snap.srcNode, opN, curOp), 50);
                } else setReady();
                redrawV();
            }
        }

        canvas.addEventListener('click', e => {
            if (isPanning) return;
            const p = evP(e); if (aiming) return;
            const wp = toWorld(p);
            const n = nodeAt(wp.x, wp.y);
            if (n) selectNode(n);
            else { selNode = null; document.getElementById('selSt').style.display = 'none'; highlightCards(null); redrawV(); }
        });

        // ══════════════════════════════
        // FIRE
        // ══════════════════════════════
        function fireTo(srcNode, opNode, opKey) {
            const op = OPS[opKey];
            if (!op?.sys) { setMsg(`<em>${opLbl(opKey)}</em> is a seed — fire into an operator`); return; }
            setMsg(`<em>${op.lbl}</em> ${op.verb} ← <strong>${opLbl(srcNode.op)} N${srcNode.id}</strong>`, 'aim');

            OPS[opKey].usageCount++;
            buildQuiver();

            shootArr(srcNode.x, srcNode.y, opNode.x, opNode.y, opH(opKey), () => {
                hapHit(); hapPush(opNode, srcNode.x, srcNode.y, 8);
                edges.push({ from: srcNode, to: opNode });
                fireRipple(nodes.indexOf(opNode));
                runOp(srcNode, opNode, opKey);
            });
        }

        // ══════════════════════════════
        // NODES
        // ══════════════════════════════
        function mkNode(text, op, x, y, draft = false) {
            const opCatMap = { 'site':'site','inverter':'inverter','aphorist':'aphorist','analyst':'analyst',
                'fork':'site','surface':'site','holistic':'site','manip':'site',
                'zoom':'aphorist','play':'inverter','root':'site','limits':'analyst','modes':'inverter' };
            return { id: ++nid, text, op, x, y, vx: 0, vy: 0, glow: 0, run: 0, depth: 0, draft, cat: opCatMap[op] || 'site' };
        }
        function addNode(text, op, x, y, draft = false) { const n = mkNode(text, op, x, y, draft); nodes.push(n); document.getElementById('sN').textContent = nodes.length; computeV(); redrawV(); return n; }
        function removeNode(n) { edges = edges.filter(e => e.from !== n && e.to !== n); nodes = nodes.filter(x => x !== n); ops = ops.filter(o => o.srcNode !== n && o.opNode !== n && o.resNode !== n); if (selNode === n) selNode = null; document.getElementById('sN').textContent = nodes.length; computeV(); redrawV(); renderWT(); }
        function selectNode(n) { 
            selNode = n; n.glow = .45; computeV(); redrawV(); sndSel(); hapSel(); 
            document.getElementById('selSt').style.display = ''; 
            document.getElementById('sSel').textContent = opLbl(n.op) + ' N' + n.id; 
            highlightCards(n.id); scrollToCard(n.id); 
            if (typeof renderTimeline === 'function') renderTimeline();
            
            // === NODE INSPECTOR: ALWAYS show text when selecting ===
            // Remove any previous inspector card
            ops.filter(o => o.isInspector).forEach(o => {
                const oldCard = document.querySelector('.ocard[data-oid="' + o.id + '"]');
                if (oldCard) oldCard.remove();
            });
            ops = ops.filter(o => !o.isInspector);
            
            // Check if this node already has a card from an operation
            const existingCard = document.querySelector('.ocard[data-nid="' + n.id + '"]');
            
            if (n.ctxHtml) {
                // POML node — inject structured context card
                const existing = ops.find(o => o.resNode === n && o.isContextDump);
                if (!existing) {
                    const rec = { id: ++oid, srcNode: n, opNode: n, resNode: n, opKey: n.op, nb: 0, text: n.ctx || '', ts: Date.now(), html: n.ctxHtml, isContextDump: true };
                    ops.push(rec); addCard(rec); updateCard(rec.id, n.ctx || '', true);
                }
            }
            
            // ALWAYS create inspector card with full text + navigation
            if (n.text) {
                const title = (n.fullTitle || n.text || opLbl(n.op)).replace(/<[^>]*>?/gm, '').slice(0, 60);
                const bodyRaw = n.text || '';  // Keep markdown intact for rendering
                const bodyPlain = bodyRaw.replace(/<[^>]*>?/gm, '');
                const nbs = getNbs(n);
                const parent = edges.find(e => e.to === n);
                const children = edges.filter(e => e.from === n).map(e => e.to);
                
                const cardHtml = buildInspectorHtml(n, title, bodyRaw, nbs, parent, children);
                
                const rec = { id: ++oid, srcNode: parent ? parent.from : n, opNode: n, resNode: n, opKey: n.op, nb: 0, text: bodyPlain, ts: Date.now(), isInspector: true, title: title };
                ops.push(rec);
                addCard(rec);
                const secEl = document.getElementById('secs-' + rec.id);
                if (secEl) secEl.innerHTML = cardHtml;
            }
            
            // === REPL: show live context for selected node ===
            showSelectionContext(n);
        }
        
        function buildInspectorHtml(n, title, bodyText, nbs, parent, children) {
            const h = n.hue !== undefined ? n.hue : opH(n.op);
            let html = '<div style="padding:8px 10px;font-family:\'Cormorant Garamond\',serif">';
            
            // Header
            html += '<div style="font-family:\'IBM Plex Mono\',monospace;font-size:8px;color:var(--gold);letter-spacing:.1em;text-transform:uppercase;margin-bottom:6px;border-bottom:1px solid var(--rule);padding-bottom:4px">';
            html += opLbl(n.op) + ' N' + n.id;
            if (n.depth !== undefined) html += ' · depth ' + n.depth;
            html += '</div>';
            
            // Title
            html += '<div style="font-size:16px;font-weight:600;color:var(--ink2);line-height:1.3;margin-bottom:8px">' + title + '</div>';
            
            // Body text — render through parseSections for proper markdown
            // Each section gets its own spawn + fork buttons
            if (bodyText.length > 0) {
                const secs = parseSections(bodyText);
                secs.forEach(function(sec, idx) {
                    const secTextEsc = sec.text.replace(/'/g, "\\'").replace(/\n/g, "\\n").slice(0, 500);
                    html += '<div class="wsec" style="border-bottom:1px solid var(--rule2);padding:4px 0 4px 20px;margin:0;position:relative">';
                    // Spawn button — creates node from this section
                    html += '<button class="sfbtn" title="Spawn as node" onclick="event.stopPropagation();spawnSection(\'' + secTextEsc + '\',' + n.id + ')" style="position:absolute;left:0;top:6px">⊙</button>';
                    html += '<div class="sbody" style="user-select:text">' + sec.html + '</div>';
                    // Section action bar
                    html += '<div class="sec-acts" style="display:none;gap:4px;margin-top:3px;padding-top:3px;border-top:1px dashed var(--rule2)">';
                    html += '<button onclick="event.stopPropagation();spawnSection(\'' + secTextEsc + '\',' + n.id + ')" style="background:var(--bg3);border:1px solid var(--rule);color:var(--gold);font-size:8px;padding:3px 8px;cursor:pointer;font-family:ui-monospace,monospace;border-radius:2px">⊙ Spawn</button>';
                    html += '<button onclick="event.stopPropagation();spawnAndFork(\'' + secTextEsc + '\',' + n.id + ')" style="background:var(--bg3);border:1px solid var(--rule);color:var(--ink2);font-size:8px;padding:3px 8px;cursor:pointer;font-family:ui-monospace,monospace;border-radius:2px">⑂ Fork</button>';
                    html += '<button onclick="event.stopPropagation();navigator.clipboard.writeText(\'' + secTextEsc + '\');this.textContent=\'✓\'" style="background:var(--bg3);border:1px solid var(--rule);color:var(--ink3);font-size:8px;padding:3px 8px;cursor:pointer;font-family:ui-monospace,monospace;border-radius:2px">Copy</button>';
                    html += '<button onclick="event.stopPropagation();spawnSection(\'' + secTextEsc + '\',' + n.id + ');setTimeout(function(){replCmd(\'wt\')},300)" style="background:var(--bg3);border:1px solid var(--gold2);color:var(--gold);font-size:8px;padding:3px 8px;cursor:pointer;font-family:ui-monospace,monospace;border-radius:2px;font-weight:600">⟩WT</button>';
                    html += '</div>';
                    html += '</div>';
                });
            }
            
            // ── LINEAGE ──
            if (parent || children.length > 0) {
                html += '<div style="font-family:\'IBM Plex Mono\',monospace;font-size:8px;color:var(--ink3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:4px;margin-top:6px">LINEAGE</div>';
                if (parent) {
                    const pName = (parent.from.fullTitle || parent.from.text || opLbl(parent.from.op)).replace(/<[^>]*>?/gm, '').slice(0, 40);
                    html += '<div style="font-size:11px;margin:2px 0"><span style="color:var(--ink3)">↑ from</span> <span class="repl-entity" style="color:var(--gold);cursor:pointer" onclick="replFly(' + parent.from.id + ')">' + pName + '</span></div>';
                }
                children.forEach(function(ch) {
                    const cName = (ch.fullTitle || ch.text || opLbl(ch.op)).replace(/<[^>]*>?/gm, '').slice(0, 40);
                    html += '<div style="font-size:11px;margin:2px 0"><span style="color:var(--ink3)">↓ to</span> <span class="repl-entity" style="color:var(--gold);cursor:pointer" onclick="replFly(' + ch.id + ')">' + cName + '</span></div>';
                });
            }
            
            // ── NEIGHBORS ──
            if (nbs.length > 0) {
                html += '<div style="font-family:\'IBM Plex Mono\',monospace;font-size:8px;color:var(--ink3);letter-spacing:.08em;text-transform:uppercase;margin-top:8px;margin-bottom:4px">NEARBY (' + nbs.length + ')</div>';
                nbs.slice(0, 4).forEach(function(nb) {
                    const nbName = (nb.node.fullTitle || nb.node.text || opLbl(nb.node.op)).replace(/<[^>]*>?/gm, '').slice(0, 35);
                    html += '<div style="font-size:10px;margin:2px 0"><span class="repl-entity" style="color:var(--ink2);cursor:pointer" onclick="replFly(' + nb.node.id + ')">N' + nb.node.id + ' ' + nbName + '</span> <span style="color:var(--ink3);font-size:8px">' + Math.round(nb.len) + 'px</span></div>';
                });
            }
            
            // ── QUICK ACTIONS ──
            html += '<div style="display:flex;gap:4px;margin-top:10px;flex-wrap:wrap">';
            html += '<button onclick="replCmd(\'fork ' + n.id + '\')" style="background:var(--bg3);border:1px solid var(--rule);color:var(--gold);font-family:\'IBM Plex Mono\',monospace;font-size:9px;padding:5px 10px;cursor:pointer;border-radius:2px">⑂ Fork</button>';
            html += '<button onclick="replCmd(\'honey ' + n.id + '\')" style="background:var(--bg3);border:1px solid var(--rule);color:var(--gold);font-family:\'IBM Plex Mono\',monospace;font-size:9px;padding:5px 10px;cursor:pointer;border-radius:2px">🍯 Honey</button>';
            html += '<button onclick="replCmd(\'cat ' + n.id + '\')" style="background:var(--bg3);border:1px solid var(--rule);color:var(--ink2);font-family:\'IBM Plex Mono\',monospace;font-size:9px;padding:5px 10px;cursor:pointer;border-radius:2px">📖 Full Text</button>';
            html += '<button onclick="replCmd(\'neighbors ' + n.id + '\')" style="background:var(--bg3);border:1px solid var(--rule);color:var(--ink2);font-family:\'IBM Plex Mono\',monospace;font-size:9px;padding:5px 10px;cursor:pointer;border-radius:2px">◎ Neighbors</button>';
            html += '<button onclick="replCmd(\'wt ' + n.id + '\')" style="background:var(--bg3);border:1px solid var(--gold2);color:var(--gold);font-family:\'IBM Plex Mono\',monospace;font-size:9px;padding:5px 10px;cursor:pointer;border-radius:2px;font-weight:600">⟩ WorldText</button>';
            html += '</div>';
            
            html += '</div>';
            return html;
        }
        
        function showSelectionContext(n) {
            // Only auto-show context in REPL if panel is already expanded
            const bot = document.getElementById('botPanel');
            if (!bot || !bot.classList.contains('expanded')) return;
            
            const title = (n.fullTitle || n.text || opLbl(n.op)).replace(/<[^>]*>?/gm, '').slice(0, 45);
            const children = edges.filter(e => e.from === n).map(e => e.to);
            const parent = edges.find(e => e.to === n);
            const nbs = getNbs(n);
            
            replEmit('');
            replEmit('<span style="color:var(--gold);font-weight:600">▸ ' + title + '</span> <span class="repl-dim">N' + n.id + ' [' + opLbl(n.op) + ']</span>');
            
            // Show quick actions as clickable chips
            let actions = '';
            actions += '<span class="repl-entity" onclick="replCmd(\'fork ' + n.id + '\')">⑂ fork</span> · ';
            actions += '<span class="repl-entity" onclick="replCmd(\'honey ' + n.id + '\')">🍯 honey</span> · ';
            actions += '<span class="repl-entity" onclick="replCmd(\'drill ' + n.id + '\')">⛏ drill</span> · ';
            actions += '<span class="repl-entity" onclick="replCmd(\'cat ' + n.id + '\')">📖 cat</span>';
            replEmit(actions);
            
            // Children as candidates
            if (children.length > 0) {
                let childLine = '<span class="repl-dim">↓</span> ';
                children.forEach(function(ch) {
                    const cName = (ch.fullTitle || ch.text || opLbl(ch.op)).replace(/<[^>]*>?/gm, '').slice(0, 25);
                    childLine += '<span class="repl-entity" onclick="replFly(' + ch.id + ')">' + cName + '</span> · ';
                });
                replEmit(childLine.slice(0, -3));
            }
            
            // Parent
            if (parent) {
                const pName = (parent.from.fullTitle || parent.from.text || opLbl(parent.from.op)).replace(/<[^>]*>?/gm, '').slice(0, 30);
                replEmit('<span class="repl-dim">↑</span> <span class="repl-entity" onclick="replFly(' + parent.from.id + ')">' + pName + '</span>');
            }
            
            // Nearby as candidates to connect
            if (nbs.length > 0) {
                let nbLine = '<span class="repl-dim">◎</span> ';
                nbs.slice(0, 3).forEach(function(nb) {
                    const nbName = (nb.node.fullTitle || nb.node.text || opLbl(nb.node.op)).replace(/<[^>]*>?/gm, '').slice(0, 22);
                    nbLine += '<span class="repl-entity" onclick="replFly(' + nb.node.id + ')">' + nbName + '</span> · ';
                });
                replEmit(nbLine.slice(0, -3));
            }
        }
        function clearAll() { nodes = []; edges = []; ops = []; selNode = null; hovNode = null; vmap = null; ripples = []; document.getElementById('sN').textContent = '0'; redrawV(); renderWT(); setReady(); }

        // ══════════════════════════════
        // RUN OPERATOR
        // ══════════════════════════════
        async function runOp(srcNode, opNode, opKey) {
            // Guard: don't fork nodes with no real text content
            const guardTxt = (srcNode.text || srcNode.ctx || '').replace(/<[^>]*>/g, '').trim();
            if (guardTxt.length < 10) {
                setMsg('Node has too little text to operate on. Select a node with content.');
                return;
            }
            const op = OPS[opKey]; if (!op?.sys) return;
            const concept = srcNode.text;
            const spCtx = buildCtx(opNode);
            const sys = op.sys + spCtx;
            const userMsg = `The current narrative state is: ${concept}\n\nFork the garden now. Provide 2 to 4 surprising next steps.`;

            opNode.run = .01; startPhys();
            setMsg(`<em>${op.lbl}</em> generating paths…`, 'run');
            document.getElementById('tDot').className = 'tdot run';

            // ── LOADING CONTEXT CARD: show territory info while LLM works ──
            const loadingRec = { id: ++oid, srcNode, opNode, resNode: opNode, opKey, nb: 0, text: '', ts: Date.now(), title: 'Loading…', isLoading: true };
            ops.push(loadingRec);
            addCard(loadingRec);
            
            // Build the loading context display
            const srcText = srcNode.text.replace(/<[^>]*>?/gm, '').slice(0, 200);
            const srcTitle = (srcNode.fullTitle || srcNode.text || opLbl(srcNode.op)).replace(/<[^>]*>?/gm, '').slice(0, 50);
            const nbCtx = spCtx ? spCtx.replace('\\n\\nSPATIAL CONTEXT', '<strong>SPATIAL CONTEXT</strong>').replace(/- /g, '<br>• ') : '';
            
            const loadingHtml = `
<div style="padding:6px 8px;font-family:'IBM Plex Mono',monospace;font-size:9px;line-height:1.7;color:var(--ink2)">
  <div style="color:var(--gold);font-size:8px;letter-spacing:.1em;text-transform:uppercase;margin-bottom:6px">
    ⟩ ${op.lbl} · ${op.verb} <span class="blink">▸</span>
  </div>
  <div style="border-left:2px solid ${hsl(opH(opKey), 60, 50, 0.4)};padding-left:8px;margin-bottom:8px">
    <div style="font-size:7px;color:var(--ink3);letter-spacing:.08em;text-transform:uppercase">SOURCE TERRITORY</div>
    <div style="font-size:10px;color:var(--gold);font-weight:600;margin:2px 0">${srcTitle}</div>
    <div style="font-style:italic;font-family:'Cormorant Garamond',serif;font-size:13px;color:var(--ink2);line-height:1.5">${srcText}${srcNode.text.length > 200 ? '…' : ''}</div>
  </div>
  <div style="border-left:2px solid ${hsl(opH(opKey), 40, 40, 0.3)};padding-left:8px;margin-bottom:6px">
    <div style="font-size:7px;color:var(--ink3);letter-spacing:.08em;text-transform:uppercase">RECEIVING TERRITORY</div>
    <div style="font-size:10px;color:var(--ink2);font-weight:600;margin:2px 0">${opLbl(opNode.op)} N${opNode.id}</div>
  </div>
  ${nbCtx ? `<div style="font-size:8px;color:var(--ink3);line-height:1.6;margin-top:4px">${nbCtx}</div>` : ''}
  <div style="margin-top:8px;font-size:7px;color:var(--ink4);letter-spacing:.1em">GENERATING <span class="blink">●●●</span></div>
</div>`;
            
            updateCard(loadingRec.id, loadingHtml, false);
            const secEl = document.getElementById('secs-' + loadingRec.id);
            if (secEl) secEl.innerHTML = loadingHtml;

            try {
                let text = '';
                if (!API_KEY) {
                    text = `FORK 1: The Crystal Gallery\nYou step into a corridor of mirrors where every reflection is a version of you that stayed in the previous room. The air smells of ozone and old parchment.\n\nFORK 2: The Sinking Orchard\nThe floor turns to loam. Trees bearing heavy, glowing fruit grow rapidly around you. To eat is to remember everything you've ever forgotten.`;
                    await new Promise(resolve => setTimeout(resolve, 1000));
                } else {
                    const r = await fetch('https://api.openai.com/v1/chat/completions', {
                        method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${API_KEY}` },
                        body: JSON.stringify({
                            model: CONFIG.model,
                            messages: [{ role: 'system', content: sys }, { role: 'user', content: userMsg }],
                            temperature: 0.8
                        })
                    });
                    const data = await r.json();
                    if (data.usage) trackTokens(data.usage);
                    text = data.choices?.[0]?.message?.content || 'Error: ' + (data.error?.message || JSON.stringify(data));
                }

                // Remove loading context card now that results are in
                const loadingCard = document.querySelector(`.ocard[data-oid="${loadingRec.id}"]`);
                if (loadingCard) loadingCard.remove();
                ops = ops.filter(o => o.id !== loadingRec.id);

                // PARSE MULTIPLE FORKS
                const forkBlocks = text.split(/FORK \d+:/g).filter(b => b.trim());
                
                forkBlocks.forEach((block, idx) => {
                    const lines = block.trim().split('\n');
                    const title = lines[0].replace(/\[|\]/g, '').trim();
                    const narrative = lines.slice(1).join('\n').trim();

                    const dx = Math.cos((idx / forkBlocks.length) * Math.PI * 2);
                    const dy = Math.sin((idx / forkBlocks.length) * Math.PI * 2);
                    const dist = 150 + Math.random() * 50;
                    
                    const rx = Math.max(100, Math.min(VW - 100, opNode.x + dx * dist));
                    const ry = Math.max(100, Math.min(VH - 100, opNode.y + dy * dist));

                    const resNode = addNode(title, opKey, rx, ry, tryMode);
                    resNode.text = narrative;
                    resNode.fullTitle = title;
                    
                    edges.push({ from: opNode, to: resNode });
                    
                    const rec = { id: ++oid, srcNode, opNode, resNode, opKey, nb: 0, text: narrative, ts: Date.now(), title: title };
                    ops.push(rec); addCard(rec);
                    updateCard(rec.id, narrative, true);
                    
                    fireRipple(nodes.indexOf(resNode), .4);
                });

                opNode.run = 0;
                // Select the first fork result and center on it
                if (forkBlocks.length > 0) {
                    const firstFork = nodes[nodes.length - forkBlocks.length];
                    if (firstFork) {
                        camX = VW * 0.35 - firstFork.x * camZ;
                        camY = VH * 0.5 - firstFork.y * camZ;
                        selectNode(firstFork);
                    }
                }
                computeV(); redrawV();
                if (typeof renderTimeline === 'function') renderTimeline();
                setMsg(`<strong>⑂ ${forkBlocks.length} paths forked</strong> · click any path → <em>shift+drag</em> to fork deeper`);
                document.getElementById('tDot').className = 'tdot';
                
            } catch (err) {
                setMsg('Error: ' + err.message);
                document.getElementById('tDot').className = 'tdot';
            }
        }

        // ══════════════════════════════
        // TEXT PARSER
        // ══════════════════════════════
        function parseSections(raw) {
            const secs = [];
            
            // Pre-split: break on numbered items (1. 2. etc) even within same block
            // Also split on **Bold Title**: or **Bold Title** at line start
            const preSplit = raw
                .replace(/\n(\d+)\.\s+\*\*/g, '\n\n$1. **')              // "\n1. **Title" → break before
                .replace(/\n(\d+)\.\s+/g, '\n\n$1. ')                    // "\n1. text" → break before any numbered
                .replace(/\n\*\*([^*]+)\*\*:?/g, '\n\n**$1**')           // "\n**Title**:" → break before bold titles
                .replace(/\n(Fork|Branch|FORK|BRANCH|Level)\s+(\d+|[A-Z])/gi, '\n\nFork $2')  // Fork/Branch/Level
                .replace(/\n\*\s+\*\*/g, '\n\n* **')                     // "\n* **bold" → break before bold bullets
                .replace(/\n-\s+\*\*/g, '\n\n- **')                      // "\n- **bold" → break before bold bullets
                .replace(/\n---+/g, '\n\n---')                            // --- dividers
                .replace(/\n(Action-Reaction Chain|Summary|Conclusion)/gi, '\n\n$1');  // Common section headers
            
            const blocks = preSplit.split(/\n{2,}/);
            blocks.forEach(block => {
                block = block.trim(); if (!block) return;
                let esc = block.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                let html = esc
                    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                    .replace(/(?<!\*)\*(?!\*)(.+?)(?<!\*)\*(?!\*)/g, '<em>$1</em>')
                    .replace(/`([^`]+)`/g, '<code class="sc">$1</code>');
                if (/^(-{3,}|\*{3,})$/.test(block)) return;
                if (/^#{1,4}\s/.test(block)) { secs.push({ type: 'h', text: block.replace(/^#+\s/, ''), html: '<div class="sh">' + html.replace(/^#+\s/, '') + '</div>' }); return; }
                if (/^>\s?/.test(block)) { const inner = html.replace(/^&gt;\s?/gm, '').replace(/\n/g, '<br>'); secs.push({ type: 'q', text: block.replace(/^>\s?/gm, ''), html: '<div class="sq">' + inner + '</div>' }); return; }
                if (/^(\d+)\.\s/.test(block)) {
                    const m = block.match(/^(\d+)\.\s+(.*)/s);
                    if (m) {
                        const rawText = m[2].trim();
                        const t2 = rawText.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
                            .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                            .replace(/(?<!\*)\*(?!\*)(.+?)(?<!\*)\*(?!\*)/g, '<em>$1</em>')
                            .replace(/\n/g, '<br>');
                        secs.push({ type: 'num', num: m[1], text: rawText, html: '<div class="snum"><span class="sn">' + m[1] + '.</span><div>' + t2 + '</div></div>' });
                    }
                    return;
                }
                if (/^[-*+]\s/.test(block)) {
                    const lines = block.split(/\n/).filter(l => /^[-*+]\s/.test(l.trim()));
                    lines.forEach(line => {
                        const t2 = line.replace(/^[-*+]\s+/, '').replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
                        secs.push({ type: 'li', text: line.replace(/^[-*+]\s+/, ''), html: '<div class="snum"><span class="sn">·</span><span>' + t2 + '</span></div>' });
                    }); return;
                }
                // Bold-title paragraph: "**Title**: body text..."
                if (/^\*\*/.test(block)) {
                    const titleMatch = block.match(/^\*\*([^*]+)\*\*[:\s]*(.*)/s);
                    if (titleMatch) {
                        const secTitle = titleMatch[1].trim();
                        const secBody = titleMatch[2].trim()
                            .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
                            .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                            .replace(/(?<!\*)\*(?!\*)(.+?)(?<!\*)\*(?!\*)/g, '<em>$1</em>')
                            .replace(/\n/g, '<br>');
                        secs.push({ type: 'titled', text: block, html: '<div class="sp" style="margin:6px 0"><strong style="color:var(--gold);font-size:14px">' + secTitle + '</strong><br>' + secBody + '</div>' });
                        return;
                    }
                }
                secs.push({ type: 'p', text: block, html: '<p class="sp">' + html.replace(/\n/g, '<br>') + '</p>' });
            });
            return secs;
        }

        function mkSecBtn(secText, opKey) {
            const btn = document.createElement('button');
            btn.className = 'sfbtn'; btn.title = 'Spawn & fire this section'; btn.textContent = '⊙';
            btn.onclick = e => {
                e.stopPropagation();
                const vr = document.getElementById('vp').getBoundingClientRect();
                const x = 60 + Math.random() * (vr.width - 130);
                const y = 60 + Math.random() * (vr.height - 120);
                const n = addNode(secText.slice(0, 120), opKey, x, y, tryMode);
                hapSpawnNode(n, 6); sndSpawn(); hapSpawn();
                selectNode(n); setMode('fire');
                setMsg(`Section → <em>${opLbl(opKey)}</em> N${n.id} ${tryMode ? '[Draft]' : ''} · shift+drag to aim`);
            };
            return btn;
        }

        // ══════════════════════════════
        // WORLD TEXT
        // ══════════════════════════════
        function addCard(rec) {
            const list = document.getElementById('wtL');
            if (list.querySelector('div[style]')) list.innerHTML = '';
            if (ops.length > 1) {
                const conn = document.createElement('div'); conn.className = 'oconn';

            }
            const card = document.createElement('div');

            const h = opH(rec.opKey);
            const from = `${opLbl(rec.srcNode.op)} N${rec.srcNode.id} · "${rec.srcNode.text.slice(0, 26)}${rec.srcNode.text.length > 26 ? '…' : ''}"`;

<div class="ospine" style="background:${hsl(h, 65, 50, .55)}"></div>

  <span class="obadge" style="color:${hsl(h, 70, isLight ? 32 : 58)};border-color:${hsl(h, 60, 40, .35)}">${opLbl(rec.opKey)}</span>

</div>

  <button class="oa" onclick="sendToScene(this)" style="color:var(--gold)">⊕ Scene</button>

  <button class="oa" onclick="pruneCard(this)">Prune</button>
  <button class="oa" onclick="colCard(this)">−</button>

            card.onclick = e => { if (e.target.tagName === 'BUTTON') return; clickCard(rec); };
            list.appendChild(card);

        }

        function updateCard(oid, text, done) {
            const rec = ops.find(o => o.id === oid); if (!rec) return;
            if (!done) rec.text = text;
            else { rec.streaming = false; if (!rec.sections?.length && !rec.html) rec.sections = parseSections(text); }
            const secEl = document.getElementById('secs-' + oid); if (!secEl) return;
            secEl.innerHTML = '';
            
            if (rec.html) {
                secEl.innerHTML = rec.html;
                return;
            }
            
            const secs = done && rec.sections?.length ? rec.sections : parseSections(text.length > 0 ? text : '…');
            secs.forEach((sec, i) => {
                const row = document.createElement('div'); row.className = 'wsec';
                const fb = mkSecBtn(sec.text, rec.opKey); row.appendChild(fb);
                const body = document.createElement('div'); body.className = 'sbody';
                body.innerHTML = sec.html + (!done && i === secs.length - 1 ? '<span class="blink">▌</span>' : '');
                row.appendChild(body); secEl.appendChild(row);
            });
        }

        function clickCard(rec) { const n = nodes.find(x => x.id === rec.resNode.id); if (n) selectNode(n); document.querySelectorAll('.ocard').forEach(c => c.classList.toggle('active', c.dataset.oid == rec.id)); redrawV(); }
        function scrollToCard(nid) { const el = document.querySelector(`.ocard[data-nid="${nid}"]`); if (el) el.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); }

        function highlightCards(nid) {
            let found = null;
            document.querySelectorAll('.ocard').forEach(el => {
                const isActive = nid != null && el.dataset.nid == nid;

                el.classList.toggle('active', isActive);
                el.classList.toggle('related', !isActive && isRelated);
                el.classList.toggle('muted', nid != null && !isActive && !isRelated);

                    if (!found) found = el;
                }
            });
            // Scroll to the first matching card
            if (found) found.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            redrawV();
        }

        function routeCard(btn) { const rec = ops.find(o => o.id == btn.closest('.ocard').dataset.oid); if (!rec) return; document.getElementById('bIn').value = rec.text.slice(0, 200); document.getElementById('bIn').focus(); btn.textContent = '✓'; btn.classList.add('ok'); setTimeout(() => { btn.textContent = '↑ Route'; btn.classList.remove('ok') }, 1400); }
        function cpCard(btn) { const rec = ops.find(o => o.id == btn.closest('.ocard').dataset.oid); if (!rec) return; navigator.clipboard.writeText(rec.text).then(() => { btn.textContent = '✓'; btn.classList.add('ok'); setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('ok') }, 1400) }); }
        function pruneCard(btn) { const card = btn.closest('.ocard'); const oid = parseInt(card.dataset.oid, 10); const rec = ops.find(o => o.id === oid); if (!rec) return; ops = ops.filter(o => o.id !== oid); if (rec.resNode && rec.resNode.draft) removeNode(rec.resNode); card.remove(); if (!ops.length) renderWT(); }
        function colCard(btn) { const b = btn.closest('.ocard').querySelector('.wsecs'); b.style.display = b.style.display === 'none' ? '' : 'none'; btn.textContent = b.style.display === 'none' ? '+' : '−'; }

                return;

        }

        document.getElementById('wtBd').addEventListener('scroll', () => { redrawV(); });

        function wtZ(f) { wtScl = f === 0 ? 1 : Math.max(.4, Math.min(2.2, wtScl * f)); const l = document.getElementById('wtL'); l.style.transform = `scale(${wtScl})`; l.style.transformOrigin = 'top left'; l.style.width = (100 / wtScl) + '%'; redrawV(); }
        function togLinks() { linksOn = !linksOn; document.getElementById('lkBtn').style.color = linksOn ? 'var(--gold)' : 'var(--ink3)'; redrawV(); }

        function showSpawnCtx(x, y, src) {

            }

            actions.push(['⊙ Aim mode', () => { selectNode(n); setMode('fire'); }],
                ['Select', () => selectNode(n)],
                ['Copy', () => navigator.clipboard.writeText(n.text)],

        function posCtx(m, x, y) { m.style.display = 'block'; requestAnimationFrame(() => { m.style.left = Math.min(x, window.innerWidth - m.offsetWidth - 8) + 'px'; m.style.top = Math.max(8, y - m.offsetHeight - 4) + 'px'; }); }
        document.addEventListener('click', e => { if (!e.target.closest('#ctx')) document.getElementById('ctx').style.display = 'none'; });
        document.addEventListener('keydown', e => { if (e.key === 'Escape') { aiming = null; document.getElementById('ctx').style.display = 'none'; redrawV(); setReady(); } });

        // ══════════════════════════════
        // BOTTOM + SPAWNING
        // ══════════════════════════════
        function bKey(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                const inp = document.getElementById('bIn');
                const t = inp.value.trim();
                if (!t) return;
                if (t.startsWith('/')) {
                    replCmd(t.slice(1));
                    inp.value = '';
                } else {
                    spawnInput();
                }
            } else if (e.key === 'ArrowUp') {
                // Command history
                if (replHistory.length > 0) {
                    replHistIdx = Math.min(replHistIdx + 1, replHistory.length - 1);
                    document.getElementById('bIn').value = '/' + replHistory[replHistIdx];
                }
            } else if (e.key === 'ArrowDown') {
                if (replHistIdx > 0) {
                    replHistIdx--;
                    document.getElementById('bIn').value = '/' + replHistory[replHistIdx];
                } else {
                    replHistIdx = -1;
                    document.getElementById('bIn').value = '';
                }
            }
        }
        
        let replHistory = [], replHistIdx = -1;
        
        function toggleReplPanel() {
            const bot = document.getElementById('botPanel');
            const btn = document.getElementById('replToggle');
            if (bot.classList.contains('expanded')) {

                        else replEmit('Set API key for full compilation. Try: /grep, /find, /tree', 'repl-dim');
                        break;
                    }
                    
                    replEmit('<span class="repl-dim">Compiling to structured query...</span>');
                    (async () => {
                        try {
                            const r = await fetch('https://api.openai.com/v1/chat/completions', {
                                method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + API_KEY },
                                body: JSON.stringify({
                                    model: CONFIG.model,
                                    messages: [
                                        { role: 'system', content: 'You are a semantic compiler. Convert natural language into REPL commands for a narrative graph. Available commands: ls [filter], cat [id], fly [id], grep [term], find [term], tree, sort [name|depth|id], stats, roots, leaves, neighbors [id], honey [id], fork [id], prune [id]. Output ONLY the command (without / prefix), nothing else.' },
                                        { role: 'user', content: args }
                                    ],
                                    max_tokens: 50, temperature: 0.2
                                })
                            });
                            const data = await r.json();
                            if (data.usage) trackTokens(data.usage);
                    if (data.usage) trackTokens(data.usage);
                            if (data.choices?.[0]) {
                                const compiled = data.choices[0].message.content.trim();
                                replEmit(`<span class="repl-dim">→ ${compiled}</span>`);
                                replCmd(compiled);
                            }
                        } catch(e) { replEmit('Compilation failed: ' + e.message, 'repl-err'); }
                    })();
                    break;
                    
                case 'drill':
                    const drillNode = args ? nodes.find(n => n.id === parseInt(args)) : selNode;
                    if (!drillNode) { replEmit('Select a node or /drill [id].', 'repl-err'); break; }
                    if (!API_KEY) { replEmit('Set OpenAI key first.', 'repl-err'); break; }
                    replEmit(`<span class="repl-dim">Drilling from ${(drillNode.fullTitle || opLbl(drillNode.op)).replace(/<[^>]*>?/gm, '').slice(0, 40)}...</span>`);
                    // Run honey on current node, then auto-chain to children
                    (async () => {
                        replCmd('honey ' + drillNode.id);
                        const drillKids = edges.filter(e => e.from === drillNode).map(e => e.to);
                        for (const kid of drillKids.slice(0, 3)) {
                            await new Promise(r => setTimeout(r, 2000));
                            replCmd('honey ' + kid.id);
                        }
                        replEmit(`<span class="repl-dim">Drill complete: analyzed ${1 + Math.min(drillKids.length, 3)} nodes.</span>`);
                    })();
                    break;
                    
                default:
                    // Natural language fallback
                    const nl = cmd.toLowerCase();
                    if (nl.match(/show|list|all/)) { replCmd('ls' + (args ? ' ' + args : '')); }
                    else if (nl.match(/go|fly|visit|enter|navigate/)) { replCmd('cd ' + (args || cmd)); }
                    else if (nl.match(/search|look|where/)) { replCmd('grep ' + (args || '')); }
                    else if (nl.match(/back|up|parent/)) {
                        if (selNode) {
                            const par = edges.find(e => e.to === selNode);
                            if (par) replFly(par.from.id);
                            else replEmit('No parent node.', 'repl-dim');
                        }
                    }
                    else if (nl.match(/analyze|synth/)) { replCmd('honey' + (args ? ' ' + args : '')); }
                    else {
                        replEmit(`Unknown: "${cmd}". Type <span class="repl-entity" onclick="document.getElementById('bIn').value='/help';bKey({key:'Enter',preventDefault:()=>{}});">/help</span> for commands.`, 'repl-err');
                    }
            }
        }
