<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
    <title>HIVE LAND — Speech as Sovereignty</title>
    <style>
        :root{--bg:#030a0a;--green:#4af626;--amber:#f59e0b;--gold:#fbbf24;--red:#ef4444;--teal:#22d3ee;--font:ui-monospace,'Courier New',monospace}
        *{box-sizing:border-box;margin:0;padding:0;user-select:none}
        body{background:var(--bg);height:100vh;overflow:hidden;font-family:var(--font);color:var(--green)}
        .frame{position:relative;width:100vw;height:100vh;overflow:hidden}

        /* CRT LINES */
        .scanlines{position:absolute;inset:0;pointer-events:none;z-index:60;opacity:.15;
            background:linear-gradient(rgba(18,16,16,0) 50%,rgba(0,0,0,.2) 50%),linear-gradient(90deg,rgba(255,0,0,.03),rgba(0,255,0,.01),rgba(0,0,255,.03));
            background-size:100% 4px,4px 100%}

        /* CANVAS */
        #land{position:absolute;inset:0;cursor:crosshair}

        /* HEADER */
        .header{position:absolute;inset:0 0 auto 0;padding:20px 30px;z-index:40;pointer-events:none;display:flex;justify-content:space-between;align-items:flex-start}
        .header h1{font-size:20px;font-weight:900;letter-spacing:.2em;text-transform:uppercase;text-shadow:0 0 10px rgba(74,246,38,.5)}
        .header .sub{font-size:11px;opacity:.6;margin-top:3px;letter-spacing:.15em}
        .header .controls{display:flex;gap:8px;align-items:center;pointer-events:auto}
        .hud-label{font-size:11px;letter-spacing:.15em}

        /* BUTTONS */
        .btn{background:transparent;border:1px solid var(--green);color:var(--green);font-family:inherit;font-size:10px;letter-spacing:.2em;padding:8px 16px;cursor:pointer;text-transform:uppercase;transition:all .2s;box-shadow:0 0 10px rgba(74,246,38,.1)}
        .btn:hover{background:rgba(74,246,38,.1);box-shadow:0 0 20px rgba(74,246,38,.2)}
        .btn.gold{border-color:var(--gold);color:var(--gold);box-shadow:0 0 10px rgba(251,191,36,.1)}
        .btn.gold:hover{background:rgba(251,191,36,.1)}
        .btn.red{border-color:var(--red);color:var(--red);box-shadow:0 0 10px rgba(239,68,68,.1)}
        .btn.red:hover{background:rgba(239,68,68,.1)}

        /* INTERACTION HINTS */
        .hints{position:absolute;top:60px;right:30px;z-index:40;font-size:11px;letter-spacing:.15em;pointer-events:none;text-align:right}
        .hints span{display:block;margin-bottom:4px;opacity:.6}
        .hints .gold-hint{color:var(--gold);text-shadow:0 0 8px rgba(251,191,36,.4)}
        .hints .red-hint{color:var(--red);text-shadow:0 0 8px rgba(239,68,68,.4)}

        /* WORLD PANEL (BOTTOM LEFT) */
        .world-panel{position:absolute;bottom:60px;left:20px;width:340px;z-index:40;pointer-events:none;transition:opacity .4s}
        .world-panel.hidden{opacity:0}
        .wp-border{border-left:3px solid var(--green);padding:12px 14px;background:rgba(3,10,10,.9);backdrop-filter:blur(6px)}
        .wp-alive .wp-border{border-color:var(--green)}
        .wp-abiotic .wp-border{border-color:var(--amber)}
        .wp-name{font-weight:900;font-size:13px;letter-spacing:.15em;text-transform:uppercase;margin-bottom:6px}
        .wp-desc{font-size:12px;color:#aaa;line-height:1.5;margin-bottom:6px}
        .wp-meta{font-size:9px;color:#555;letter-spacing:.1em}
        .wp-entities{font-size:10px;color:var(--teal);margin-top:4px}

        /* STATS BAR */
        .stats{position:absolute;bottom:60px;right:20px;z-index:40;font-size:10px;letter-spacing:.12em;text-align:right;pointer-events:none}
        .stats div{margin-bottom:3px;opacity:.6}
        .stats .val{opacity:1;color:var(--gold)}

        /* CHAT BAR */
        .chat-bar{position:absolute;bottom:0;left:0;right:0;z-index:50;display:flex;padding:10px 20px;gap:8px;background:linear-gradient(to top,rgba(3,10,10,.95),rgba(3,10,10,.7),transparent)}
        .chat-input{flex:1;background:rgba(3,10,10,.6);border:1px solid rgba(74,246,38,.3);color:var(--green);font-family:inherit;font-size:14px;padding:10px 14px;outline:none;letter-spacing:.05em;transition:all .3s}
        .chat-input:focus{border-color:var(--green);box-shadow:0 0 15px rgba(74,246,38,.15)}
        .chat-input::placeholder{color:rgba(74,246,38,.2)}
        .chat-send{background:none;border:1px solid var(--green);color:var(--green);font-family:inherit;font-size:10px;font-weight:bold;padding:10px 18px;cursor:pointer;letter-spacing:.2em;text-transform:uppercase;transition:all .2s}
        .chat-send:hover{background:rgba(74,246,38,.1)}

        /* PHEROMONES */
        @keyframes drift{0%{transform:translateY(0);opacity:0}15%{transform:translateY(-10px);opacity:.8}100%{transform:translateY(-120px);opacity:0;filter:blur(2px)}}
        .phero{position:absolute;pointer-events:none;font-size:12px;letter-spacing:.2em;text-transform:uppercase;color:rgba(74,246,38,.5);text-shadow:0 0 8px rgba(74,246,38,.3);z-index:35;white-space:nowrap;animation:drift 5s cubic-bezier(.2,0,.4,1) forwards}

        /* SCANNER RESPONSE */
        .scanner{position:absolute;bottom:55px;left:50%;transform:translateX(-50%);width:min(92%,650px);z-index:42;pointer-events:none;display:none}
        .scanner.show{display:block}
        .scanner-text{background:rgba(3,10,10,.96);border:2px solid var(--green);color:#ccc;font-size:13px;line-height:1.5;padding:14px;max-height:220px;overflow-y:auto;white-space:pre-wrap;box-shadow:0 0 30px rgba(74,246,38,.1)}
        .scanner-hd{display:flex;justify-content:center;gap:6px;margin-top:4px}
        .scanner-label{font-size:9px;background:var(--green);color:#000;padding:2px 8px;font-weight:bold;letter-spacing:.1em}

        /* OP CONFIG */
        .op-panel{position:absolute;top:60px;left:20px;z-index:50;font-size:9px}
        .op-toggle{cursor:pointer;color:rgba(74,246,38,.4);letter-spacing:.1em;transition:color .2s}
        .op-toggle:hover{color:var(--green)}
        .op-body{display:none;margin-top:4px;background:rgba(3,10,10,.9);border:1px solid rgba(74,246,38,.2);padding:6px 8px}
        .op-body.show{display:block}
        .op-row{display:flex;gap:4px;margin-bottom:3px;align-items:center}
        .op-label{color:rgba(74,246,38,.5);width:32px;text-transform:uppercase;letter-spacing:.1em}
        .op-input{background:transparent;border:1px solid rgba(74,246,38,.15);color:var(--green);font-family:inherit;font-size:9px;padding:3px 6px;flex:1;outline:none}
    </style>
    <script src="data.js"></script>
    <script src="route-engine.js"></script>
</head>
<body>
    <div class="frame">
        <div class="scanlines" id="scanlines"></div>
        <canvas id="land"></canvas>

        <div class="header">
            <div>
                <h1>HIVE_LAND</h1>
                <div class="sub">SWARM_CONTEXT_LATTICE // SPEECH_AS_SOVEREIGNTY</div>
            </div>
            <div class="controls">
                <button class="btn" id="focusBtn" onclick="hiveLand.toggleFocus()">FOCUS_MODE: OFF</button>
            </div>
        </div>

        <div class="hints">
            <span>[ L-CLICK: FORAGE ]</span>
            <span class="gold-hint">[ SHIFT+CLICK: POLLINATE ]</span>
            <span class="red-hint">[ ALT+CLICK: STING ]</span>
        </div>

        <div class="world-panel hidden" id="worldPanel">
            <div class="wp-border">
                <div class="wp-name" id="wpName">—</div>
                <div class="wp-desc" id="wpDesc"></div>
                <div class="wp-entities" id="wpEntities"></div>
                <div class="wp-meta" id="wpMeta"></div>
            </div>
        </div>

        <div class="stats" id="statsBar">
            <div>PROVINCES: <span class="val" id="statProv">0</span></div>
            <div>ALIVE_CELLS: <span class="val" id="statAlive">0</span></div>
            <div>SWARM_SIZE: <span class="val" id="statSwarm">0</span></div>
            <div>HONEY: <span class="val" id="statHoney">0</span></div>
        </div>

        <div class="scanner" id="scanner">
            <div class="scanner-text" id="scannerText"></div>
            <div class="scanner-hd"><div class="scanner-label">HIVE SOVEREIGNTY</div></div>
        </div>

        <div class="op-panel">
            <div class="op-toggle" onclick="document.getElementById('opBody').classList.toggle('show')">⚙ API ▸</div>
            <div class="op-body" id="opBody">
                <div class="op-row"><span class="op-label">Key</span><input type="password" class="op-input" id="opKey" placeholder="sk-..." oninput="hiveLand.saveCfg()"></div>
                <div class="op-row"><span class="op-label">Model</span><input class="op-input" id="opModel" value="gpt-4o-mini" oninput="hiveLand.saveCfg()"></div>
                <div class="op-row"><span class="op-label">Base</span><input class="op-input" id="opBase" value="https://api.openai.com/v1" oninput="hiveLand.saveCfg()"></div>
            </div>
        </div>

        <div class="chat-bar">
            <input class="chat-input" id="chatInput" placeholder="speak to the swarm — sovereignty through language..." onkeydown="if(event.key==='Enter')hiveLand.sendChat()">
            <button class="chat-send" onclick="hiveLand.sendChat()">▸ DECREE</button>
        </div>
    </div>

<script>
const hiveLand = (() => {
    // ══════ DATA ══════
    let worlds = [], nodes = [], bees = [], pheromones = [];
    let canvas, ctx;
    let focusMode = false;
    let audioCtx = null;
    let selectedNode = null;
    let honey = [], honeyCount = 0;
    let time = 0;

    // ══════ MEMORY ══════
    let memoryStream = [], memId = 0;

    // ══════ AUDIO ══════
    function initAudio() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    function playBuzz(type='amber', vol=1) {
        if (!audioCtx) return;
        const now = audioCtx.currentTime;
        const master = audioCtx.createGain();
        master.gain.setValueAtTime(0, now);
        master.gain.linearRampToValueAtTime(.2*vol, now+.04);
        master.gain.exponentialRampToValueAtTime(.0001, now+1.2);
        master.connect(audioCtx.destination);

        // Drone
        const drone = audioCtx.createOscillator();
        const droneGain = audioCtx.createGain();
        drone.type = 'sawtooth';
        drone.frequency.setValueAtTime(type==='red'?45:type==='gold'?65:55, now);
        const lp = audioCtx.createBiquadFilter();
        lp.type='lowpass'; lp.frequency.value=200; lp.Q.value=12;
        droneGain.gain.setValueAtTime(.25,now);
        droneGain.gain.exponentialRampToValueAtTime(.01,now+.4);
        drone.connect(lp); lp.connect(droneGain); droneGain.connect(master);
        drone.start(now); drone.stop(now+.5);

        // Wings (FM buzz)
        const carrier = audioCtx.createOscillator();
        const mod = audioCtx.createOscillator();
        const modGain = audioCtx.createGain();
        carrier.type='sine'; mod.type='square';
        carrier.frequency.setValueAtTime(type==='gold'?880:440, now);
        mod.frequency.setValueAtTime(120, now);
        modGain.gain.setValueAtTime(350, now);
        const buzzGain = audioCtx.createGain();
        buzzGain.gain.setValueAtTime(.08, now);
        buzzGain.gain.exponentialRampToValueAtTime(.001, now+.3);
        mod.connect(modGain); modGain.connect(carrier.frequency);
        carrier.connect(buzzGain); buzzGain.connect(master);
        carrier.start(now); mod.start(now);
        carrier.stop(now+.35); mod.stop(now+.35);
    }

    // ══════ HEX LATTICE ══════
    const HEX_R = 48;
    let COLS = 10, ROWS = 8;

    function assemblyIndex(w) {
        return (w.entities.length*2)+(w.relations.length*3)+(w.events.length*4)+w.states.length;
    }

    function buildLattice(width, height) {
        nodes = [];
        // Dynamic layout: fill to fit POML worlds
        COLS = Math.floor((width * .85) / (HEX_R * 1.75));
        ROWS = Math.ceil(worlds.length / COLS);

        const offX = width * .08;
        const offY = height * .13;

        worlds.forEach((w, i) => {
            const q = i % COLS, r = Math.floor(i / COLS);
            const x = offX + q * (HEX_R * 1.75) + (r % 2 === 0 ? 0 : HEX_R * .875);
            const y = offY + r * (HEX_R * 1.55);
            const ai = assemblyIndex(w);

            nodes.push({
                id: w.uid, q, r, x, y,
                world: w,
                name: w.name.replace(/([A-Z])/g,' $1').trim(),
                ai, alive: ai > 15,
                status: 'idle',        // idle | amber | gold | red
                statusLife: 0,
                nectarLevel: Math.random() * .5,
                sovereignty: 0,        // accumulated speech power (0-1)
                label: w.name.replace(/([A-Z])/g,' $1').trim().slice(0,12)
            });
        });
    }

    function getNeighbors(node) {
        return nodes.filter(n => {
            const dq = Math.abs(n.q - node.q);
            const dr = Math.abs(n.r - node.r);
            return (dq <= 1 && dr <= 1) && n !== node;
        });
    }

    // ══════ BEES (SWARM AGENTS) ══════
    function spawnSwarm(origin, vector, count) {
        const neighbors = getNeighbors(origin);
        const targets = neighbors.slice(0, count || neighbors.length);
        targets.forEach(target => {
            bees.push({
                id: Math.random().toString(36).slice(2,8),
                origin, target,
                progress: 0,
                speed: .015 + Math.random()*.015,
                color: vector,
                vibration: 0,
                generation: 0
            });
        });
    }

    // ══════ RENDERING ══════
    function drawHex(cx, cy, r, node) {
        ctx.beginPath();
        for (let i = 0; i < 6; i++) {
            const angle = (i * Math.PI * 2) / 6 + Math.PI / 6;
            const hx = cx + r * Math.cos(angle);
            const hy = cy + r * Math.sin(angle);
            if (i === 0) ctx.moveTo(hx, hy); else ctx.lineTo(hx, hy);
        }
        ctx.closePath();

        // Fill — very subtle
        const isSelected = selectedNode === node;
        if (node.alive) {
            ctx.fillStyle = isSelected ? 'rgba(74,246,38,.12)' : 'rgba(74,246,38,.03)';
        } else {
            ctx.fillStyle = isSelected ? 'rgba(255,140,0,.1)' : 'rgba(255,140,0,.015)';
        }
        ctx.fill();

        // Stroke
        let strokeColor = focusMode ? 'rgba(15,118,110,.3)' : (node.alive ? 'rgba(74,246,38,.2)' : 'rgba(255,140,0,.1)');
        if (node.status !== 'idle') {
            strokeColor = node.status === 'gold' ? '#fbbf24' : node.status === 'red' ? '#ef4444' : '#f59e0b';
        }
        ctx.strokeStyle = strokeColor;
        ctx.lineWidth = node.status !== 'idle' ? 2.5 : 1;
        ctx.stroke();

        // Corona glow for active
        if (node.status !== 'idle' && !focusMode) {
            ctx.shadowBlur = 15;
            ctx.shadowColor = strokeColor;
            ctx.lineWidth = 3;
            ctx.stroke();
            ctx.shadowBlur = 0;
        }

        // Nectar pulse core
        if (node.nectarLevel > .08) {
            ctx.beginPath();
            ctx.arc(cx, cy, r * .35 * node.nectarLevel, 0, Math.PI * 2);
            ctx.fillStyle = node.alive
                ? `rgba(74,246,38,${node.nectarLevel*.4})`
                : `rgba(255,140,0,${node.nectarLevel*.3})`;
            ctx.fill();
        }

        // Sovereignty ring
        if (node.sovereignty > .05) {
            ctx.beginPath();
            ctx.arc(cx, cy, r * .6, -Math.PI/2, -Math.PI/2 + Math.PI*2*node.sovereignty);
            ctx.strokeStyle = `rgba(34,211,238,${node.sovereignty*.8})`;
            ctx.lineWidth = 2;
            ctx.stroke();
        }

        // Label — world name
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.font = `bold ${focusMode ? 9 : 8}px ${getComputedStyle(document.body).fontFamily}`;
        ctx.fillStyle = node.alive
            ? (focusMode ? 'rgba(20,120,100,.7)' : 'rgba(74,246,38,.5)')
            : (focusMode ? 'rgba(120,80,20,.5)' : 'rgba(255,140,0,.3)');
        ctx.fillText(node.label, cx, cy + r * .65);

        // AI index badge
        ctx.font = `bold 7px ${getComputedStyle(document.body).fontFamily}`;
        ctx.fillStyle = node.alive ? 'rgba(74,246,38,.3)' : 'rgba(255,140,0,.2)';
        ctx.fillText(`AI:${node.ai}`, cx, cy - r * .55);
    }

    function drawBees() {
        bees.forEach(bee => {
            const cx = bee.origin.x + (bee.target.x - bee.origin.x) * bee.progress;
            const cy = bee.origin.y + (bee.target.y - bee.origin.y) * bee.progress + bee.vibration;
            const color = bee.color === 'gold' ? '#fbbf24' : bee.color === 'red' ? '#ef4444' : '#f59e0b';

            // Trail
            ctx.beginPath();
            ctx.moveTo(bee.origin.x, bee.origin.y);
            ctx.lineTo(cx, cy);
            ctx.strokeStyle = color + '44';
            ctx.lineWidth = 1.5;
            ctx.stroke();

            // Body
            const angle = Math.atan2(bee.target.y - bee.origin.y, bee.target.x - bee.origin.x);
            ctx.beginPath();
            ctx.ellipse(cx, cy, 5, 3, angle, 0, Math.PI * 2);
            ctx.fillStyle = color;
            if (!focusMode) { ctx.shadowBlur = 8; ctx.shadowColor = color; }
            ctx.fill();
            ctx.shadowBlur = 0;
        });
    }

    function render() {
        const w = canvas.width, h = canvas.height;
        time = Date.now() / 1000;

        // BG
        ctx.fillStyle = focusMode ? '#f8fafb' : '#030a0a';
        ctx.fillRect(0, 0, w, h);

        // Ambient glow blobs
        if (!focusMode) {
            nodes.filter(n=>n.alive).slice(0,8).forEach(n => {
                const grad = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, HEX_R*2);
                grad.addColorStop(0, 'rgba(74,246,38,.02)');
                grad.addColorStop(1, 'transparent');
                ctx.fillStyle = grad;
                ctx.fillRect(n.x-HEX_R*2, n.y-HEX_R*2, HEX_R*4, HEX_R*4);
            });
        }

        // Draw lattice
        nodes.forEach(n => drawHex(n.x, n.y, HEX_R, n));

        // Draw bees
        drawBees();

        // Update stats
        el('statProv').textContent = nodes.length;
        el('statAlive').textContent = nodes.filter(n=>n.alive).length;
        el('statSwarm').textContent = bees.length;
        el('statHoney').textContent = honeyCount;
    }

    // ══════ GAME TICK ══════
    function tick() {
        // Update bees
        const nextBees = [];
        bees.forEach(bee => {
            bee.progress += bee.speed;
            bee.vibration = Math.sin(Date.now() * .08 + parseInt(bee.id, 36)) * 3;

            if (bee.progress >= 1) {
                // Land and pollinate
                bee.target.status = bee.color;
                bee.target.statusLife = 80;
                bee.target.nectarLevel = Math.min(1, bee.target.nectarLevel + .3);
                playBuzz(bee.color, .3);

                // Chain reaction — 40% chance
                if (Math.random() > .6 && bee.generation < 3) {
                    const nbrs = getNeighbors(bee.target);
                    const next = nbrs[Math.floor(Math.random() * nbrs.length)];
                    if (next) {
                        nextBees.push({
                            id: Math.random().toString(36).slice(2,8),
                            origin: bee.target, target: next,
                            progress: 0,
                            speed: bee.speed * .92,
                            color: bee.color,
                            vibration: 0,
                            generation: bee.generation + 1
                        });
                    }
                }
            } else {
                nextBees.push(bee);
            }
        });
        bees = nextBees;

        // Decay node status
        nodes.forEach(n => {
            if (n.status !== 'idle') {
                n.statusLife--;
                if (n.statusLife <= 0) n.status = 'idle';
            }
            n.nectarLevel *= .985;  // natural decay
            n.sovereignty *= .998; // sovereignty decays without speech
        });

        render();
        requestAnimationFrame(tick);
    }

    // ══════ INTERACTION ══════
    function handleClick(e) {
        initAudio();
        const rect = canvas.getBoundingClientRect();
        const mx = e.clientX - rect.left, my = e.clientY - rect.top;

        // Find closest node
        let closest = null, dMin = Infinity;
        nodes.forEach(n => {
            const d = Math.hypot(n.x - mx, n.y - my);
            if (d < dMin) { dMin = d; closest = n; }
        });
        if (!closest || dMin > HEX_R * 1.1) return;

        const vector = e.shiftKey ? 'gold' : e.altKey ? 'red' : 'amber';
        playBuzz(vector, 1);

        closest.status = vector;
        closest.statusLife = 80;
        closest.nectarLevel = 1;
        selectedNode = closest;

        // Show world panel
        showWorldPanel(closest);

        // Spawn swarm
        spawnSwarm(closest, vector);

        // Emit pheromone
        const texts = {
            amber: ['NECTAR_PROVENANCE_LOCKED','HIVE_MIND_SYNC','AXIAL_DELEGATION_OK','SWARM_ONTOLOGY_VALID'],
            gold: ['POLLINATING_GOAL_VECTOR','GOLDEN_INTENT_FLOW','QUEEN_AUTHORITY_DERIVED','SOVEREIGNTY_COMPILED'],
            red: ['STING_PROTOCOL_ISOLATION','IMPURE_NECTAR_PURGE','SWARM_HALT_ENGAGED','BLOCK_CONTEXT_CONTAMINATION']
        };
        const t = texts[vector];
        emitPheromone(closest.x, closest.y - 30, t[Math.floor(Math.random()*t.length)]);

        // Memory
        createMemory(`${vector.toUpperCase()} action on ${closest.name} (AI:${closest.ai})`, 'action', vector==='gold'?7:5);
    }

    function showWorldPanel(node) {
        const panel = el('worldPanel');
        const w = node.world;
        panel.classList.remove('hidden');
        panel.className = `world-panel ${node.alive ? 'wp-alive' : 'wp-abiotic'}`;

        el('wpName').textContent = `${node.name} ${node.alive ? '◆' : ''}`;
        el('wpName').style.color = node.alive ? 'var(--green)' : 'var(--amber)';
        el('wpDesc').textContent = w.description.slice(0, 180) + (w.description.length > 180 ? '...' : '');
        el('wpEntities').innerHTML = w.entities.slice(0,6).map(e => `[${e.name}]`).join(' ');
        el('wpMeta').textContent = `AI:${node.ai} // ${w.genre} // POML.${w.uid.slice(0,8)}`;
    }

    // ══════ PHEROMONES ══════
    function emitPheromone(x, y, text) {
        const d = document.createElement('div');
        d.className = 'phero';
        d.textContent = text;
        d.style.left = Math.max(10, Math.min(x, canvas.width-150)) + 'px';
        d.style.top = Math.max(50, Math.min(y, canvas.height-100)) + 'px';
        d.style.color = focusMode ? 'rgba(20,120,100,.6)' : 'rgba(74,246,38,.5)';
        document.querySelector('.frame').appendChild(d);
        setTimeout(() => d.remove(), 5500);
    }

    // Ambient pheromone emitter
    setInterval(() => {
        if (Math.random() > .5 || !nodes.length) return;
        const alive = nodes.filter(n => n.alive);
        if (!alive.length) return;
        const n = alive[Math.floor(Math.random()*alive.length)];
        const texts = [
            n.name.toUpperCase().replace(/\s+/g,'_'),
            ...n.world.entities.slice(0,2).map(e => e.name.toUpperCase().replace(/\s+/g,'_')),
            'CONTEXT_TERRAIN_ACTIVE', 'REFRACTIVE_GROUNDING', 'ATC_SOVEREIGN_LOCK'
        ];
        emitPheromone(n.x, n.y - 20, texts[Math.floor(Math.random()*texts.length)]);
    }, 3500);

    // ══════ MEMORY STREAM ══════
    function createMemory(text, type='observation', importance=5) {
        memoryStream.push({ id: memId++, text, type, importance, time: Date.now() });
        if (importance >= 6) {
            emitPheromone(
                Math.random() * canvas.width * .7 + canvas.width * .15,
                Math.random() * canvas.height * .3 + 50,
                text.slice(0, 30).toUpperCase().replace(/\s+/g, '_')
            );
        }
    }

    function retrieveMemories(query, k=5) {
        if (!memoryStream.length) return [];
        const qw = new Set(query.toLowerCase().split(/\W+/).filter(w => w.length > 2));
        return memoryStream.map(m => {
            const mw = new Set(m.text.toLowerCase().split(/\W+/).filter(w => w.length > 2));
            let ov = 0; qw.forEach(w => { if(mw.has(w)) ov++; });
            const rec = Math.pow(.99, (Date.now()-m.time)/10000);
            return { mem: m, score: rec + m.importance/10 + (qw.size ? ov/qw.size : 0) };
        }).sort((a,b) => b.score - a.score).slice(0,k).map(r => r.mem);
    }

    // ══════ CHAT — SPEECH AS SOVEREIGNTY ══════
    async function sendChat() {
        const input = el('chatInput'), text = input.value.trim();
        if (!text) return;
        input.value = '';

        createMemory(`[DECREE] "${text}"`, 'action', 6);

        // Parse intent
        const intent = parseIntent(text);

        switch (intent.action) {
            case 'pollinate': {
                const target = findWorldByName(intent.target);
                if (target) {
                    target.status = 'gold';
                    target.statusLife = 120;
                    target.nectarLevel = 1;
                    target.sovereignty = Math.min(1, target.sovereignty + .3);
                    spawnSwarm(target, 'gold', 6);
                    selectedNode = target;
                    showWorldPanel(target);
                    showScanner(`POLLINATION DECREE: ${target.name}\nSovereignty: ${(target.sovereignty*100).toFixed(0)}%\nSwarm dispatched.`);
                    createMemory(`Pollinated ${target.name} by decree`, 'action', 7);
                } else {
                    showScanner(`No province found matching "${intent.target}". Speak a world name.`);
                }
                break;
            }
            case 'sting': {
                const target = findWorldByName(intent.target);
                if (target) {
                    target.status = 'red';
                    target.statusLife = 100;
                    target.sovereignty = Math.max(0, target.sovereignty - .2);
                    spawnSwarm(target, 'red', 4);
                    showScanner(`STING PROTOCOL: ${target.name}\nProvince isolated. Sovereignty reduced.`);
                    createMemory(`Stung ${target.name} — isolation protocol`, 'action', 7);
                } else showScanner(`No province found for sting.`);
                break;
            }
            case 'synthesize': {
                const activeNodes = nodes.filter(n => n.sovereignty > .1);
                if (activeNodes.length >= 2) {
                    const names = activeNodes.slice(0,4).map(n => n.name);
                    activeNodes.forEach(n => n.sovereignty *= .5);
                    await llmSynthesize(activeNodes.slice(0,4));
                } else showScanner('Need 2+ provinces with sovereignty to synthesize honey.');
                break;
            }
            case 'survey': {
                const alive = nodes.filter(n => n.alive);
                const top = [...alive].sort((a,b) => b.ai - a.ai).slice(0, 5);
                let txt = `LAND SURVEY: ${nodes.length} provinces, ${alive.length} alive\n\nTOP CAUSAL DEPTH:\n`;
                top.forEach((n,i) => { txt += `${i+1}. ${n.name} (AI:${n.ai}, ${n.world.genre})\n`; });
                showScanner(txt);
                break;
            }
            case 'remember': {
                const mems = retrieveMemories(intent.target || text, 6);
                let txt = `MEMORY RECALL:\n`;
                mems.forEach(m => { txt += `· ${m.text.slice(0,80)}\n`; });
                showScanner(txt);
                break;
            }
            default:
                // Free speech → LLM or local
                await llmChat(text);
                break;
        }
    }

    function parseIntent(text) {
        const t = text.toLowerCase();
        if (t.includes('pollinate') || t.includes('bless') || t.includes('grow') || t.includes('nurture'))
            return { action: 'pollinate', target: t.replace(/pollinate|bless|grow|nurture|the/gi,'').trim() };
        if (t.includes('sting') || t.includes('isolate') || t.includes('purge') || t.includes('block'))
            return { action: 'sting', target: t.replace(/sting|isolate|purge|block|the/gi,'').trim() };
        if (t.includes('synth') || t.includes('honey') || t.includes('brew') || t.includes('compile'))
            return { action: 'synthesize', target: '' };
        if (t === 'survey' || t.includes('overview') || t.includes('census') || t.includes('map'))
            return { action: 'survey', target: '' };
        if (t.includes('remember') || t.includes('recall') || t.includes('memory'))
            return { action: 'remember', target: t.replace(/remember|recall|memory|what|do|i|know/gi,'').trim() };
        return { action: 'speak', target: text };
    }

    function findWorldByName(query) {
        if (!query) return null;
        query = query.toLowerCase().trim();
        return nodes.find(n => n.name.toLowerCase().includes(query))
            || nodes.find(n => n.world.genre.toLowerCase().includes(query))
            || null;
    }

    // ══════ LLM — HIVE SPEAKS ══════
    async function llmChat(text) {
        const key = el('opKey').value.trim();
        const target = selectedNode;
        const w = target?.world;

        if (!key) {
            showScanner(target
                ? `${target.name}\n"${w.description.slice(0,200)}"\n\n[Configure API for full sovereignty]`
                : 'The hive-land awaits your decree. Click a province or configure API.');
            return;
        }

        const base = el('opBase').value.trim(), model = el('opModel').value.trim();
        const mems = retrieveMemories(`${text} ${w?.name||''} ${w?.genre||''}`, 3);

        const sysPrompt = `You analyze POML narrative provinces. Output structured lines, one fact per line:
PROVINCE: Name — status and role
ENTITY: Name[Type] — what it does
RELATION: A→type→B — causal link
STATUS: sovereignty/energy observation
You MUST name at least 2 entities by exact NAME[TYPE]. Zero metaphors. Zero poetic prose. Data-grounded only. 3-5 lines.

SELECTED: ${w ? `"${target.name}" (AI:${assemblyIndex(w)}, ${w.genre})
${w.description}
Entities: ${w.entities.map(e=>e.name+'['+e.type+']').join(', ')}
Relations: ${w.relations.map(r=>r.from+'→'+r.type+'→'+r.to).join(', ')}
Events: ${w.events.map(e=>e.name).join(', ')}` : 'No province selected'}

${mems.length ? 'RECENT DECREES:\n'+mems.map(m=>`[${m.type}] ${m.text.slice(0,80)}`).join('\n') : ''}

LATTICE: ${nodes.filter(n=>n.alive).length}/${nodes.length} alive, ${honeyCount} honey, ${bees.length} bees`;

        showScanner('ANALYZING...');

        try {
            const resp = await fetch(`${base}/chat/completions`, {
                method:'POST',
                headers:{'Content-Type':'application/json','Authorization':`Bearer ${key}`},
                body: JSON.stringify({ model, messages: [{role:'system',content:sysPrompt},{role:'user',content:text}], max_tokens:200, temperature:.4 })
            });
            const data = await resp.json();
            if (data.choices?.[0]) {
                const reply = data.choices[0].message.content;
                showScanner(reply);
                createMemory(`[ANALYSIS] ${reply.slice(0,120)}`, 'observation', 6);
                if (target) {
                    target.sovereignty = Math.min(1, target.sovereignty + .15);
                    target.nectarLevel = Math.min(1, target.nectarLevel + .2);
                }
            }
        } catch (err) {
            showScanner('API connection failed. Check ⚙ API configuration.');
        }
    }

    // LLM-powered cross-world synthesis
    async function llmSynthesize(activeNodes) {
        const key = el('opKey').value.trim();
        if (!key) {
            const names = activeNodes.map(n => n.name);
            honeyCount++;
            honey.push({ text: names.join(' + '), time: Date.now() });
            showScanner(`HONEY #${honeyCount}\n${names.join(' + ')}\n[Configure API for deep synthesis]`);
            createMemory(`Honey #${honeyCount}: ${names.join(', ')}`, 'honey', 8);
            return;
        }

        const base = el('opBase').value.trim(), model = el('opModel').value.trim();
        const worldData = activeNodes.map(n => {
            const w = n.world;
            return `"${n.name}" (AI:${n.ai}, ${w.genre}, sov:${(n.sovereignty*100).toFixed(0)}%)
  Entities: ${w.entities.map(e=>e.name+'['+e.type+']').join(', ')}
  Relations: ${w.relations.map(r=>r.from+'→'+r.type+'→'+r.to).join(', ')}`;
        }).join('\n');

        showScanner('SYNTHESIZING ACROSS PROVINCES...');

        try {
            const resp = await fetch(`${base}/chat/completions`, {
                method:'POST',
                headers:{'Content-Type':'application/json','Authorization':`Bearer ${key}`},
                body: JSON.stringify({ model, messages: [
                    {role:'system',content:`You synthesize connections between POML narrative provinces. Output structured lines:
CONNECTION: Province_A ↔ Province_B — shared element
ENTITY: Name[Type] — cross-world role
INSIGHT: what this convergence reveals
You MUST reference entities from at least 2 different provinces by exact NAME[TYPE]. Zero metaphors. 4-6 lines.`},
                    {role:'user',content:`Synthesize connections between these sovereignty-weighted provinces:\n${worldData}`}
                ], max_tokens:250, temperature:.4 })
            });
            const data = await resp.json();
            if (data.choices?.[0]) {
                const reply = data.choices[0].message.content;
                honeyCount++;
                honey.push({ text: reply, time: Date.now() });
                showScanner(`HONEY #${honeyCount} — CROSS-WORLD SYNTHESIS\n\n${reply}`);
                createMemory(`Honey #${honeyCount}: ${reply.slice(0,120)}`, 'honey', 8);
            }
        } catch (err) {
            showScanner('Synthesis failed — API error.');
        }
    }

    // ══════ SCANNER ══════
    function showScanner(text) {
        const s = el('scanner');
        s.classList.add('show');
        el('scannerText').textContent = text;
        clearTimeout(showScanner._t);
        showScanner._t = setTimeout(() => s.classList.remove('show'), 12000);
    }

    // ══════ UTIL ══════
    function el(id) { return document.getElementById(id); }

    function toggleFocus() {
        focusMode = !focusMode;
        el('focusBtn').textContent = `FOCUS_MODE: ${focusMode ? 'ON' : 'OFF'}`;
        el('scanlines').style.display = focusMode ? 'none' : '';
        document.querySelector('.frame').style.background = focusMode ? '#f8fafb' : '#030a0a';
        document.querySelector('.header h1').style.color = focusMode ? '#0f766e' : '';
        document.querySelector('.header .sub').style.color = focusMode ? '#0f766e' : '';
    }

    function saveCfg() {
        ['opKey','opModel','opBase'].forEach(id => localStorage.setItem('hiveland_'+id, el(id).value));
    }
    function loadCfg() {
        ['opKey','opModel','opBase'].forEach(id => { const v=localStorage.getItem('hiveland_'+id); if(v) el(id).value=v; });
    }

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        buildLattice(canvas.width, canvas.height);
    }

    // ══════ INIT ══════
    function init() {
        canvas = el('land');
        ctx = canvas.getContext('2d');
        worlds = RouteEngine.parseAll(WORLDS_DATA);

        resize();
        loadCfg();
        window.addEventListener('resize', resize);
        canvas.addEventListener('click', handleClick);

        createMemory('The Hive-Land awakens. Speech is sovereignty.', 'observation', 8);
        showScanner(`HIVE-LAND v1\n\n${nodes.length} provinces. ${nodes.filter(n=>n.alive).length} alive cells.\n\nClick to forage (amber), SHIFT+click to pollinate (gold), ALT+click to sting (red).\n\nChat bar: speak decrees to the swarm.\nCommands: pollinate [name], sting [name], synthesize, survey, remember\nOr speak freely — the hive will respond.`);

        tick();
    }

    init();

    return { sendChat, toggleFocus, saveCfg };
})();
</script>
