<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>World Analyzer — Stained Plus</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #08090e; --text: #7ab0c0; --accent: #d4a84b;
            --panel-bg: rgba(8,9,14,0.95); --border: rgba(100,170,200,0.1);
            --font-mono: 'IBM Plex Mono', monospace; --font-serif: 'Cormorant+Garamond', serif;
        }
        body.light {
            --bg: #f5f2e9; --text: #2a3b4c; --accent: #b48a3b;
            --panel-bg: rgba(245,242,233,0.98); --border: rgba(40,65,100,0.12);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: var(--bg); font-family: var(--font-mono); color: var(--text); font-size: 11px; }

        /* ── TOP ── */
        .top { height: 36px; background: var(--panel-bg); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 12px; gap: 16px; z-index: 100; position: relative; }
        .t-logo { font-size: 9px; font-weight: 600; letter-spacing: 0.2em; color: var(--accent); text-transform: uppercase; cursor: pointer; }
        .t-stat { display: flex; flex-direction: column; }
        .t-lbl { font-size: 7px; opacity: 0.5; text-transform: uppercase; letter-spacing: 0.1em; }
        .t-val { font-size: 10px; font-weight: 500; }
        
        #api-hud { display: flex; align-items: center; margin-left: auto; gap: 8px; border-left: 1px solid var(--border); padding-left: 16px; }
        .status-dot { width: 6px; height: 6px; border-radius: 50%; background: #222; }
        .status-dot.ok { background: #20c060; box-shadow: 0 0 6px #20c060; }
        .status-dot.busy { background: #d4a84b; animation: pulse 1s infinite alternate; }
        .status-dot.err { background: #f04040; }
        @keyframes pulse { 0% { opacity: 0.4; scale: 0.9; } 100% { opacity: 1; scale: 1.1; } }
        
        .api-input { background: rgba(0,0,0,0.2); border: 1px solid var(--border); color: var(--accent); font-family: inherit; font-size: 9px; padding: 3px 8px; width: 120px; outline: none; border-radius: 2px; }
        
        .top-btns { display: flex; gap: 4px; }
        .tb { background: none; border: 1px solid var(--border); color: inherit; padding: 3px 10px; font-size: 9px; cursor: pointer; border-radius: 2px; }
        .tb.on { background: rgba(100,170,200,0.1); border-color: rgba(100,170,200,0.3); color: var(--accent); }

        /* ── MAIN ── */
        .main { display: flex; height: calc(100% - 36px - 44px); position: relative; }
        .vpanel { flex: 1; position: relative; background: radial-gradient(circle at center, rgba(10,20,40,0.3), transparent); }
        #vcanvas { width: 100%; height: 100%; cursor: crosshair; }
        
        .wtp { width: 440px; border-left: 1px solid var(--border); background: var(--panel-bg); display: flex; flex-direction: column; overflow: hidden; }
        .wt-head { padding: 12px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
        .wt-body { flex: 1; overflow-y: auto; padding: 0 12px; position: relative; }
        
        /* ── CHUNKS ── */
        .chunk { padding: 16px 0; border-bottom: 1px solid var(--border); opacity: 0.8; transition: opacity 0.2s; position: relative; }
        .chunk:hover { opacity: 1; }
        .chunk-meta { font-size: 8px; margin-bottom: 6px; display: flex; gap: 8px; opacity: 0.6; }
        .chunk-text { font-family: var(--font-serif); font-size: 14px; line-height: 1.6; color: var(--text); }
        .chunk-op { color: var(--accent); font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; }

        /* ── BOTTOM ── */
        .bottom { height: 44px; border-top: 1px solid var(--border); background: var(--panel-bg); display: flex; align-items: center; padding: 0 12px; gap: 12px; position: relative; }
        .b-in { flex: 1; background: transparent; border: none; color: var(--accent); font-family: inherit; font-size: 12px; outline: none; }
        .b-run { background: var(--accent); color: #000; border: none; padding: 6px 16px; font-weight: 600; cursor: pointer; border-radius: 2px; }
        
        /* ── CONTEXT MENU ── */
        #ctx { position: fixed; background: var(--panel-bg); border: 1px solid var(--border); padding: 4px; z-index: 1000; display: none; box-shadow: 0 8px 32px rgba(0,0,0,0.5); border-radius: 4px; }
        .cx-item { padding: 6px 12px; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: background 0.1s; }
        .cx-item:hover { background: rgba(100,170,200,0.1); color: var(--accent); }
        .cx-dot { width: 8px; height: 8px; border-radius: 2px; }
    </style>
</head>
<body>
    <div class="top">
        <span class="t-logo" onclick="toggleLightMode()">⬡ WORLD ANALYZER</span>
        <div class="t-stat">
            <div class="t-lbl">Nodes</div>
            <div id="sN" class="t-val">0</div>
        </div>
        <div class="t-stat">
            <div class="t-lbl">Territory</div>
            <div id="sT" class="t-val">STABLE</div>
        </div>
        
        <div id="api-hud">
            <div id="sbDot" class="status-dot"></div>
            <input type="password" id="api-key-input" class="api-input" placeholder="OpenAI Key..." onchange="saveApiKey()">
        </div>
        
        <div class="top-btns">
            <button class="tb on" id="tbEx" onclick="setMode('explore')">EXPLORE</button>
            <button class="tb" id="tbFi" onclick="setMode('fire')">FIRE ◎</button>
            <button class="tb" onclick="clearAll()">CLEAR</button>
        </div>
    </div>

    <div class="main">
        <div class="vpanel">
            <canvas id="vcanvas"></canvas>
        </div>
        <div class="wtp">
            <div class="wt-head">
                <span style="font-weight:600;letter-spacing:0.1em">WORLD TEXT</span>
                <span id="wt-status" style="font-size:8px;opacity:0.5">READY</span>
            </div>
            <div class="wt-body" id="wtBody">
                <div id="wtList"></div>
            </div>
        </div>
    </div>

    <div class="bottom">
        <input class="b-in" id="bIn" placeholder="Enter seed or right-click to spawn..." onkeydown="if(event.key==='Enter') spawnInput()">
        <button class="b-run" onclick="spawnInput()">SPAWN</button>
    </div>

    <div id="ctx"></div>

    <script>
        'use strict';
        const CONFIG = { model: "gpt-4o", storageKey: "stained_glass_openai_key" };
        let API_KEY = "";
        let nodes = [], chunks = [], nid = 0, cid = 0;
        let mode = 'explore', curOp = 'site';
        let VW, VH, canvas, ctx, vmap, SAMP = 3;
        let dragging = null, aiming = null, hovNode = null, dox = 0, doy = 0;
        let AC = null, soundOn = false, masterGain = null;

        const OP_DEF = {
            site: { label: 'SITE', hue: 205, sys: 'You are a strategist. Generate real-world contexts where this concept causes rupture.', sound: [440, 554, 659] },
            archaeologist: { label: 'DIG', hue: 275, sys: 'Archaeologist. Mix real and imagined documents. 5 layers: Surface, Intended, Shadow, Failure, Future.', sound: [220, 277, 330] },
            analyst: { label: 'INFER', hue: 148, sys: 'Analyst. What is it becoming? What question is it asking? 3 next steps.', sound: [330, 415, 494] },
            aphorist: { label: 'PHILO', hue: 38, sys: 'Aphorist. Numbered remarks. BAN transitions.', sound: [880, 1108, 1318] },
            inverter: { label: 'AXIS', hue: 355, sys: 'Inverter. Reconstruct for reader value. Inject tension.', sound: [247, 294, 370] }
        };

        function saveApiKey() { API_KEY = document.getElementById('api-key-input').value.trim(); localStorage.setItem(CONFIG.storageKey, API_KEY); setApiStatus('ok'); }
        function loadApiKey() { API_KEY = localStorage.getItem(CONFIG.storageKey) || ""; document.getElementById('api-key-input').value = API_KEY; if(API_KEY) setApiStatus('ok'); }
        function setApiStatus(s) { document.getElementById('sbDot').className = 'status-dot ' + s; }

        async function askAI(prompt, sys, onDelta) {
            if(!API_KEY) throw new Error("API Key Missing");
            setApiStatus('busy');
            try {
                const res = await fetch("https://api.openai.com/v1/chat/completions", {
                    method: "POST", headers: { "Content-Type": "application/json", "Authorization": `Bearer ${API_KEY}` },
                    body: JSON.stringify({ model: CONFIG.model, messages: [{role:"system",content:sys},{role:"user",content:prompt}], stream:true })
                });
                const reader = res.body.getReader(); const decoder = new TextDecoder(); let full = "";
                while(true) {
                    const {done, value} = await reader.read(); if(done) break;
                    const lines = decoder.decode(value).split("\n");
                    for(const l of lines) {
                        if(l.startsWith("data: ") && l !== "data: [DONE]") {
                            const delta = JSON.parse(l.slice(6)).choices[0].delta.content || "";
                            full += delta; onDelta(full);
                        }
                    }
                }
                setApiStatus('ok'); return full;
            } catch(e) { setApiStatus('err'); throw e; }
        }

        // ── CORE ──
        function init() {
            canvas = document.getElementById('vcanvas'); ctx = canvas.getContext('2d');
            resize(); window.addEventListener('resize', resize);
            loadApiKey(); setupEvents(); initAudio();
        }

        function resize() {
            const r = canvas.parentElement.getBoundingClientRect();
            VW = canvas.width = r.width; VH = canvas.height = r.height;
            compute(); draw();
        }

        function setupEvents() {
            canvas.onmousedown = e => {
                const n = nodeAt(e.clientX, e.clientY);
                if(n) {
                    if(mode === 'fire' || e.shiftKey) aiming = { src: n, x1: n.x, y1: n.y, x2: e.clientX, y2: e.clientY };
                    else { dragging = n; dox = e.clientX-n.x; doy = e.clientY-n.y; }
                }
            };
            canvas.onmousemove = e => {
                if(dragging) { dragging.x = e.clientX-dox; dragging.y = e.clientY-doy; compute(); }
                if(aiming) { aiming.x2 = e.clientX; aiming.y2 = e.clientY; }
                draw();
            };
            canvas.onmouseup = e => {
                if(aiming) {
                    const tgt = nodeAt(e.clientX, e.clientY);
                    if(tgt && tgt !== aiming.src) runOp(aiming.src, tgt);
                    aiming = null;
                }
                dragging = null; draw();
            };
            canvas.oncontextmenu = e => { e.preventDefault(); showCtx(e.clientX, e.clientY); };
        }

        function nodeAt(x, y) { return nodes.find(n => (x-n.x)**2+(y-n.y)**2 < 2500); }

        function compute() {
            if(!nodes.length) { vmap = null; return; }
            const vW = Math.ceil(VW/SAMP), vH = Math.ceil(VH/SAMP); vmap = new Int16Array(vW*vH);
            for(let y=0; y<vH; y++) {
                for(let x=0; x<vW; x++) {
                    let md = Infinity, mi = -1;
                    nodes.forEach((n,i)=>{ const d = (x*SAMP-n.x)**2+(y*SAMP-n.y)**2; if(d<md){md=d; mi=i;} });
                    vmap[y*vW+x] = mi;
                }
            }
        }

        function draw() {
            ctx.clearRect(0,0,VW,VH);
            if(vmap) {
                const vW = Math.ceil(VW/SAMP), vH = Math.ceil(VH/SAMP);
                for(let y=0; y<vH; y++) {
                    for(let x=0; x<vW; x++) {
                        const ni = vmap[y*vW+x]; if(ni<0) continue;
                        const h = OP_DEF[nodes[ni].op]?.hue || 200;
                        ctx.fillStyle = `hsla(${h}, 60%, 30%, 0.05)`;
                        ctx.fillRect(x*SAMP, y*SAMP, SAMP, SAMP);
                    }
                }
            }
            nodes.forEach(n => {
                ctx.beginPath(); ctx.arc(n.x, n.y, 4, 0, Math.PI*2);
                ctx.fillStyle = `hsla(${OP_DEF[n.op].hue}, 80%, 60%, 0.8)`; ctx.fill();
                ctx.font = '600 8px IBM Plex Mono'; ctx.fillText(OP_DEF[n.op].label, n.x-10, n.y-12);
            });
            if(aiming) {
                ctx.strokeStyle = '#d4a84b'; ctx.setLineDash([2,4]);
                ctx.beginPath(); ctx.moveTo(aiming.x1, aiming.y1); ctx.lineTo(aiming.x2, aiming.y2); ctx.stroke(); ctx.setLineDash([]);
            }
        }

        async function runOp(from, to) {
            const op = to.op; const def = OP_DEF[op]; playOp(op);
            const ch = { id: ++cid, op, text: "...", ts: Date.now() }; chunks.push(ch); renderWT();
            try {
                const full = await askAI(from.text, def.sys, d => { ch.text = d; renderWT(); });
                addNode(full, op, to.x+50, to.y+50);
            } catch(e) { ch.text = "Error: " + e.message; renderWT(); }
        }

        function addNode(text, op, x, y) {
            const n = { id:++nid, text, op, x, y }; nodes.push(n); document.getElementById('sN').textContent = nodes.length;
            compute(); draw(); return n;
        }

        function renderWT() {
            const el = document.getElementById('wtList'); el.innerHTML = '';
            chunks.slice().reverse().forEach(c => {
                const d = document.createElement('div'); d.className = 'chunk';
                d.innerHTML = `<div class="chunk-meta"><span class="chunk-op">${OP_DEF[c.op].label}</span><span>${new Date(c.ts).toLocaleTimeString()}</span></div><div class="chunk-text">${c.text}</div>`;
                el.appendChild(d);
            });
        }

        function spawnInput() {
            const val = document.getElementById('bIn').value; if(!val) return;
            addNode(val, 'site', VW/2, VH/2); document.getElementById('bIn').value = '';
        }

        function showCtx(x, y) {
            const m = document.getElementById('ctx'); m.style.display = 'block'; m.style.left = x+'px'; m.style.top = y+'px';
            m.innerHTML = Object.keys(OP_DEF).map(op => `<div class="cx-item" onclick="addNode('', '${op}', ${x}, ${y}); hideCtx()"><span class="cx-dot" style="background:hsla(${OP_DEF[op].hue},80%,60%,1)"></span>${OP_DEF[op].label}</div>`).join('');
        }
        function hideCtx() { document.getElementById('ctx').style.display = 'none'; }
        window.onclick = e => { if(!e.target.closest('#ctx')) hideCtx(); };

        function initAudio() {
            window.addEventListener('mousedown', () => {
                if(AC) return; AC = new (window.AudioContext || window.webkitAudioContext)();
                masterGain = AC.createGain(); masterGain.gain.value = 0.2; masterGain.connect(AC.destination);
                soundOn = true;
            }, {once:true});
        }
        function playOp(op) {
            if(!soundOn) return;
            OP_DEF[op].sound.forEach((f, i) => {
                const osc = AC.createOscillator(); const g = AC.createGain();
                osc.type = 'sine'; osc.frequency.value = f;
                g.gain.setValueAtTime(0, AC.currentTime); g.gain.linearRampToValueAtTime(0.1, AC.currentTime+0.05);
                g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime+1);
                osc.connect(g); g.connect(masterGain); osc.start(AC.currentTime + i*0.05); osc.stop(AC.currentTime+1);
            });
        }
        
        function toggleLightMode() { document.body.classList.toggle('light'); }
        function setMode(m) { mode = m; document.getElementById('tbEx').classList.toggle('on', m==='explore'); document.getElementById('tbFi').classList.toggle('on', m==='fire'); }
        function clearAll() { nodes = []; chunks = []; nid = 0; cid = 0; document.getElementById('sN').textContent = '0'; compute(); draw(); renderWT(); }

        init();
    </script>
</body>
</html>
